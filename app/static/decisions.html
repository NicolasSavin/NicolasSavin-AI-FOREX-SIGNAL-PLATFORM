<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Решения FXPilot</title><link rel="stylesheet" href="/static/styles.css"><style>body{background:#07111f;color:#e5eefc;font-family:Inter,Arial,sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:28px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}.card{background:linear-gradient(145deg,#0d1b2f,#0a1424);border:1px solid #1d3557;border-radius:18px;padding:18px;box-shadow:0 20px 50px #0006;animation:fade .35s ease}.badge{padding:5px 10px;border-radius:999px;background:#123;color:#9bdcff;font-weight:700}.buy{color:#43e58f}.sell{color:#ff6b7a}.wait{color:#ffd166}.muted{color:#8ea4c2}.risk{font-size:13px;color:#c8d7ef}@keyframes fade{from{opacity:.2;transform:translateY(8px)}to{opacity:1}}</style></head><body><div class="wrap"><h1>Объяснимые решения</h1><p class="muted">Детерминированный Decision Engine. Decision Score не является вероятностью прибыли и не является финансовой рекомендацией.</p><div id="decisions" class="grid"></div></div><script src="/static/decisions.js"></script></body></html>
