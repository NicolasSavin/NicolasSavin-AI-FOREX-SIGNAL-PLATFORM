<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI идеи</title>

  <style>
    :root {
      --bg: #08111f;
      --panel: #0b1730;
      --panel-2: #0d1b34;
      --border: #1d2c47;
      --text: #ffffff;
      --muted: #9fb0c7;
      --tag: #13233c;
      --accent: #facc15;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .topbar-left h1 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.1;
    }

    .topbar-left p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .home-link {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      background: #13233c;
      border: 1px solid #233553;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toolbar select {
      background: #0c1a33;
      color: #fff;
      border: 1px solid #223455;
      border-radius: 12px;
      padding: 10px 12px;
      min-width: 150px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 420px));
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #35527f;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .symbol {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .meta {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .summary {
      margin: 0 0 12px;
      color: #d7e0ee;
      font-size: 13px;
      line-height: 1.45;
      min-height: 58px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: var(--tag);
      color: #dbe7f7;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      line-height: 1;
    }

    .empty {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      color: var(--muted);
      font-size: 14px;
      max-width: 420px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 1000;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(1420px, 100%);
      max-height: 95vh;
      overflow-y: auto;
      background: #0b1730;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .modal-top h2 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .modal-sub {
      color: var(--muted);
      font-size: 14px;
    }

    .close-btn {
      border: none;
      background: #13233c;
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 680px;
      border-radius: 18px;
      border: 1px solid #162744;
      background: #08111f;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .chart-host {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .analysis-block {
      background: linear-gradient(180deg, #0c1a33 0%, #0a1529 100%);
      border: 1px solid #1d2c47;
      border-radius: 16px;
      padding: 16px 18px;
    }

    .analysis-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .analysis-text {
      margin: 0;
      font-size: 15px;
      line-height: 1.65;
      color: #eef4ff;
      white-space: pre-line;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .chart-wrap {
        height: 440px;
      }

      .modal-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="topbar-left">
        <h1>AI-идеи по рынку</h1>
        <p>Стартовая версия: свой свечной график, несколько пар, несколько ТФ и аннотации поверх графика.</p>
      </div>
      <a class="home-link" href="/">На главную</a>
    </div>

    <div class="toolbar">
      <select id="symbol-filter">
        <option value="ALL">Все пары</option>
      </select>

      <select id="timeframe-filter">
        <option value="ALL">Все ТФ</option>
      </select>
    </div>

    <div id="ideas" class="grid"></div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-card">
      <div class="modal-top">
        <div>
          <h2 id="modal-title">Идея</h2>
          <div id="modal-sub" class="modal-sub"></div>
        </div>
        <button id="close-modal" class="close-btn">Закрыть</button>
      </div>

      <div class="chart-wrap">
        <div id="chart-host" class="chart-host"></div>
        <canvas id="chart-overlay" class="overlay"></canvas>
      </div>

      <div class="analysis-grid">
        <div class="analysis-block">
          <div class="analysis-title">SMC</div>
          <p id="analysis-smc" class="analysis-text"></p>
        </div>
        <div class="analysis-block">
          <div class="analysis-title">Ликвидность</div>
          <p id="analysis-liquidity" class="analysis-text"></p>
        </div>
        <div class="analysis-block">
          <div class="analysis-title">Дивергенция</div>
          <p id="analysis-divergence" class="analysis-text"></p>
        </div>
        <div class="analysis-block">
          <div class="analysis-title">Паттерн</div>
          <p id="analysis-pattern" class="analysis-text"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/static/js/chart-page.js"></script>
</body>
</html>
