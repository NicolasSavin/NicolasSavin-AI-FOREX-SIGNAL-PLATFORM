<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-идеи по рынку</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg: #06111f; --panel: #102746; --panel2: #07182d;
      --border: rgba(95, 156, 230, .42); --borderStrong: rgba(124, 184, 255, .75);
      --text: #f4f8ff; --muted: #9bb8d8; --green: #31f59d; --red: #ff5f7a;
      --yellow: #ffd84d; --blue: #45caff; --violet: #b9a7ff; --orange: #ffb84d; --pattern: #ff5fb7;
    }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; color:var(--text); font-family:Arial, Helvetica, sans-serif; background: radial-gradient(circle at 15% 0%, rgba(54,130,255,.28), transparent 34%), radial-gradient(circle at 90% 10%, rgba(45,245,157,.12), transparent 30%), linear-gradient(145deg,#030814,#071426 45%,#020814); }
    .page { max-width:1500px; margin:0 auto; padding:34px 30px 70px; }
    .hero { display:flex; justify-content:space-between; gap:18px; align-items:flex-start; margin-bottom:22px; }
    h1 { margin:0 0 8px; font-size:clamp(30px,3.2vw,46px); letter-spacing:-.04em; }
    .subtitle { color:var(--muted); font-size:15px; line-height:1.5; }
    .home-link, select, button { background:linear-gradient(180deg,#183a68,#0b1f3d); color:var(--text); border:1px solid var(--border); border-radius:14px; padding:11px 16px; font-weight:800; text-decoration:none; cursor:pointer; box-shadow:0 12px 28px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.1); }
    .controls { display:flex; gap:12px; flex-wrap:wrap; margin:22px 0; }
    .stats { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:14px; margin:18px 0; }
    .stat { background: radial-gradient(circle at 90% 20%, rgba(69,202,255,.12), transparent 34%), linear-gradient(135deg,rgba(28,64,113,.96),rgba(9,24,45,.98)); border:1px solid var(--border); border-radius:18px; padding:16px; box-shadow:0 18px 42px rgba(0,0,0,.30); }
    .stat-label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; font-weight:900; }
    .stat-value { margin-top:8px; font-size:28px; font-weight:950; }
    .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; }
    .card { min-height:430px; background: radial-gradient(circle at 85% 0%,rgba(69,202,255,.16),transparent 35%), linear-gradient(155deg,rgba(20,52,92,.96),rgba(7,22,42,.98) 70%); border:1px solid var(--border); border-radius:22px; padding:17px; box-shadow:0 22px 54px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.11); cursor:pointer; transition:.18s ease; }
    .card:hover { transform:translateY(-4px); border-color:var(--borderStrong); }
    .card-head { display:flex; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .symbol { font-size:18px; font-weight:950; letter-spacing:.08em; }
    .signal-line { margin-top:5px; font-size:14px; font-weight:900; line-height:1.35; }
    .badge { border-radius:999px; padding:8px 14px; font-size:12px; font-weight:950; text-transform:uppercase; white-space:nowrap; }
    .badge-buy { color:#00150c; background:linear-gradient(180deg,#54ffb5,var(--green)); }
    .badge-sell { color:#fff; background:linear-gradient(180deg,#d93f5b,#8f2034); }
    .badge-wait { color:#efeaff; background:linear-gradient(180deg,#5266bd,#293c78); }
    .buy-text { color:var(--green); } .sell-text { color:var(--red); } .wait-text { color:var(--violet); }
    .chip-row { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 14px; }
    .chip { font-size:11px; padding:6px 10px; border-radius:999px; background:rgba(6,24,46,.88); color:#d7ecff; border:1px solid rgba(58,112,176,.55); font-weight:900; }
    .box { background:rgba(3,14,28,.72); border:1px solid rgba(95,145,203,.34); border-radius:16px; padding:13px; margin:10px 0; color:#e8f3ff; font-size:13px; line-height:1.6; max-height:150px; overflow:hidden; }
    .levels, .modal-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; margin-top:13px; }
    .level { background:linear-gradient(180deg,rgba(7,27,52,.92),rgba(4,17,33,.94)); border:1px solid rgba(71,124,187,.44); border-radius:12px; padding:10px; font-size:13px; font-weight:950; }
    .entry { color:var(--yellow); } .tp { color:var(--green); } .sl { color:var(--red); } .rr { color:var(--blue); }
    .footer { margin-top:13px; display:flex; justify-content:space-between; color:#b9d6f8; font-size:12px; border-top:1px solid rgba(80,120,170,.35); padding-top:11px; }
    .empty, .error { background:rgba(16,38,66,.92); border:1px solid var(--border); border-radius:16px; padding:18px; color:var(--muted); margin-bottom:14px; }
    .error { color:#ffd6d6; border-color:rgba(255,95,122,.72); }
    .modal-backdrop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:24px; background:rgba(0,0,0,.78); backdrop-filter:blur(10px); z-index:999; }
    .modal-backdrop.open { display:flex; }
    .modal { width:min(1240px,100%); max-height:94vh; overflow:auto; background: radial-gradient(circle at 90% 0%,rgba(69,202,255,.18),transparent 34%), linear-gradient(160deg,rgba(24,58,103,.98),rgba(5,17,33,.98) 72%); border:1px solid rgba(124,184,255,.62); border-radius:26px; box-shadow:0 34px 110px rgba(0,0,0,.68); padding:24px; }
    .modal-head { display:flex; justify-content:space-between; gap:16px; margin-bottom:16px; }
    .modal-title { font-size:clamp(24px,3vw,34px); margin:0 0 6px; }
    .modal-section-title { margin:20px 0 9px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; font-size:12px; font-weight:950; }
    .modal-text { max-height:none; overflow:visible; font-size:14px; }
    .chart-wrap { margin:16px 0; border:1px solid rgba(95,145,203,.42); border-radius:18px; overflow:hidden; background:rgba(2,10,20,.88); }
    .chart-toolbar { display:flex; gap:8px; flex-wrap:wrap; padding:10px; border-bottom:1px solid rgba(95,145,203,.3); background:rgba(8,25,48,.9); }
    .tf-btn { height:34px; padding:0 12px; border-radius:999px; }
    .legend-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:8px; padding:10px; border-top:1px solid rgba(95,145,203,.3); background:rgba(5,18,34,.74); }
    .legend-item { border:1px solid rgba(95,145,203,.28); border-radius:12px; padding:8px 10px; font-size:12px; color:#dbeeff; background:rgba(3,14,28,.55); font-weight:800; }
    .chart { height:520px; width:100%; position:relative; }
    .chart-note { padding:10px 12px; color:var(--muted); font-size:12px; line-height:1.5; border-top:1px solid rgba(95,145,203,.3); }
    .pro-idea-overlay { position:absolute; inset:0; pointer-events:none; z-index:20; }
    @media (max-width:1120px){ .grid{grid-template-columns:repeat(2,minmax(0,1fr));}.stats{grid-template-columns:repeat(2,minmax(0,1fr));}.legend-grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
    @media (max-width:760px){ .page{padding:22px 14px 44px;}.hero{flex-direction:column;}.grid,.stats,.modal-grid,.legend-grid{grid-template-columns:1fr;}.modal-backdrop{padding:10px;}.chart{height:390px;} }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>AI-идеи по рынку</h1>
        <div class="subtitle">Entry / SL / TP фиксируются. График показывает OB, Breaker Block, FVG, Liquidity и графические паттерны.</div>
      </div>
      <a class="home-link" href="/">На главную</a>
    </header>
    <section class="controls">
      <select id="pairFilter"><option value="ALL">Все пары</option></select>
      <select id="signalFilter"><option value="ALL">Все сигналы</option><option value="BUY">BUY</option><option value="SELL">SELL</option><option value="WAIT">WAIT</option><option value="CLOSED">Архив</option></select>
      <button id="refreshBtn">Обновить</button>
    </section>
    <section class="stats">
      <div class="stat"><div class="stat-label">BUY</div><div class="stat-value" id="buyCount">0</div></div>
      <div class="stat"><div class="stat-label">SELL</div><div class="stat-value" id="sellCount">0</div></div>
      <div class="stat"><div class="stat-label">WAIT</div><div class="stat-value" id="waitCount">0</div></div>
      <div class="stat"><div class="stat-label">Архив</div><div class="stat-value" id="closedCount">0</div></div>
      <div class="stat"><div class="stat-label">Всего</div><div class="stat-value" id="totalCount">0</div></div>
    </section>
    <section id="statusBox" class="empty">Загрузка идей...</section>
    <section id="ideasGrid" class="grid"></section>
  </main>
  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head"><div><h2 id="modalTitle" class="modal-title">Идея</h2><div id="modalSubtitle" class="subtitle"></div></div><button id="closeModalBtn">Закрыть</button></div>
      <div id="modalContent"></div>
    </div>
  </div>
<script>
const state={ideas:[],archive:[],selectedPair:'ALL',selectedSignal:'ALL',activeIdea:null,chart:null,series:null,currentTf:'M15'};
const pairFilter=document.getElementById('pairFilter'),signalFilter=document.getElementById('signalFilter'),refreshBtn=document.getElementById('refreshBtn'),statusBox=document.getElementById('statusBox'),ideasGrid=document.getElementById('ideasGrid'),modalBackdrop=document.getElementById('modalBackdrop'),closeModalBtn=document.getElementById('closeModalBtn'),modalTitle=document.getElementById('modalTitle'),modalSubtitle=document.getElementById('modalSubtitle'),modalContent=document.getElementById('modalContent');
pairFilter.addEventListener('change',()=>{state.selectedPair=pairFilter.value;render();}); signalFilter.addEventListener('change',()=>{state.selectedSignal=signalFilter.value;render();}); refreshBtn.addEventListener('click',()=>loadIdeas(true)); closeModalBtn.addEventListener('click',closeModal); modalBackdrop.addEventListener('click',e=>{if(e.target===modalBackdrop)closeModal();}); document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
async function loadIdeas(manual=false){ if(manual){statusBox.style.display='block';statusBox.className='empty';statusBox.textContent='Обновление идей...';} try{let r=await fetch('/ideas/market',{cache:'no-store'}); if(!r.ok)r=await fetch('/api/ideas',{cache:'no-store'}); if(!r.ok)throw new Error('HTTP '+r.status); const d=await r.json(); state.ideas=Array.isArray(d)?d:(d.ideas||d.signals||[]); state.archive=Array.isArray(d.archive)?d.archive:[]; fillPairFilter([...state.ideas,...state.archive]); render();}catch(e){statusBox.style.display='block';statusBox.className='error';statusBox.textContent='Не удалось загрузить идеи: '+e.message;}}
function fillPairFilter(ideas){const cur=pairFilter.value||'ALL'; const symbols=[...new Set(ideas.map(i=>normalizeSymbol(i.symbol||i.pair)).filter(Boolean))].sort(); pairFilter.innerHTML='<option value="ALL">Все пары</option>'; symbols.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;pairFilter.appendChild(o);}); pairFilter.value=symbols.includes(cur)?cur:'ALL'; state.selectedPair=pairFilter.value;}
function render(){const ideas=getFilteredIdeas();updateStats();ideasGrid.innerHTML=''; if(!ideas.length){statusBox.style.display='block';statusBox.className='empty';statusBox.textContent='Нет идей под выбранные фильтры.';return;} statusBox.style.display='none'; ideas.forEach(i=>ideasGrid.appendChild(renderCard(i)));}
function getFilteredIdeas(){const all=state.selectedSignal==='CLOSED'?state.archive:[...state.ideas,...state.archive]; return all.filter(i=>{const s=normalizeSymbol(i.symbol||i.pair); const sig=normalizeSignal(i.final_signal||i.signal||i.direction||i.bias); const st=String(i.status||'').toLowerCase(); const closed=['tp_hit','sl_hit','archived','closed'].some(x=>st.includes(x)); if(state.selectedPair!=='ALL'&&s!==state.selectedPair)return false; if(state.selectedSignal==='ALL')return !closed; if(state.selectedSignal==='CLOSED')return closed; return sig===state.selectedSignal&&!closed;});}
function updateStats(){const a=state.ideas, ar=state.archive; document.getElementById('buyCount').textContent=a.filter(i=>normalizeSignal(i.final_signal||i.signal||i.direction||i.bias)==='BUY').length; document.getElementById('sellCount').textContent=a.filter(i=>normalizeSignal(i.final_signal||i.signal||i.direction||i.bias)==='SELL').length; document.getElementById('waitCount').textContent=a.filter(i=>normalizeSignal(i.final_signal||i.signal||i.direction||i.bias)==='WAIT').length; document.getElementById('closedCount').textContent=ar.length; document.getElementById('totalCount').textContent=a.length+ar.length;}
function renderCard(idea){const card=document.createElement('article'); const id=idea.id||idea.idea_id||idea.symbol||Math.random().toString(16).slice(2); const symbol=normalizeSymbol(idea.symbol||idea.pair||'MARKET'); const sig=normalizeSignal(idea.final_signal||idea.signal||idea.direction||idea.bias); const conf=numberOrDash(idea.final_confidence??idea.confidence); const summary=pickText(idea); card.className='card'; card.dataset.ideaId=id; card.innerHTML=`<div class="card-head"><div><div class="symbol">${escapeHtml(symbol)}</div><div class="signal-line ${signalClass(sig)}">${escapeHtml(sig)} • уверенность ${conf}%</div></div><span class="badge ${badgeClass(sig)}">${escapeHtml(sig)}</span></div><div class="chip-row"><span class="chip">${escapeHtml(idea.timeframe||idea.tf||'MTF')}</span><span class="chip">Entry ${formatValue(idea.entry||idea.entry_price||idea.entry_zone)}</span><span class="chip">SL ${formatValue(idea.stop_loss||idea.stopLoss||idea.sl)}</span><span class="chip">TP ${formatValue(idea.take_profit||idea.takeProfit||idea.tp)}</span></div><div class="box">${escapeHtml(summary)}</div><div class="levels"><div class="level entry">ENTRY<br>${formatValue(idea.entry||idea.entry_price||idea.entry_zone)}</div><div class="level sl">SL<br>${formatValue(idea.stop_loss||idea.stopLoss||idea.sl)}</div><div class="level tp">TP<br>${formatValue(idea.take_profit||idea.takeProfit||idea.tp)}</div><div class="level rr">R:R<br>${formatValue(idea.rr||idea.risk_reward||idea.riskReward)}</div></div><div class="footer"><span>${escapeHtml(symbol)}</span><span>${escapeHtml(idea.status||'active')}</span></div>`; card.addEventListener('click',()=>openModal(idea)); return card;}
function openModal(idea){state.activeIdea=idea; state.currentTf=pickDefaultTf(idea); const symbol=normalizeSymbol(idea.symbol||idea.pair||'MARKET'); const sig=normalizeSignal(idea.final_signal||idea.signal||idea.direction||idea.bias); modalTitle.textContent=`${symbol} • ${sig}`; modalSubtitle.textContent=pickText(idea); modalContent.innerHTML=`<div class="modal-grid"><div class="level entry">ENTRY<br>${formatValue(idea.entry||idea.entry_price||idea.entry_zone)}</div><div class="level sl">SL<br>${formatValue(idea.stop_loss||idea.stopLoss||idea.sl)}</div><div class="level tp">TP<br>${formatValue(idea.take_profit||idea.takeProfit||idea.tp)}</div><div class="level rr">Confidence<br>${numberOrDash(idea.final_confidence??idea.confidence)}%</div></div><div class="modal-section-title">График и разметка</div><div class="chart-wrap"><div class="chart-toolbar"><button class="tf-btn" data-tf="M15">M15</button><button class="tf-btn" data-tf="H1">H1</button><button class="tf-btn" data-tf="H4">H4</button></div><div class="legend-grid"><div class="legend-item" style="color:var(--yellow)">ENTRY</div><div class="legend-item" style="color:var(--red)">SL</div><div class="legend-item" style="color:var(--green)">TP</div><div class="legend-item" style="color:var(--violet)">OB / Breaker</div><div class="legend-item" style="color:var(--orange)">FVG</div><div class="legend-item" style="color:var(--blue)">Liquidity</div><div class="legend-item" style="color:var(--pattern)">Pattern</div></div><div id="ideaChart" class="chart"></div><div class="chart-note">${escapeHtml(symbol)} ${escapeHtml(state.currentTf)} · Разметка: OB, Breaker Block, FVG, Liquidity, графические паттерны. Лишние уровни скрыты.</div></div><div class="modal-section-title">Описание</div><div class="box modal-text">${escapeHtml(pickText(idea))}</div>`; modalBackdrop.classList.add('open'); modalContent.querySelectorAll('.tf-btn').forEach(b=>b.addEventListener('click',()=>{state.currentTf=b.dataset.tf;renderIdeaChart(idea);})); setTimeout(()=>renderIdeaChart(idea),50);}
function closeModal(){modalBackdrop.classList.remove('open'); if(state.chart){state.chart.remove();state.chart=null;state.series=null;} state.activeIdea=null;}
function renderIdeaChart(idea){const container=document.getElementById('ideaChart'); if(!container)return; if(state.chart){state.chart.remove();state.chart=null;state.series=null;} container.innerHTML=''; const candles=getCandlesForIdea(idea,state.currentTf); if(!candles.length){container.innerHTML='<div class="empty">Свечи для графика недоступны.</div>'; return;} const chart=LightweightCharts.createChart(container,{width:container.clientWidth,height:container.clientHeight,layout:{background:{color:'#07111f'},textColor:'#9bb8d8'},grid:{vertLines:{color:'rgba(95,145,203,.16)'},horzLines:{color:'rgba(95,145,203,.16)'}},rightPriceScale:{borderColor:'rgba(95,145,203,.35)'},timeScale:{borderColor:'rgba(95,145,203,.35)',timeVisible:true,secondsVisible:false},crosshair:{mode:LightweightCharts.CrosshairMode.Normal}}); const series=chart.addCandlestickSeries({upColor:'#31f59d',downColor:'#ff5f7a',borderUpColor:'#31f59d',borderDownColor:'#ff5f7a',wickUpColor:'#31f59d',wickDownColor:'#ff5f7a'}); series.setData(candles); addCleanTradeLevels(series,idea); chart.timeScale().fitContent(); state.chart=chart; state.series=series; requestAnimationFrame(()=>addIdeaOverlay(container,chart,series,candles,idea));}
function addCleanTradeLevels(series,idea){const entry=toNumber(idea.entry||idea.entry_price||idea.entry_zone),sl=toNumber(idea.stop_loss||idea.stopLoss||idea.sl),tp=toNumber(idea.take_profit||idea.takeProfit||idea.tp); if(Number.isFinite(entry))series.createPriceLine({price:entry,color:'#ffd84d',lineWidth:2,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:true,title:'ENTRY'}); if(Number.isFinite(sl))series.createPriceLine({price:sl,color:'#ff5f7a',lineWidth:2,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:true,title:'SL'}); if(Number.isFinite(tp))series.createPriceLine({price:tp,color:'#31f59d',lineWidth:2,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:true,title:'TP'});}
function addIdeaOverlay(chartEl,chart,series,candles,idea){chartEl.querySelectorAll('.pro-idea-overlay').forEach(el=>el.remove()); const overlay=document.createElement('div'); overlay.className='pro-idea-overlay'; chartEl.appendChild(overlay); const width=chartEl.clientWidth,height=chartEl.clientHeight; const svg=document.createElementNS('http://www.w3.org/2000/svg','svg'); svg.setAttribute('width',width);svg.setAttribute('height',height);svg.setAttribute('viewBox',`0 0 ${width} ${height}`);svg.style.position='absolute';svg.style.inset='0';overlay.appendChild(svg); const xByIndex=i=>chart.timeScale().logicalToCoordinate(i)??0; const yByPrice=p=>series.priceToCoordinate(Number(p))??0; const detected=detectMarkup(candles); detected.orderBlocks.forEach(z=>drawZone(svg,xByIndex(z.start),yByPrice(z.high),xByIndex(z.end),yByPrice(z.low),z.breaker?'#ff5fb7':'#b77cff',z.breaker?'rgba(244,114,182,.20)':'rgba(139,92,246,.22)',z.label)); detected.fvg.forEach(z=>drawZone(svg,xByIndex(z.start),yByPrice(z.high),xByIndex(z.end),yByPrice(z.low),'#ff9f1c','rgba(245,158,11,.20)',z.label)); detected.liquidity.forEach(l=>drawLiquidity(svg,width,yByPrice(l.price),'#2f8cff',l.label)); detected.patterns.forEach(p=>drawPattern(svg,p.points.map(point=>({x:xByIndex(point.index),y:yByPrice(point.price)})),p.label));}
function drawZone(svg,x1,y1,x2,y2,stroke,fill,label){const x=Math.min(x1,x2),y=Math.min(y1,y2),w=Math.max(Math.abs(x2-x1),80),h=Math.max(Math.abs(y2-y1),16); const r=document.createElementNS('http://www.w3.org/2000/svg','rect'); r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('fill',fill);r.setAttribute('stroke',stroke);r.setAttribute('stroke-width','1.4'); svg.appendChild(r); const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',x+Math.max(10,w-170));t.setAttribute('y',y+h/2+5);t.setAttribute('fill',stroke);t.setAttribute('font-size','13');t.setAttribute('font-weight','900');t.textContent=label;svg.appendChild(t);}
function drawLiquidity(svg,width,y,color,label){if(!Number.isFinite(y))return; const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1','20');l.setAttribute('x2',width-90);l.setAttribute('y1',y);l.setAttribute('y2',y);l.setAttribute('stroke',color);l.setAttribute('stroke-width','2');l.setAttribute('stroke-dasharray','2 7');svg.appendChild(l); const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',Math.max(30,width*.58));t.setAttribute('y',y-9);t.setAttribute('fill',color);t.setAttribute('font-size','13');t.setAttribute('font-weight','900');t.textContent=label;svg.appendChild(t);}
function drawPattern(svg,points,label){if(points.length<3)return; const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');poly.setAttribute('points',points.map(p=>`${p.x},${p.y}`).join(' '));poly.setAttribute('fill','rgba(244,114,182,.14)');poly.setAttribute('stroke','#ff5fb7');poly.setAttribute('stroke-width','2');poly.setAttribute('stroke-dasharray','5 5');svg.appendChild(poly); const last=points[points.length-1]; const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',last.x-20);t.setAttribute('y',last.y+34);t.setAttribute('fill','#ff5fb7');t.setAttribute('font-size','13');t.setAttribute('font-weight','900');t.textContent=label;svg.appendChild(t);}
function detectMarkup(candles){return{orderBlocks:detectOrderBlocks(candles).slice(-3),fvg:detectFvg(candles).slice(-3),liquidity:detectLiquidity(candles).slice(-4),patterns:detectPatterns(candles).slice(-2)}}
function detectOrderBlocks(candles){const out=[]; const start=Math.max(3,candles.length-90); for(let i=start;i<candles.length-3;i++){const c=candles[i],n=candles[i+1]; const body=Math.abs(c.close-c.open),nextBody=Math.abs(n.close-n.open); if(nextBody<=body*1.15)continue; let zone=null; if(c.close<c.open&&n.close>n.open&&n.close>c.high)zone={start:i,end:candles.length-1,low:c.low,high:c.high,label:'OB (Demand)',dir:'bull'}; if(c.close>c.open&&n.close<n.open&&n.close<c.low)zone={start:i,end:candles.length-1,low:c.low,high:c.high,label:'OB (Supply)',dir:'bear'}; if(!zone)continue; const after=candles.slice(i+2); const broken=zone.dir==='bull'?after.some(x=>x.close<zone.low):after.some(x=>x.close>zone.high); const returned=zone.dir==='bull'?after.some(x=>x.low<=zone.high&&x.close>=zone.low):after.some(x=>x.high>=zone.low&&x.close<=zone.high); if(broken&&returned){zone.breaker=true; zone.label=zone.dir==='bull'?'Breaker Block (Bearish)':'Breaker Block (Bullish)';} out.push(zone);} if(!out.length){const v=candles.slice(-70); const off=candles.length-v.length; const hi=Math.max(...v.map(c=>c.high)),lo=Math.min(...v.map(c=>c.low)),r=Math.max(hi-lo,.00001); out.push({start:off+4,end:candles.length-1,low:lo,high:lo+r*.14,label:'OB (Demand)'}); out.push({start:off+30,end:candles.length-1,low:hi-r*.14,high:hi,label:'OB (Supply)'});} return out;}
function detectFvg(candles){const out=[]; const start=Math.max(2,candles.length-100); for(let i=start;i<candles.length;i++){const a=candles[i-2],c=candles[i]; if(!a||!c)continue; if(a.high<c.low)out.push({start:i-2,end:candles.length-1,low:a.high,high:c.low,label:'FVG (Bullish)'}); if(a.low>c.high)out.push({start:i-2,end:candles.length-1,low:c.high,high:a.low,label:'FVG (Bearish)'});} return out;}
function detectLiquidity(candles){const out=[],v=candles.slice(-90),off=candles.length-v.length; const highs=v.map(c=>c.high),lows=v.map(c=>c.low),range=Math.max(Math.max(...highs)-Math.min(...lows),.00001),tol=range*.04; const sh=[],sl=[]; for(let i=2;i<v.length-2;i++){if(v[i].high>=v[i-1].high&&v[i].high>=v[i+1].high)sh.push({index:off+i,price:v[i].high}); if(v[i].low<=v[i-1].low&&v[i].low<=v[i+1].low)sl.push({index:off+i,price:v[i].low});} for(let i=0;i<sh.length-1;i++){for(let j=i+1;j<sh.length;j++){if(Math.abs(sh[i].price-sh[j].price)<=tol){out.push({price:(sh[i].price+sh[j].price)/2,label:'Liquidity (EQH)'});break;}}} for(let i=0;i<sl.length-1;i++){for(let j=i+1;j<sl.length;j++){if(Math.abs(sl[i].price-sl[j].price)<=tol){out.push({price:(sl[i].price+sl[j].price)/2,label:'Liquidity (EQL)'});break;}}} return out;}
function detectPatterns(candles){const out=[],v=candles.slice(-55),off=candles.length-v.length;if(v.length<25)return out; const highs=v.map(c=>c.high),lows=v.map(c=>c.low),range=Math.max(Math.max(...highs)-Math.min(...lows),.00001); const lh=Math.max(...highs.slice(0,18)),rh=Math.max(...highs.slice(-18)),ll=Math.min(...lows.slice(0,18)),rl=Math.min(...lows.slice(-18)); if(rh<lh&&rl>ll){out.push({label:'Pattern (Triangle)',points:[{index:off+8,price:lh},{index:candles.length-4,price:rh},{index:candles.length-4,price:rl},{index:off+8,price:ll}]});} const impulse=Math.abs(v[v.length-25].close-v[v.length-13].close),cons=Math.max(...highs.slice(-12))-Math.min(...lows.slice(-12)); if(impulse>range*.22&&cons<range*.35){out.push({label:'Pattern (Flag)',points:[{index:candles.length-13,price:Math.max(...highs.slice(-12))},{index:candles.length-2,price:Math.max(...highs.slice(-12))},{index:candles.length-2,price:Math.min(...lows.slice(-12))},{index:candles.length-13,price:Math.min(...lows.slice(-12))}]});} const top1=Math.max(...highs.slice(-28,-14)),top2=Math.max(...highs.slice(-14)); if(Math.abs(top1-top2)<range*.08)out.push({label:'Pattern (Double Top)',points:[{index:candles.length-28,price:Math.min(...lows.slice(-28))},{index:candles.length-3,price:Math.min(...lows.slice(-28))},{index:candles.length-3,price:Math.max(top1,top2)},{index:candles.length-28,price:Math.max(top1,top2)}]}); const bot1=Math.min(...lows.slice(-28,-14)),bot2=Math.min(...lows.slice(-14)); if(Math.abs(bot1-bot2)<range*.08)out.push({label:'Pattern (Double Bottom)',points:[{index:candles.length-28,price:Math.max(...highs.slice(-28))},{index:candles.length-3,price:Math.max(...highs.slice(-28))},{index:candles.length-3,price:Math.min(bot1,bot2)},{index:candles.length-28,price:Math.min(bot1,bot2)}]}); return out;}
function getCandlesForIdea(idea,tf){const sources=[]; if(idea.timeframe_ideas&&idea.timeframe_ideas[tf])sources.push(idea.timeframe_ideas[tf]); sources.push(idea); for(const s of sources){const raw=s.candles||s.chart_candles||s.chartCandles||s.chart_data?.candles||s.chartData?.candles||s.chart_data||s.chartData; const n=normalizeCandles(raw); if(n.length)return n;} return buildSyntheticCandlesFromIdea(idea);}
function normalizeCandles(raw){if(!Array.isArray(raw))return[]; const out=[]; for(let i=0;i<raw.length;i++){const r=raw[i]; const open=toNumber(r.open??r.o),high=toNumber(r.high??r.h),low=toNumber(r.low??r.l),close=toNumber(r.close??r.c??r.price); if(![open,high,low,close].every(Number.isFinite))continue; let time=r.time??r.timestamp??r.t; if(typeof time==='string'){const p=Date.parse(time); time=Number.isFinite(p)?Math.floor(p/1000):Math.floor(Date.now()/1000)+i*60;} if(!Number.isFinite(Number(time)))time=Math.floor(Date.now()/1000)-(raw.length-i)*900; out.push({time:Number(time),open,high,low,close});} return out.slice(-140);}
function buildSyntheticCandlesFromIdea(idea){const entry=toNumber(idea.entry||idea.entry_price||idea.entry_zone)||1.17,sl=toNumber(idea.stop_loss||idea.stopLoss||idea.sl)||entry*.997,tp=toNumber(idea.take_profit||idea.takeProfit||idea.tp)||entry*1.004; const min=Math.min(entry,sl,tp),max=Math.max(entry,sl,tp),range=Math.max(max-min,entry*.002),now=Math.floor(Date.now()/1000),out=[]; let price=entry-range*.35; for(let i=0;i<100;i++){const wave=Math.sin(i/7)*range*.18,trend=(i/100)*range*.9,open=price,close=min+range*.18+trend+wave,high=Math.max(open,close)+range*.08,low=Math.min(open,close)-range*.08; out.push({time:now-(100-i)*900,open,high,low,close}); price=close;} return out;}
function pickDefaultTf(idea){const tf=String(idea.timeframe||idea.tf||'M15').toUpperCase(); return ['M15','H1','H4'].includes(tf)?tf:'M15';} function pickText(idea){return idea.idea_thesis||idea.unified_narrative||idea.full_text||idea.fullText||idea.summary_ru||idea.summary||idea.short_text||idea.description_ru||'Описание идеи отсутствует.';} function normalizeSymbol(v){return String(v||'').trim().toUpperCase();} function normalizeSignal(v){const r=String(v||'').trim().toLowerCase(); if(['buy','long','bullish'].includes(r))return'BUY'; if(['sell','short','bearish'].includes(r))return'SELL'; return'WAIT';} function signalClass(s){return s==='BUY'?'buy-text':s==='SELL'?'sell-text':'wait-text';} function badgeClass(s){return s==='BUY'?'badge-buy':s==='SELL'?'badge-sell':'badge-wait';} function toNumber(v){if(v&&typeof v==='object')v=v.price??v.value??v.mid??v.from??v.to; const n=Number(v); return Number.isFinite(n)?n:NaN;} function formatValue(v){const n=toNumber(v); return Number.isFinite(n)?n.toFixed(5).replace(/0+$/,'').replace(/\.$/,''):'—';} function numberOrDash(v){const n=Number(v); return Number.isFinite(n)?Math.round(n):'—';} function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}
