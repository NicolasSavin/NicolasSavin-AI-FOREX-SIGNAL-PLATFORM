<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-идеи по рынку</title>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --bg: #06111f;
      --panel: #102746;
      --panel2: #07182d;
      --border: rgba(95, 156, 230, .42);
      --borderStrong: rgba(124, 184, 255, .75);
      --text: #f4f8ff;
      --muted: #9bb8d8;
      --green: #31f59d;
      --red: #ff5f7a;
      --yellow: #ffd84d;
      --blue: #45caff;
      --violet: #b9a7ff;
      --orange: #ffb84d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(54, 130, 255, .28), transparent 34%),
        radial-gradient(circle at 90% 10%, rgba(45, 245, 157, .12), transparent 30%),
        linear-gradient(145deg, #030814, #071426 45%, #020814);
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 34px 30px 70px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 3.2vw, 46px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .home-link, select, button {
      background: linear-gradient(180deg, #183a68, #0b1f3d);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 16px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.1);
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 22px 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0;
    }

    .stat {
      background:
        radial-gradient(circle at 90% 20%, rgba(69, 202, 255, .12), transparent 34%),
        linear-gradient(135deg, rgba(28, 64, 113, .96), rgba(9, 24, 45, .98));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 42px rgba(0,0,0,.30);
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 900;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 950;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      min-height: 430px;
      background:
        radial-gradient(circle at 85% 0%, rgba(69,202,255,.16), transparent 35%),
        linear-gradient(155deg, rgba(20,52,92,.96), rgba(7,22,42,.98) 70%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 17px;
      box-shadow: 0 22px 54px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.11);
      cursor: pointer;
      transition: .18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--borderStrong);
    }

    .card.pulse-green { animation: pulseGreen 1.1s ease-in-out 3; }
    .card.pulse-blue { animation: pulseBlue 1.1s ease-in-out 3; }
    .card.pulse-red { animation: pulseRed 1.1s ease-in-out 3; }
    .card.pulse-orange { animation: pulseOrange 1.1s ease-in-out 3; }

    @keyframes pulseGreen {
      0%, 100% { box-shadow: 0 22px 54px rgba(0,0,0,.42); }
      50% { box-shadow: 0 0 0 3px rgba(49,245,157,.42), 0 0 40px rgba(49,245,157,.42); }
    }

    @keyframes pulseBlue {
      0%, 100% { box-shadow: 0 22px 54px rgba(0,0,0,.42); }
      50% { box-shadow: 0 0 0 3px rgba(69,202,255,.42), 0 0 40px rgba(69,202,255,.42); }
    }

    @keyframes pulseRed {
      0%, 100% { box-shadow: 0 22px 54px rgba(0,0,0,.42); }
      50% { box-shadow: 0 0 0 3px rgba(255,95,122,.42), 0 0 40px rgba(255,95,122,.42); }
    }

    @keyframes pulseOrange {
      0%, 100% { box-shadow: 0 22px 54px rgba(0,0,0,.42); }
      50% { box-shadow: 0 0 0 3px rgba(255,184,77,.42), 0 0 40px rgba(255,184,77,.42); }
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .symbol {
      font-size: 18px;
      font-weight: 950;
      letter-spacing: .08em;
    }

    .signal-line {
      margin-top: 5px;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
    }

    .badge {
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-buy { color: #00150c; background: linear-gradient(180deg, #54ffb5, var(--green)); }
    .badge-sell { color: #fff; background: linear-gradient(180deg, #d93f5b, #8f2034); }
    .badge-wait { color: #efeaff; background: linear-gradient(180deg, #5266bd, #293c78); }
    .badge-missed { color: #201000; background: linear-gradient(180deg, #ffd98a, var(--orange)); }
    .badge-closed { color: #fff; background: linear-gradient(180deg, #708198, #36465d); }

    .buy-text { color: var(--green); }
    .sell-text { color: var(--red); }
    .wait-text { color: var(--violet); }
    .missed-text { color: var(--orange); }
    .closed-text { color: var(--muted); }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0 14px;
    }

    .chip {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(6,24,46,.88);
      color: #d7ecff;
      border: 1px solid rgba(58,112,176,.55);
      font-weight: 900;
    }

    .chip-live { color: #d8fff0; border-color: rgba(45,245,157,.75); }
    .chip-rest { color: #fff3b2; border-color: rgba(255,216,77,.75); }
    .chip-warn { color: #ffdcdc; border-color: rgba(255,95,122,.7); }

    .box {
      background: rgba(3,14,28,.72);
      border: 1px solid rgba(95,145,203,.34);
      border-radius: 16px;
      padding: 13px;
      margin: 10px 0;
      color: #e8f3ff;
      font-size: 13px;
      line-height: 1.6;
      max-height: 150px;
      overflow: hidden;
    }

    .trade-status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.45;
      background: rgba(4, 18, 34, .72);
      border: 1px solid rgba(95,145,203,.34);
    }

    .trade-status.green { color: #d8fff0; border-color: rgba(45,245,157,.75); }
    .trade-status.orange { color: #ffe2b0; border-color: rgba(255,184,77,.75); }
    .trade-status.blue { color: #cdefff; border-color: rgba(69,202,255,.75); }
    .trade-status.red { color: #ffd6d6; border-color: rgba(255,95,122,.75); }
    .trade-status.violet { color: #efeaff; border-color: rgba(185,167,255,.75); }

    .levels, .modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 13px;
    }

    .level {
      background: linear-gradient(180deg, rgba(7,27,52,.92), rgba(4,17,33,.94));
      border: 1px solid rgba(71,124,187,.44);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      font-weight: 950;
    }

    .entry { color: var(--yellow); }
    .tp { color: var(--green); }
    .sl { color: var(--red); }
    .rr { color: var(--blue); }

    .footer {
      margin-top: 13px;
      display: flex;
      justify-content: space-between;
      color: #b9d6f8;
      font-size: 12px;
      border-top: 1px solid rgba(80,120,170,.35);
      padding-top: 11px;
    }

    .empty, .error {
      background: rgba(16,38,66,.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .error {
      color: #ffd6d6;
      border-color: rgba(255,95,122,.72);
    }

    .event-banner {
      display: none;
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      font-weight: 900;
      line-height: 1.45;
      background: rgba(8, 25, 48, .96);
      border: 1px solid var(--border);
    }

    .event-banner.show { display: block; animation: bannerPulse 1s ease-in-out 2; }

    @keyframes bannerPulse {
      50% { transform: scale(1.01); border-color: var(--borderStrong); }
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(10px);
      z-index: 999;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(1240px, 100%);
      max-height: 94vh;
      overflow: auto;
      background:
        radial-gradient(circle at 90% 0%, rgba(69,202,255,.18), transparent 34%),
        linear-gradient(160deg, rgba(24,58,103,.98), rgba(5,17,33,.98) 72%);
      border: 1px solid rgba(124,184,255,.62);
      border-radius: 26px;
      box-shadow: 0 34px 110px rgba(0,0,0,.68);
      padding: 24px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: clamp(24px, 3vw, 34px);
      margin: 0 0 6px;
    }

    .modal-section-title {
      margin: 20px 0 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: 12px;
      font-weight: 950;
    }

    .modal-text {
      max-height: none;
      overflow: visible;
      font-size: 14px;
    }

    .chart-wrap {
      margin: 16px 0;
      border: 1px solid rgba(95,145,203,.42);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(2,10,20,.88);
    }

    .chart-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      border-bottom: 1px solid rgba(95,145,203,.3);
      background: rgba(8,25,48,.9);
    }

    .tf-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
    }

    .legend-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(95,145,203,.3);
      background: rgba(5,18,34,.74);
    }

    .legend-item {
      border: 1px solid rgba(95,145,203,.28);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
      color: #dbeeff;
      background: rgba(3,14,28,.55);
    }

    .chart {
      height: 520px;
      width: 100%;
      position: relative;
    }

    .chart-note {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      border-top: 1px solid rgba(95,145,203,.3);
    }

    .diagnostics { display: none; margin-top: 12px; }
    .diagnostics.open { display: block; }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(1,8,18,.9);
      border: 1px solid rgba(95,145,203,.34);
      border-radius: 16px;
      padding: 14px;
      color: #dceeff;
      font-size: 12px;
      max-height: 260px;
      overflow: auto;
    }

    @media (max-width: 1120px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .legend-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .page { padding: 22px 14px 44px; }
      .hero { flex-direction: column; }
      .grid, .stats, .modal-grid, .legend-grid { grid-template-columns: 1fr; }
      .modal-backdrop { padding: 10px; }
      .chart { height: 390px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>AI-идеи по рынку</h1>
        <div class="subtitle">
          Entry / SL / TP фиксируются. Описание обновляется только при важном событии: вход, TP, SL, отмена или упущенный вход.
        </div>
      </div>
      <a class="home-link" href="/">На главную</a>
    </header>

    <section class="controls">
      <select id="pairFilter"><option value="ALL">Все пары</option></select>
      <select id="signalFilter">
        <option value="ALL">Все сигналы</option>
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
        <option value="WAIT">WAIT</option>
        <option value="MISSED">Момент упущен</option>
        <option value="CLOSED">Архив</option>
      </select>
      <button id="refreshBtn">Обновить</button>
    </section>

    <section id="eventBanner" class="event-banner"></section>

    <section class="stats">
      <div class="stat"><div class="stat-label">BUY</div><div class="stat-value" id="buyCount">0</div></div>
      <div class="stat"><div class="stat-label">SELL</div><div class="stat-value" id="sellCount">0</div></div>
      <div class="stat"><div class="stat-label">WAIT</div><div class="stat-value" id="waitCount">0</div></div>
      <div class="stat"><div class="stat-label">Архив</div><div class="stat-value" id="closedCount">0</div></div>
      <div class="stat"><div class="stat-label">Winrate</div><div class="stat-value" id="winrateValue">—</div></div>
    </section>

    <section id="statusBox" class="empty">Загрузка сигналов...</section>
    <section id="ideasGrid" class="grid"></section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle" class="modal-title">Сигнал</h2>
          <div id="modalSubtitle" class="subtitle"></div>
        </div>
        <button id="closeModalBtn">Закрыть</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const POLL_INTERVAL_MS = 120000;
    const IMPORTANT_STATUSES = new Set(["ACTIVE", "MISSED", "CLOSED_TP", "CLOSED_SL", "WAIT"]);

    const state = {
      ideas: [],
      archive: [],
      previous: {},
      selectedPair: "ALL",
      selectedSignal: "ALL",
      activeIdea: null,
      chart: null,
    };

    const pairFilter = document.getElementById("pairFilter");
    const signalFilter = document.getElementById("signalFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusBox = document.getElementById("statusBox");
    const ideasGrid = document.getElementById("ideasGrid");
    const eventBanner = document.getElementById("eventBanner");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalContent = document.getElementById("modalContent");

    pairFilter.addEventListener("change", () => {
      state.selectedPair = pairFilter.value;
      render();
    });

    signalFilter.addEventListener("change", () => {
      state.selectedSignal = signalFilter.value;
      render();
    });

    refreshBtn.addEventListener("click", () => loadSignals(true));
    closeModalBtn.addEventListener("click", closeModal);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    async function loadSignals(manual = false) {
      if (manual) {
        statusBox.style.display = "block";
        statusBox.className = "empty";
        statusBox.textContent = "Обновление сигналов...";
      }

      try {
        let response = await fetch("/api/signals", { cache: "no-store" });

        if (!response.ok) {
          response = await fetch("/api/ideas", { cache: "no-store" });
        }

        if (!response.ok) throw new Error("HTTP " + response.status);

        const data = await response.json();

        const newIdeas = normalizeIdeas(data);
        const newArchive = normalizeArchive(data);

        detectImportantEvents(newIdeas, newArchive);

        state.ideas = newIdeas;
        state.archive = newArchive;

        fillPairFilter([...state.ideas, ...state.archive]);
        render();

        if (manual) statusBox.style.display = "none";
      } catch (error) {
        statusBox.style.display = "block";
        statusBox.className = "error";
        statusBox.textContent = "Не удалось загрузить сигналы: " + error.message;
      }
    }

    function detectImportantEvents(newIdeas, newArchive) {
      const all = [...newIdeas, ...newArchive];

      for (const idea of all) {
        const id = idea.id || idea.idea_id || idea.symbol;
        const old = state.previous[id];
        const status = idea.runtime_status || idea.status || "WAIT";

        if (!old) {
          state.previous[id] = { status };
          continue;
        }

        if (old.status !== status && IMPORTANT_STATUSES.has(status)) {
          const text = buildEventExplanation(idea, old.status, status);
          showEvent(text, idea.runtime_color || statusToColor(status));
          playAlert(status);
          markCardAnimated(id, idea.runtime_color || statusToColor(status));
        }

        state.previous[id] = { status };
      }
    }

    function buildEventExplanation(idea, oldStatus, newStatus) {
      const symbol = normalizeSymbol(idea.symbol || idea.pair);
      const signal = normalizeSignal(idea.final_signal || idea.signal);
      const price = formatValue(idea.current_price ?? idea.price);
      const entry = formatValue(idea.entry ?? idea.entry_price);
      const sl = formatValue(idea.sl ?? idea.stop_loss);
      const tp = formatValue(idea.tp ?? idea.take_profit);

      if (newStatus === "ACTIVE") {
        return `${symbol}: идея стала актуальной. Цена рядом с Entry ${entry}. Можно рассматривать вход только с контролем риска. Текущая цена ${price}.`;
      }

      if (newStatus === "MISSED") {
        return `${symbol}: момент входа упущен. Цена сильно ушла от Entry ${entry}. Вход не рекомендован, потому что риск стал хуже исходного сценария.`;
      }

      if (newStatus === "CLOSED_TP") {
        return `${symbol}: достигнут TP ${tp}. Идея закрыта в плюс и должна уйти в архив. Движение подтвердило сценарий ${signal}.`;
      }

      if (newStatus === "CLOSED_SL") {
        return `${symbol}: достигнут SL ${sl}. Идея закрыта в минус и должна уйти в архив. Сценарий отменён рынком.`;
      }

      return `${symbol}: статус изменился с ${oldStatus} на ${newStatus}.`;
    }

    function showEvent(text, color) {
      eventBanner.textContent = text;
      eventBanner.className = "event-banner show";
      eventBanner.style.borderColor = cssColor(color);
      eventBanner.style.color = cssColor(color);

      setTimeout(() => {
        eventBanner.className = "event-banner";
      }, 10000);
    }

    function playAlert(status) {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audio.createOscillator();
        const gain = audio.createGain();

        const frequency =
          status === "CLOSED_TP" ? 880 :
          status === "CLOSED_SL" ? 220 :
          status === "MISSED" ? 440 :
          660;

        oscillator.frequency.value = frequency;
        oscillator.type = "sine";
        gain.gain.value = 0.08;

        oscillator.connect(gain);
        gain.connect(audio.destination);

        oscillator.start();

        setTimeout(() => {
          oscillator.stop();
          audio.close();
        }, 300);
      } catch (error) {}
    }

    function markCardAnimated(id, color) {
      setTimeout(() => {
        const card = document.querySelector(`[data-idea-id="${CSS.escape(id)}"]`);
        if (!card) return;

        card.classList.remove("pulse-green", "pulse-blue", "pulse-red", "pulse-orange");
        card.classList.add(`pulse-${normalizePulseColor(color)}`);

        setTimeout(() => {
          card.classList.remove("pulse-green", "pulse-blue", "pulse-red", "pulse-orange");
        }, 4000);
      }, 100);
    }

    function normalizeIdeas(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.signals)) return data.signals;
      if (Array.isArray(data.ideas)) return data.ideas;
      return [];
    }

    function normalizeArchive(data) {
      if (Array.isArray(data.archive)) return data.archive;
      if (Array.isArray(data.closed_ideas)) return data.closed_ideas;
      return [];
    }

    function fillPairFilter(ideas) {
      const current = pairFilter.value || "ALL";
      const symbols = Array.from(new Set(ideas.map((item) => normalizeSymbol(item.symbol || item.pair)).filter(Boolean))).sort();

      pairFilter.innerHTML = '<option value="ALL">Все пары</option>';

      for (const symbol of symbols) {
        const option = document.createElement("option");
        option.value = symbol;
        option.textContent = symbol;
        pairFilter.appendChild(option);
      }

      if (symbols.includes(current)) pairFilter.value = current;
      else {
        pairFilter.value = "ALL";
        state.selectedPair = "ALL";
      }
    }

    function render() {
      const ideas = getFilteredIdeas();
      updateStats();
      ideasGrid.innerHTML = "";

      if (!ideas.length) {
        statusBox.style.display = "block";
        statusBox.className = "empty";
        statusBox.textContent = "Нет идей под выбранные фильтры.";
        return;
      }

      statusBox.style.display = "none";

      for (const idea of ideas) {
        ideasGrid.appendChild(renderCard(idea));
      }
    }

    function getFilteredIdeas() {
      const all = state.selectedSignal === "CLOSED"
        ? state.archive
        : [...state.ideas, ...state.archive];

      return all.filter((idea) => {
        const symbol = normalizeSymbol(idea.symbol || idea.pair);
        const signal = normalizeSignal(idea.final_signal || idea.signal);
        const runtime = idea.runtime_status || idea.status || "WAIT";

        if (state.selectedPair !== "ALL" && symbol !== state.selectedPair) return false;
        if (state.selectedSignal === "ALL") return !String(runtime).startsWith("CLOSED");
        if (state.selectedSignal === "MISSED") return runtime === "MISSED";
        if (state.selectedSignal === "CLOSED") return String(runtime).startsWith("CLOSED");
        return signal === state.selectedSignal && !String(runtime).startsWith("CLOSED");
      });
    }

    function updateStats() {
      const active = state.ideas.filter((i) => !String(i.runtime_status || i.status || "").startsWith("CLOSED"));
      const closed = state.archive.concat(state.ideas.filter((i) => String(i.runtime_status || i.status || "").startsWith("CLOSED")));

      const buy = active.filter((i) => normalizeSignal(i.final_signal || i.signal) === "BUY").length;
      const sell = active.filter((i) => normalizeSignal(i.final_signal || i.signal) === "SELL").length;
      const wait = active.filter((i) => normalizeSignal(i.final_signal || i.signal) === "WAIT").length;

      const tp = closed.filter((i) => String(i.result || i.close_reason || i.status || "").includes("TP")).length;
      const sl = closed.filter((i) => String(i.result || i.close_reason || i.status || "").includes("SL")).length;
      const total = tp + sl;

      document.getElementById("buyCount").textContent = buy;
      document.getElementById("sellCount").textContent = sell;
      document.getElementById("waitCount").textContent = wait;
      document.getElementById("closedCount").textContent = closed.length;
      document.getElementById("winrateValue").textContent = total > 0 ? `${Math.round((tp / total) * 100)}%` : "—";
    }

    function renderCard(idea) {
      const id = idea.id || idea.idea_id || idea.symbol;
      const symbol = normalizeSymbol(idea.symbol || idea.pair || "MARKET");
      const signal = normalizeSignal(idea.final_signal || idea.signal);
      const confidence = numberOrDash(idea.final_confidence ?? idea.confidence);
      const source = idea.source || "unknown";
      const dataStatus = idea.data_status || "unknown";
      const price = idea.current_price ?? idea.price ?? idea.entry_price ?? idea.entry;
      const summary = idea.summary_ru || idea.summary || idea.ai_explanation || idea.full_text || "Описание отсутствует.";
      const warning = humanizeWarning(idea.warning_ru || "");
      const runtime = idea.runtime_status || idea.status || "WAIT";
      const color = idea.runtime_color || statusToColor(runtime);

      const card = document.createElement("article");
      card.className = "card";
      card.tabIndex = 0;
      card.dataset.ideaId = id;
      card.style.borderColor = cssColor(color);

      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="symbol">${escapeHtml(symbol)}</div>
            <div class="signal-line">
              Итоговый сигнал:
              <span class="${getSignalClass(signal, runtime)}">${escapeHtml(signal)}</span>
              · Уверенность: ${escapeHtml(String(confidence))}%
            </div>
          </div>
          <span class="badge ${getBadgeClass(signal, runtime)}">${escapeHtml(getBadgeText(signal, runtime))}</span>
        </div>

        <div class="chip-row">
          <span class="chip ${source === "twelvedata_ws" ? "chip-live" : "chip-rest"}">
            ${source === "twelvedata_ws" ? "LIVE WS" : "Резервная цена"}
          </span>
          <span class="chip">${escapeHtml(dataStatus)}</span>
          ${warning ? '<span class="chip chip-warn">warning</span>' : ""}
        </div>

        <div class="trade-status ${color}">
          ${escapeHtml(idea.runtime_text || idea.runtime_status_text || "Статус идеи уточняется.")}
        </div>

        <div class="box">${escapeHtml(summary)}</div>
        ${warning ? `<div class="box">${escapeHtml(warning)}</div>` : ""}

        <div class="levels">
          <div class="level entry">Price: ${formatValue(price)}</div>
          <div class="level entry">Entry: ${formatValue(idea.entry ?? idea.entry_price)}</div>
          <div class="level sl">SL: ${formatValue(idea.sl ?? idea.stop_loss)}</div>
          <div class="level tp">TP: ${formatValue(idea.tp ?? idea.take_profit)}</div>
          <div class="level rr">RR: ${formatValue(idea.rr ?? idea.risk_reward)}</div>
          <div class="level">Status: ${escapeHtml(runtime)}</div>
        </div>

        <div class="footer">
          <span>${escapeHtml(idea.source_symbol || symbol)}</span>
          <span>${formatDate(idea.meaningful_updated_at || idea.updated_at || idea.created_at)}</span>
        </div>
      `;

      card.addEventListener("click", () => openModal(idea));
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") openModal(idea);
      });

      return card;
    }

    function openModal(idea) {
      state.activeIdea = idea;

      const symbol = normalizeSymbol(idea.symbol || idea.pair || "MARKET");
      const signal = normalizeSignal(idea.final_signal || idea.signal);
      const source = idea.source || "unknown";
      const dataStatus = idea.data_status || "unknown";
      const confidence = numberOrDash(idea.final_confidence ?? idea.confidence);
      const summary = idea.summary_ru || idea.summary || idea.ai_explanation || idea.full_text || "Описание отсутствует.";
      const warning = humanizeWarning(idea.warning_ru || "");
      const runtime = idea.runtime_status || idea.status || "WAIT";
      const color = idea.runtime_color || statusToColor(runtime);

      modalTitle.innerHTML = `${escapeHtml(symbol)} · <span class="${getSignalClass(signal, runtime)}">${escapeHtml(signal)}</span>`;
      modalSubtitle.textContent = `Источник: ${source === "twelvedata_ws" ? "Live WebSocket" : "Резервная цена REST"} · Статус данных: ${dataStatus} · Уверенность: ${confidence}%`;

      modalContent.innerHTML = `
        <div class="chip-row">
          <span class="chip ${source === "twelvedata_ws" ? "chip-live" : "chip-rest"}">
            ${source === "twelvedata_ws" ? "LIVE WS" : "Резервная цена"}
          </span>
          <span class="chip">${escapeHtml(dataStatus)}</span>
          ${warning ? '<span class="chip chip-warn">warning</span>' : ""}
        </div>

        <div class="modal-section-title">Статус входа</div>
        <div class="trade-status ${color}">
          ${escapeHtml(idea.runtime_text || idea.runtime_status_text || "Статус идеи уточняется.")}
        </div>

        <div class="modal-section-title">Основная идея</div>
        <div class="box modal-text">${escapeHtml(summary)}</div>

        ${warning ? `<div class="modal-section-title">Источник цены</div><div class="box modal-text">${escapeHtml(warning)}</div>` : ""}

        <div class="modal-section-title">График и разметка</div>
        <div class="chart-wrap">
          <div class="chart-toolbar">
            <button class="tf-btn" onclick="loadChartForActiveIdea('M15')">M15</button>
            <button class="tf-btn" onclick="loadChartForActiveIdea('H1')">H1</button>
            <button class="tf-btn" onclick="loadChartForActiveIdea('H4')">H4</button>
          </div>

          <div class="legend-grid">
            <div class="legend-item" style="color:#ffd84d">ENTRY — фиксированная точка входа</div>
            <div class="legend-item" style="color:#ff5f7a">SL — отмена идеи</div>
            <div class="legend-item" style="color:#31f59d">TP — цель идеи</div>
            <div class="legend-item" style="color:#45caff">Liquidity — вероятные стопы</div>
            <div class="legend-item" style="color:#b9a7ff">OB — зона крупного игрока</div>
            <div class="legend-item" style="color:#ffb84d">FVG — дисбаланс движения</div>
          </div>

          <div id="chartBox" class="chart"></div>
          <div id="chartLegend" class="chart-note">Загрузка графика...</div>
        </div>

        <div class="modal-section-title">Торговые уровни</div>
        <div class="modal-grid">
          <div class="level entry">Price: ${formatValue(idea.current_price ?? idea.price)}</div>
          <div class="level entry">Entry: ${formatValue(idea.entry ?? idea.entry_price)}</div>
          <div class="level sl">SL: ${formatValue(idea.sl ?? idea.stop_loss)}</div>
          <div class="level tp">TP: ${formatValue(idea.tp ?? idea.take_profit)}</div>
          <div class="level rr">RR: ${formatValue(idea.rr ?? idea.risk_reward)}</div>
          <div class="level">Status: ${escapeHtml(runtime)}</div>
        </div>

        <button id="diagnosticsToggle">Показать диагностику</button>
        <div id="diagnosticsBox" class="diagnostics">
          <pre>${escapeHtml(JSON.stringify(idea.diagnostics || {}, null, 2))}</pre>
        </div>
      `;

      modalBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";

      document.getElementById("diagnosticsToggle").addEventListener("click", () => {
        const box = document.getElementById("diagnosticsBox");
        box.classList.toggle("open");
        document.getElementById("diagnosticsToggle").textContent = box.classList.contains("open")
          ? "Скрыть диагностику"
          : "Показать диагностику";
      });

      setTimeout(() => loadChartForActiveIdea("M15"), 100);
    }

    async function loadChartForActiveIdea(tf) {
      if (!state.activeIdea) return;

      const symbol = normalizeSymbol(state.activeIdea.symbol || state.activeIdea.pair);
      const chartBox = document.getElementById("chartBox");
      const legend = document.getElementById("chartLegend");

      chartBox.innerHTML = "";
      legend.textContent = "Загрузка свечей и разметки...";

      try {
        const response = await fetch(`/api/candles/${symbol}?tf=${encodeURIComponent(tf)}&limit=160`, { cache: "no-store" });

        if (!response.ok) {
          legend.textContent = `График недоступен: /api/candles вернул HTTP ${response.status}.`;
          return;
        }

        const payload = await response.json();
        const candles = Array.isArray(payload.candles) ? payload.candles : [];

        if (!candles.length) {
          legend.textContent = humanizeWarning(payload.warning_ru || "Свечи не получены.");
          return;
        }

        drawChart(chartBox, legend, payload, state.activeIdea);
      } catch (error) {
        legend.textContent = "Ошибка загрузки графика: " + error.message;
      }
    }

    function drawChart(container, legend, payload, idea) {
      container.innerHTML = "";

      if (!window.LightweightCharts) {
        legend.textContent = "Библиотека графика не загрузилась. Проверь интернет/CDN.";
        return;
      }

      const chart = LightweightCharts.createChart(container, {
        layout: {
          background: { color: "#050e1c" },
          textColor: "#b9d6f8",
        },
        grid: {
          vertLines: { color: "rgba(120,160,210,0.08)" },
          horzLines: { color: "rgba(120,160,210,0.08)" },
        },
        rightPriceScale: { borderColor: "rgba(120,160,210,0.25)" },
        timeScale: { borderColor: "rgba(120,160,210,0.25)", timeVisible: true },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      });

      state.chart = chart;

      const candleSeries = chart.addCandlestickSeries({
        upColor: "#31f59d",
        downColor: "#ff5f7a",
        borderUpColor: "#31f59d",
        borderDownColor: "#ff5f7a",
        wickUpColor: "#31f59d",
        wickDownColor: "#ff5f7a",
      });

      const candles = payload.candles.map((c) => ({
        time: normalizeCandleTime(c.time),
        open: Number(c.open),
        high: Number(c.high),
        low: Number(c.low),
        close: Number(c.close),
      })).filter((c) =>
        Number.isFinite(c.time) &&
        Number.isFinite(c.open) &&
        Number.isFinite(c.high) &&
        Number.isFinite(c.low) &&
        Number.isFinite(c.close)
      );

      candleSeries.setData(candles);

      addPriceLine(candleSeries, idea.entry ?? idea.entry_price, "ENTRY", "#ffd84d", 3);
      addPriceLine(candleSeries, idea.sl ?? idea.stop_loss, "SL", "#ff5f7a", 3);
      addPriceLine(candleSeries, idea.tp ?? idea.take_profit, "TP", "#31f59d", 3);

      addAnnotations(chart, payload.annotations || {}, candles, candleSeries);

      chart.timeScale().fitContent();

      const ms = payload.market_structure || {};
      legend.innerHTML = `
        <b>${escapeHtml(payload.symbol || "")} ${escapeHtml(payload.timeframe || "")}</b> ·
        Структура: ${escapeHtml(ms.trend || "neutral")} ·
        Ликвидность рядом: ${escapeHtml(ms.near_liquidity || "none")}
        <br>
        На графике оставлены только ключевые уровни и последние зоны, чтобы не было нагромождения.
      `;
    }

    function addPriceLine(series, price, title, color, width = 2) {
      const value = Number(price);
      if (!Number.isFinite(value)) return;

      series.createPriceLine({
        price: value,
        color,
        lineWidth: width,
        lineStyle: LightweightCharts.LineStyle.Solid,
        axisLabelVisible: true,
        title,
      });
    }

    function addAnnotations(chart, annotations, candles, candleSeries) {
      if (!candles.length) return;

      const firstTime = candles[Math.max(0, candles.length - 80)].time;
      const lastTime = candles[candles.length - 1].time;

      for (const level of (annotations.levels || []).slice(0, 3)) {
        const price = Number(level.price);
        if (!Number.isFinite(price)) continue;

        const line = chart.addLineSeries({
          color:
            level.type === "support" ? "#31f59d" :
            level.type === "resistance" ? "#ff5f7a" :
            "#45caff",
          lineWidth: 2,
          lineStyle: LightweightCharts.LineStyle.Dashed,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        line.setData([{ time: firstTime, value: price }, { time: lastTime, value: price }]);
      }

      for (const zone of (annotations.liquidity || []).slice(-4)) {
        const price = Number(zone.price);
        if (!Number.isFinite(price)) continue;

        const line = chart.addLineSeries({
          color: zone.type === "buy_side_liquidity" ? "#45caff" : "#b9a7ff",
          lineWidth: 2,
          lineStyle: LightweightCharts.LineStyle.Dotted,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        line.setData([{ time: firstTime, value: price }, { time: lastTime, value: price }]);
      }

      addCleanZones(chart, annotations.order_blocks || [], firstTime, lastTime, "OB");
      addCleanZones(chart, annotations.imbalances || [], firstTime, lastTime, "FVG");

      const markers = [];
      for (const pattern of annotations.patterns || []) {
        markers.push({
          time: normalizeCandleTime(pattern.time),
          position: String(pattern.type || "").includes("bullish") ? "belowBar" : "aboveBar",
          color: String(pattern.type || "").includes("bullish") ? "#31f59d" : "#ff5f7a",
          shape: String(pattern.type || "").includes("bullish") ? "arrowUp" : "arrowDown",
          text: pattern.label || pattern.type || "pattern",
        });
      }

      candleSeries.setMarkers(markers.filter((m) => Number.isFinite(m.time)));
    }

    function addCleanZones(chart, zones, firstTime, lastTime, typeLabel) {
      const selected = zones.slice(-2);

      for (const zone of selected) {
        const from = Number(zone.from);
        const to = Number(zone.to);

        if (!Number.isFinite(from) || !Number.isFinite(to)) continue;

        const top = Math.max(from, to);
        const bottom = Math.min(from, to);
        const mid = (top + bottom) / 2;
        const isBullish = String(zone.type || "").includes("bullish");

        const color =
          typeLabel === "OB"
            ? isBullish ? "#b9a7ff" : "#ff9fb0"
            : isBullish ? "#ffb84d" : "#ff7a4d";

        const topLine = chart.addLineSeries({
          color,
          lineWidth: 3,
          lineStyle: LightweightCharts.LineStyle.Solid,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        const bottomLine = chart.addLineSeries({
          color,
          lineWidth: 3,
          lineStyle: LightweightCharts.LineStyle.Solid,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        const midLine = chart.addLineSeries({
          color,
          lineWidth: 1,
          lineStyle: LightweightCharts.LineStyle.Dotted,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        topLine.setData([{ time: firstTime, value: top }, { time: lastTime, value: top }]);
        bottomLine.setData([{ time: firstTime, value: bottom }, { time: lastTime, value: bottom }]);
        midLine.setData([{ time: firstTime, value: mid }, { time: lastTime, value: mid }]);
      }
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      document.body.style.overflow = "";
      modalContent.innerHTML = "";
      state.chart = null;
    }

    function getBadgeClass(signal, runtimeStatus) {
      if (String(runtimeStatus).startsWith("CLOSED")) return "badge-closed";
      if (runtimeStatus === "MISSED") return "badge-missed";
      if (signal === "BUY") return "badge-buy";
      if (signal === "SELL") return "badge-sell";
      return "badge-wait";
    }

    function getBadgeText(signal, runtimeStatus) {
      if (String(runtimeStatus).startsWith("CLOSED")) return "ARCHIVE";
      if (runtimeStatus === "MISSED") return "MISSED";
      return signal;
    }

    function getSignalClass(signal, runtimeStatus) {
      if (String(runtimeStatus).startsWith("CLOSED")) return "closed-text";
      if (runtimeStatus === "MISSED") return "missed-text";
      if (signal === "BUY") return "buy-text";
      if (signal === "SELL") return "sell-text";
      return "wait-text";
    }

    function humanizeWarning(text) {
      const value = String(text || "");
      if (!value) return "";

      const lower = value.toLowerCase();

      if (lower.includes("credits") || lower.includes("limit") || lower.includes("quota")) {
        return "TwelveData лимит на сегодня исчерпан. Свежие REST-свечи/цены временно недоступны до обновления лимита.";
      }

      if (lower.includes("rest fallback") || lower.includes("not websocket") || lower.includes("резервная цена")) {
        return "Резервная цена: WebSocket сейчас не прислал live-тик, поэтому система взяла цену через TwelveData REST.";
      }

      return value;
    }

    function statusToColor(status) {
      if (status === "ACTIVE") return "green";
      if (status === "MISSED") return "orange";
      if (status === "CLOSED_TP") return "blue";
      if (status === "CLOSED_SL") return "red";
      return "violet";
    }

    function normalizePulseColor(color) {
      if (["green", "blue", "red", "orange"].includes(color)) return color;
      return "blue";
    }

    function cssColor(color) {
      if (color === "green") return "#31f59d";
      if (color === "blue") return "#45caff";
      if (color === "red") return "#ff5f7a";
      if (color === "orange") return "#ffb84d";
      return "#b9a7ff";
    }

    function normalizeSignal(value) {
      const signal = String(value || "WAIT").toUpperCase();
      if (signal.includes("BUY")) return "BUY";
      if (signal.includes("SELL")) return "SELL";
      return "WAIT";
    }

    function normalizeSymbol(value) {
      return String(value || "")
        .toUpperCase()
        .replace("/", "")
        .replace("-", "")
        .replace("_", "")
        .replace(/\s+/g, "")
        .trim();
    }

    function normalizeCandleTime(value) {
      if (typeof value === "number") return value;
      const asNumber = Number(value);
      if (Number.isFinite(asNumber)) return asNumber;
      const parsed = Date.parse(value);
      if (Number.isFinite(parsed)) return Math.floor(parsed / 1000);
      return NaN;
    }

    function numberOrDash(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";
      return Math.round(number);
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return escapeHtml(String(value));
      if (Math.abs(number) >= 100) return number.toFixed(3);
      if (Math.abs(number) >= 10) return number.toFixed(4);
      return number.toFixed(5);
    }

    function formatPercent(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";
      return number.toFixed(3) + "%";
    }

    function formatDate(value) {
      if (!value) return "—";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleString("ru-RU");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    window.loadChartForActiveIdea = loadChartForActiveIdea;

    loadSignals(true);
    setInterval(() => loadSignals(false), POLL_INTERVAL_MS);
  </script>
</body>
