<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-идеи по рынку</title>

  <style>
    :root {
      --bg-0: #030712;
      --bg-1: #071426;
      --bg-2: #0b2341;
      --card-1: rgba(20, 52, 92, 0.95);
      --card-2: rgba(8, 22, 42, 0.96);
      --border: rgba(99, 157, 230, 0.32);
      --border-strong: rgba(124, 184, 255, 0.62);
      --text: #f4f8ff;
      --muted: #9db8da;
      --green: #31f59d;
      --red: #ff5f7a;
      --yellow: #ffd84d;
      --blue: #45caff;
      --violet: #b9a7ff;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 18% 4%, rgba(65, 139, 255, 0.28), transparent 32%),
        radial-gradient(circle at 82% 14%, rgba(45, 245, 157, 0.12), transparent 28%),
        radial-gradient(circle at 52% 100%, rgba(185, 167, 255, 0.12), transparent 34%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 42%, #020814 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 75%);
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 34px 30px 70px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 3vw, 44px);
      letter-spacing: -0.04em;
      line-height: 1.04;
      text-shadow: 0 8px 30px rgba(69, 202, 255, 0.2);
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      background: linear-gradient(180deg, rgba(42, 82, 139, .9), rgba(17, 35, 64, .92));
      box-shadow: 0 12px 30px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.12);
      font-weight: 800;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 22px 0;
      flex-wrap: wrap;
    }

    select,
    button {
      height: 44px;
      background: linear-gradient(180deg, rgba(22, 50, 91, .95), rgba(10, 27, 51, .95));
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 16px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.08);
      cursor: pointer;
      outline: none;
    }

    button:hover,
    select:hover,
    .home-link:hover {
      border-color: var(--border-strong);
      filter: brightness(1.08);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0 18px;
    }

    .stat {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(28, 64, 113, .95), rgba(9, 24, 45, .96)),
        radial-gradient(circle at top right, rgba(69, 202, 255, .18), transparent 42%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      min-height: 86px;
      box-shadow: 0 18px 42px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.08);
    }

    .stat::after {
      content: "";
      position: absolute;
      inset: auto -30px -48px auto;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(69, 202, 255, .18), transparent 70%);
      border-radius: 999px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 900;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .card {
      position: relative;
      overflow: hidden;
      min-height: 390px;
      background:
        radial-gradient(circle at 85% 0%, rgba(69, 202, 255, .16), transparent 34%),
        linear-gradient(155deg, var(--card-1), var(--card-2) 68%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 17px;
      box-shadow:
        0 22px 54px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,.11);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.006);
      border-color: var(--border-strong);
      box-shadow:
        0 28px 68px rgba(0,0,0,.5),
        0 0 0 1px rgba(69, 202, 255, .08),
        inset 0 1px 0 rgba(255,255,255,.13);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,.08) 45%, transparent 58%);
      transform: translateX(-140%);
      transition: transform .75s ease;
    }

    .card:hover::before {
      transform: translateX(140%);
    }

    .card-content {
      position: relative;
      z-index: 1;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .symbol {
      font-size: 17px;
      font-weight: 950;
      letter-spacing: .08em;
    }

    .signal-line {
      margin-top: 5px;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
    }

    .badge {
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28), 0 12px 24px rgba(0,0,0,.24);
    }

    .badge-buy {
      color: #00150c;
      background: linear-gradient(180deg, #54ffb5, var(--green));
    }

    .badge-sell {
      color: #fff;
      background: linear-gradient(180deg, #d93f5b, #8f2034);
      border: 1px solid rgba(255, 95, 122, .75);
    }

    .badge-wait {
      color: #efeaff;
      background: linear-gradient(180deg, #5266bd, #293c78);
      border: 1px solid rgba(185, 167, 255, .65);
    }

    .buy-text { color: var(--green); }
    .sell-text { color: var(--red); }
    .wait-text { color: var(--violet); }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0 14px;
    }

    .chip {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(6, 24, 46, .88);
      color: #d7ecff;
      border: 1px solid rgba(58, 112, 176, .55);
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .chip-live {
      color: #d8fff0;
      border-color: rgba(45, 245, 157, .75);
      background: rgba(16, 80, 61, .45);
    }

    .chip-rest {
      color: #fff3b2;
      border-color: rgba(255, 216, 77, .75);
      background: rgba(94, 75, 14, .42);
    }

    .chip-warn {
      color: #ffdcdc;
      border-color: rgba(255, 95, 122, .7);
      background: rgba(90, 23, 39, .42);
    }

    .box {
      background: rgba(3, 14, 28, .68);
      border: 1px solid rgba(95, 145, 203, .34);
      border-radius: 16px;
      padding: 13px;
      margin: 10px 0;
      color: #e8f3ff;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .levels {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 13px;
    }

    .level {
      background: linear-gradient(180deg, rgba(7, 27, 52, .92), rgba(4, 17, 33, .94));
      border: 1px solid rgba(71, 124, 187, .44);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      font-weight: 950;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .entry { color: var(--yellow); }
    .tp { color: var(--green); }
    .sl { color: var(--red); }
    .rr { color: var(--blue); }

    .footer {
      margin-top: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #b9d6f8;
      font-size: 12px;
      border-top: 1px solid rgba(80, 120, 170, .35);
      padding-top: 11px;
    }

    .empty,
    .error {
      background: rgba(16, 38, 66, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      color: var(--muted);
      margin-bottom: 14px;
      box-shadow: 0 18px 42px rgba(0,0,0,.24);
    }

    .error {
      color: #ffd6d6;
      border-color: rgba(255, 95, 122, .72);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(31, 82, 142, .28), transparent 48%),
        rgba(0, 0, 0, .74);
      backdrop-filter: blur(10px);
      z-index: 999;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(1060px, 100%);
      max-height: 92vh;
      overflow: auto;
      background:
        radial-gradient(circle at 90% 0%, rgba(69, 202, 255, .18), transparent 34%),
        linear-gradient(160deg, rgba(24, 58, 103, .98), rgba(5, 17, 33, .98) 72%);
      border: 1px solid rgba(124, 184, 255, .62);
      border-radius: 26px;
      box-shadow:
        0 34px 110px rgba(0,0,0,.68),
        inset 0 1px 0 rgba(255,255,255,.12);
      padding: 24px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: clamp(24px, 3vw, 34px);
      margin: 0 0 6px;
      letter-spacing: -0.04em;
    }

    .close-btn {
      height: 42px;
      border-radius: 999px;
      padding: 0 16px;
      background: linear-gradient(180deg, rgba(42, 82, 139, .9), rgba(17, 35, 64, .92));
      border: 1px solid var(--border-strong);
      color: var(--text);
      font-weight: 900;
    }

    .modal-section-title {
      margin: 20px 0 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: 12px;
      font-weight: 950;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    .big-idea {
      font-size: 15px;
      line-height: 1.7;
      padding: 16px;
    }

    .diagnostics {
      display: none;
      margin-top: 12px;
    }

    .diagnostics.open {
      display: block;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(1, 8, 18, .9);
      border: 1px solid rgba(95, 145, 203, .34);
      border-radius: 16px;
      padding: 14px;
      color: #dceeff;
      font-size: 12px;
      max-height: 260px;
      overflow: auto;
    }

    @media (max-width: 1120px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .page { padding: 22px 14px 44px; }
      .hero { flex-direction: column; }
      .grid,
      .stats,
      .modal-grid {
        grid-template-columns: 1fr;
      }
      .modal-backdrop {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>AI-идеи по рынку</h1>
        <div class="subtitle">
          Live цены через TwelveData WebSocket + REST fallback. Нажми на карточку, чтобы открыть полный обзор.
        </div>
      </div>
      <a class="home-link" href="/">На главную</a>
    </header>

    <section class="controls">
      <select id="pairFilter">
        <option value="ALL">Все пары</option>
      </select>

      <select id="signalFilter">
        <option value="ALL">Все сигналы</option>
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
        <option value="WAIT">WAIT</option>
      </select>

      <button id="refreshBtn">Обновить</button>
    </section>

    <section class="stats">
      <div class="stat">
        <div class="stat-label">BUY</div>
        <div class="stat-value" id="buyCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">SELL</div>
        <div class="stat-value" id="sellCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">WAIT</div>
        <div class="stat-value" id="waitCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Источник</div>
        <div class="stat-value" id="sourceCount">—</div>
      </div>
    </section>

    <section id="statusBox" class="empty">Загрузка сигналов...</section>
    <section id="ideasGrid" class="grid"></section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle" class="modal-title">Сигнал</h2>
          <div id="modalSubtitle" class="subtitle"></div>
        </div>
        <button id="closeModalBtn" class="close-btn">Закрыть</button>
      </div>

      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const state = {
      ideas: [],
      selectedPair: "ALL",
      selectedSignal: "ALL",
    };

    const pairFilter = document.getElementById("pairFilter");
    const signalFilter = document.getElementById("signalFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusBox = document.getElementById("statusBox");
    const ideasGrid = document.getElementById("ideasGrid");

    const modalBackdrop = document.getElementById("modalBackdrop");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalContent = document.getElementById("modalContent");

    pairFilter.addEventListener("change", () => {
      state.selectedPair = pairFilter.value;
      render();
    });

    signalFilter.addEventListener("change", () => {
      state.selectedSignal = signalFilter.value;
      render();
    });

    refreshBtn.addEventListener("click", loadSignals);
    closeModalBtn.addEventListener("click", closeModal);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    async function loadSignals() {
      statusBox.style.display = "block";
      statusBox.className = "empty";
      statusBox.textContent = "Загрузка сигналов...";
      ideasGrid.innerHTML = "";

      try {
        const response = await fetch("/api/signals", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();
        state.ideas = normalizeIdeas(data);
        fillPairFilter(state.ideas);
        render();
      } catch (error) {
        statusBox.style.display = "block";
        statusBox.className = "error";
        statusBox.textContent = "Не удалось загрузить /api/signals: " + error.message;
      }
    }

    function normalizeIdeas(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.signals)) return data.signals;
      if (Array.isArray(data.ideas)) return data.ideas;
      return [];
    }

    function fillPairFilter(ideas) {
      const current = pairFilter.value || "ALL";
      const symbols = Array.from(
        new Set(
          ideas
            .map((item) => normalizeSymbol(item.symbol || item.pair))
            .filter(Boolean)
        )
      ).sort();

      pairFilter.innerHTML = '<option value="ALL">Все пары</option>';

      for (const symbol of symbols) {
        const option = document.createElement("option");
        option.value = symbol;
        option.textContent = symbol;
        pairFilter.appendChild(option);
      }

      if (symbols.includes(current)) {
        pairFilter.value = current;
      } else {
        pairFilter.value = "ALL";
        state.selectedPair = "ALL";
      }
    }

    function render() {
      const ideas = filteredIdeas();

      updateStats(state.ideas);
      ideasGrid.innerHTML = "";

      if (!ideas.length) {
        statusBox.style.display = "block";
        statusBox.className = "empty";
        statusBox.textContent = "Нет сигналов под выбранные фильтры.";
        return;
      }

      statusBox.style.display = "none";

      for (const idea of ideas) {
        ideasGrid.appendChild(renderCard(idea));
      }
    }

    function filteredIdeas() {
      return state.ideas.filter((idea) => {
        const symbol = normalizeSymbol(idea.symbol || idea.pair);
        const signal = normalizeSignal(idea.final_signal || idea.signal);

        if (state.selectedPair !== "ALL" && symbol !== state.selectedPair) return false;
        if (state.selectedSignal !== "ALL" && signal !== state.selectedSignal) return false;

        return true;
      });
    }

    function updateStats(ideas) {
      const buy = ideas.filter((i) => normalizeSignal(i.final_signal || i.signal) === "BUY").length;
      const sell = ideas.filter((i) => normalizeSignal(i.final_signal || i.signal) === "SELL").length;
      const wait = ideas.filter((i) => normalizeSignal(i.final_signal || i.signal) === "WAIT").length;
      const ws = ideas.filter((i) => i.source === "twelvedata_ws").length;
      const rest = ideas.filter((i) => i.source === "twelvedata_rest_quote").length;

      document.getElementById("buyCount").textContent = buy;
      document.getElementById("sellCount").textContent = sell;
      document.getElementById("waitCount").textContent = wait;
      document.getElementById("sourceCount").textContent = `WS ${ws} / REST ${rest}`;
    }

    function renderCard(idea) {
      const symbol = normalizeSymbol(idea.symbol || idea.pair || "MARKET");
      const signal = normalizeSignal(idea.final_signal || idea.signal);
      const confidence = numberOrDash(idea.final_confidence ?? idea.confidence);
      const source = idea.source || "unknown";
      const dataStatus = idea.data_status || "unknown";
      const price = idea.current_price ?? idea.price ?? idea.entry_price ?? idea.entry;
      const dayChange = idea.day_change_percent;
      const summary = idea.summary_ru || idea.summary || idea.short_text || "Описание сигнала отсутствует.";
      const warning = idea.warning_ru || "";
      const badgeClass = signal === "BUY" ? "badge-buy" : signal === "SELL" ? "badge-sell" : "badge-wait";
      const signalClass = signal === "BUY" ? "buy-text" : signal === "SELL" ? "sell-text" : "wait-text";

      const card = document.createElement("article");
      card.className = "card";
      card.tabIndex = 0;

      card.innerHTML = `
        <div class="card-content">
          <div class="card-head">
            <div>
              <div class="symbol">${escapeHtml(symbol)}</div>
              <div class="signal-line">
                Итоговый сигнал:
                <span class="${signalClass}">${escapeHtml(signal)}</span>
                · Уверенность: ${escapeHtml(String(confidence))}%
              </div>
            </div>
            <span class="badge ${badgeClass}">${escapeHtml(signal)}</span>
          </div>

          <div class="chip-row">
            <span class="chip ${source === "twelvedata_ws" ? "chip-live" : "chip-rest"}">
              ${source === "twelvedata_ws" ? "LIVE WS" : "REST fallback"}
            </span>
            <span class="chip">${escapeHtml(dataStatus)}</span>
            <span class="chip">${escapeHtml(idea.setup_quality || "LIVE")}</span>
            ${warning ? '<span class="chip chip-warn">warning</span>' : ""}
          </div>

          <div class="box">${escapeHtml(summary)}</div>
          ${warning ? `<div class="box">${escapeHtml(warning)}</div>` : ""}

          <div class="levels">
            <div class="level entry">Price: ${formatValue(price)}</div>
            <div class="level entry">Entry: ${formatValue(idea.entry ?? idea.entry_price)}</div>
            <div class="level sl">SL: ${formatValue(idea.sl ?? idea.stop_loss)}</div>
            <div class="level tp">TP: ${formatValue(idea.tp ?? idea.take_profit)}</div>
            <div class="level rr">RR: ${formatValue(idea.rr ?? idea.risk_reward)}</div>
            <div class="level">Day %: ${formatPercent(dayChange)}</div>
          </div>

          <div class="footer">
            <span>${escapeHtml(idea.source_symbol || symbol)}</span>
            <span>${formatDate(idea.meaningful_updated_at || idea.updated_at)}</span>
          </div>
        </div>
      `;

      card.addEventListener("click", () => openModal(idea));
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") openModal(idea);
      });

      return card;
    }

    function openModal(idea) {
      const symbol = normalizeSymbol(idea.symbol || idea.pair || "MARKET");
      const signal = normalizeSignal(idea.final_signal || idea.signal);
      const source = idea.source || "unknown";
      const dataStatus = idea.data_status || "unknown";
      const confidence = numberOrDash(idea.final_confidence ?? idea.confidence);
      const summary = idea.summary_ru || idea.summary || idea.full_text || "Описание отсутствует.";
      const warning = idea.warning_ru || "";
      const signalClass = signal === "BUY" ? "buy-text" : signal === "SELL" ? "sell-text" : "wait-text";

      modalTitle.innerHTML = `${escapeHtml(symbol)} · <span class="${signalClass}">${escapeHtml(signal)}</span>`;
      modalSubtitle.textContent = `Источник: ${source} · Статус данных: ${dataStatus} · Уверенность: ${confidence}%`;

      modalContent.innerHTML = `
        <div class="chip-row">
          <span class="chip ${source === "twelvedata_ws" ? "chip-live" : "chip-rest"}">
            ${source === "twelvedata_ws" ? "LIVE WS" : "REST fallback"}
          </span>
          <span class="chip">${escapeHtml(dataStatus)}</span>
          <span class="chip">${escapeHtml(idea.setup_quality || "quality")}</span>
          <span class="chip">${escapeHtml(idea.risk_filter || "risk filter")}</span>
          ${warning ? '<span class="chip chip-warn">warning</span>' : ""}
        </div>

        <div class="modal-section-title">Основная идея</div>
        <div class="box big-idea">${escapeHtml(summary)}</div>

        ${warning ? `
          <div class="modal-section-title">Предупреждение</div>
          <div class="box">${escapeHtml(warning)}</div>
        ` : ""}

        <div class="modal-section-title">Торговые уровни</div>
        <div class="modal-grid">
          <div class="level entry">Price: ${formatValue(idea.current_price ?? idea.price)}</div>
          <div class="level entry">Entry: ${formatValue(idea.entry ?? idea.entry_price)}</div>
          <div class="level sl">SL: ${formatValue(idea.sl ?? idea.stop_loss)}</div>
          <div class="level tp">TP: ${formatValue(idea.tp ?? idea.take_profit)}</div>
          <div class="level rr">RR: ${formatValue(idea.rr ?? idea.risk_reward)}</div>
          <div class="level">Day %: ${formatPercent(idea.day_change_percent)}</div>
        </div>

        <div class="modal-section-title">Данные сигнала</div>
        <div class="modal-grid">
          <div class="level">Signal: ${escapeHtml(signal)}</div>
          <div class="level">Confidence: ${escapeHtml(String(confidence))}%</div>
          <div class="level">Status: ${escapeHtml(idea.status || "—")}</div>
          <div class="level">Symbol: ${escapeHtml(symbol)}</div>
          <div class="level">Source symbol: ${escapeHtml(idea.source_symbol || "—")}</div>
          <div class="level">Updated: ${escapeHtml(formatDate(idea.meaningful_updated_at || idea.updated_at))}</div>
        </div>

        <div class="modal-section-title">Режим сигнала</div>
        <div class="box">
          Это предварительный системный сигнал на основе live/REST данных TwelveData.
          Полный candles engine, OB/FVG и новостной слой сейчас отключены для стабильности Render.
        </div>

        <button class="close-btn" id="diagnosticsToggle">Показать диагностику</button>
        <div id="diagnosticsBox" class="diagnostics">
          <pre>${escapeHtml(JSON.stringify(idea.diagnostics || {}, null, 2))}</pre>
        </div>
      `;

      modalBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";

      const diagnosticsToggle = document.getElementById("diagnosticsToggle");
      const diagnosticsBox = document.getElementById("diagnosticsBox");

      diagnosticsToggle.addEventListener("click", () => {
        diagnosticsBox.classList.toggle("open");
        diagnosticsToggle.textContent = diagnosticsBox.classList.contains("open")
          ? "Скрыть диагностику"
          : "Показать диагностику";
      });
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      document.body.style.overflow = "";
    }

    function normalizeSignal(value) {
      const signal = String(value || "WAIT").toUpperCase();

      if (signal.includes("BUY")) return "BUY";
      if (signal.includes("SELL")) return "SELL";

      return "WAIT";
    }

    function normalizeSymbol(value) {
      return String(value || "")
        .toUpperCase()
        .replace("/", "")
        .replace("-", "")
        .replace("_", "")
        .replace(/\s+/g, "")
        .trim();
    }

    function numberOrDash(value) {
      if (value === null || value === undefined || value === "") return "—";

      const number = Number(value);

      if (!Number.isFinite(number)) return "—";

      return Math.round(number);
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === "") return "—";

      const number = Number(value);

      if (!Number.isFinite(number)) return escapeHtml(String(value));

      if (Math.abs(number) >= 100) return number.toFixed(3);
      if (Math.abs(number) >= 10) return number.toFixed(4);

      return number.toFixed(5);
    }

    function formatPercent(value) {
      if (value === null || value === undefined || value === "") return "—";

      const number = Number(value);

      if (!Number.isFinite(number)) return "—";

      return number.toFixed(3) + "%";
    }

    function formatDate(value) {
      if (!value) return "—";

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) return "—";

      return date.toLocaleString("ru-RU");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadSignals();
    setInterval(loadSignals, 30000);
  </script>
</body>
</html>
