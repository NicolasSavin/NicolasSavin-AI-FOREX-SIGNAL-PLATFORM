<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-идеи по рынку</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #0b1730;
      --panel-2: #0d1b34;
      --border: #1d2c47;
      --text: #ffffff;
      --muted: #9fb0c7;
      --tag: #13233c;
      --accent: #facc15;
      --green: #22c55e;
      --red: #ef4444;
      --violet: #8b5cf6;
      --cyan: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .topbar-left h1 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.1;
    }

    .topbar-left p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .home-link {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      background: #13233c;
      border: 1px solid #233553;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 380px));
      justify-content: start;
      gap: 14px;
    }

    .card {
      width: 100%;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #2b436d;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .symbol {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .meta {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .watch-btn {
      border: none;
      background: var(--accent);
      color: #111827;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .summary {
      margin: 0 0 12px;
      color: #d7e0ee;
      font-size: 13px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 70px;
    }

    .preview-box {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      margin: 0 0 12px;
      border: 1px solid #162744;
      background: #091325;
    }

    .preview-button {
      width: 100%;
      display: block;
      padding: 0;
      margin: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .preview-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #0a1220;
    }

    .preview-svg {
      width: 100%;
      height: 180px;
      display: block;
      background: #08111f;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: var(--tag);
      color: #dbe7f7;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      line-height: 1;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 1000;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(1100px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      background: #0b1730;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .modal-top h2 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .modal-sub {
      color: var(--muted);
      font-size: 14px;
    }

    .close-btn {
      border: none;
      background: #13233c;
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-image,
    .modal-svg-wrap {
      width: 100%;
      min-height: 320px;
      border-radius: 16px;
      display: block;
      margin-bottom: 18px;
      background: #111827;
      border: 1px solid #162744;
      overflow: hidden;
    }

    .modal-image {
      max-height: 620px;
      object-fit: contain;
    }

    .modal-svg {
      width: 100%;
      height: 560px;
      display: block;
      background: #08111f;
    }

    .section {
      margin-bottom: 16px;
    }

    .section.hidden {
      display: none;
    }

    .section-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: #eef4ff;
      white-space: pre-line;
    }

    .empty {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      color: var(--muted);
      font-size: 14px;
      max-width: 380px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .modal-card {
        padding: 16px;
      }

      .modal-image,
      .modal-svg {
        min-height: 220px;
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="topbar-left">
        <h1>AI-идеи по рынку</h1>
        <p>В списке только короткие карточки. Полный разбор и график открываются по клику.</p>
      </div>
      <a class="home-link" href="/">На главную</a>
    </div>

    <div id="ideas-grid" class="grid"></div>
  </div>

  <div id="idea-modal" class="modal">
    <div class="modal-card">
      <div class="modal-top">
        <div>
          <h2 id="modal-title">Идея</h2>
          <div id="modal-sub" class="modal-sub"></div>
        </div>
        <button id="close-modal" class="close-btn">Закрыть</button>
      </div>

      <img id="modal-image" class="modal-image" alt="График" style="display:none;" />
      <div id="modal-svg-wrap" class="modal-svg-wrap" style="display:none;"></div>

      <div id="section-summary" class="section">
        <div class="section-title">СВОДКА</div>
        <p id="modal-summary" class="section-text"></p>
      </div>

      <div id="section-technical" class="section">
        <div class="section-title">ТЕХНИЧЕСКАЯ ЛОГИКА</div>
        <p id="modal-technical" class="section-text"></p>
      </div>

      <div id="section-volume" class="section">
        <div class="section-title">АНАЛИЗ ОБЪЁМОВ</div>
        <p id="modal-volume" class="section-text"></p>
      </div>

      <div id="section-cdelta" class="section">
        <div class="section-title">КУМУЛЯТИВНАЯ ДЕЛЬТА</div>
        <p id="modal-cdelta" class="section-text"></p>
      </div>

      <div id="section-patterns" class="section">
        <div class="section-title">АНАЛИЗ ПАТТЕРНОВ</div>
        <p id="modal-patterns" class="section-text"></p>
      </div>

      <div id="section-smc" class="section">
        <div class="section-title">SMC / ICT</div>
        <p id="modal-smc" class="section-text"></p>
      </div>

      <div id="section-liquidity" class="section">
        <div class="section-title">АНАЛИЗ ЛИКВИДНОСТИ</div>
        <p id="modal-liquidity" class="section-text"></p>
      </div>

      <div id="section-options" class="section">
        <div class="section-title">ОПЦИОННЫЙ АНАЛИЗ</div>
        <p id="modal-options" class="section-text"></p>
      </div>

      <div id="section-scenario" class="section">
        <div class="section-title">СЦЕНАРИЙ</div>
        <p id="modal-scenario" class="section-text"></p>
      </div>

      <div id="section-targets" class="section">
        <div class="section-title">ЦЕЛИ</div>
        <p id="modal-targets" class="section-text"></p>
      </div>

      <div id="section-invalidation" class="section">
        <div class="section-title">ИНВАЛИДАЦИЯ</div>
        <p id="modal-invalidation" class="section-text"></p>
      </div>
    </div>
  </div>

  <script>
    const ideasGrid = document.getElementById("ideas-grid");
    const modal = document.getElementById("idea-modal");
    const closeModalBtn = document.getElementById("close-modal");

    const modalTitle = document.getElementById("modal-title");
    const modalSub = document.getElementById("modal-sub");
    const modalImage = document.getElementById("modal-image");
    const modalSvgWrap = document.getElementById("modal-svg-wrap");

    const modalSummary = document.getElementById("modal-summary");
    const modalTechnical = document.getElementById("modal-technical");
    const modalVolume = document.getElementById("modal-volume");
    const modalCDelta = document.getElementById("modal-cdelta");
    const modalPatterns = document.getElementById("modal-patterns");
    const modalSmc = document.getElementById("modal-smc");
    const modalLiquidity = document.getElementById("modal-liquidity");
    const modalOptions = document.getElementById("modal-options");
    const modalScenario = document.getElementById("modal-scenario");
    const modalTargets = document.getElementById("modal-targets");
    const modalInvalidation = document.getElementById("modal-invalidation");

    const sectionSummary = document.getElementById("section-summary");
    const sectionTechnical = document.getElementById("section-technical");
    const sectionVolume = document.getElementById("section-volume");
    const sectionCDelta = document.getElementById("section-cdelta");
    const sectionPatterns = document.getElementById("section-patterns");
    const sectionSmc = document.getElementById("section-smc");
    const sectionLiquidity = document.getElementById("section-liquidity");
    const sectionOptions = document.getElementById("section-options");
    const sectionScenario = document.getElementById("section-scenario");
    const sectionTargets = document.getElementById("section-targets");
    const sectionInvalidation = document.getElementById("section-invalidation");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeIdeas(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data?.ideas)) return data.ideas;
      if (Array.isArray(data?.items)) return data.items;
      if (Array.isArray(data?.signals)) return data.signals;
      return [];
    }

    function getDirectionRu(value) {
      const raw = String(value || "").trim().toLowerCase();
      if (["bullish", "buy", "long", "рост"].includes(raw)) return "БЫЧИЙ";
      if (["bearish", "sell", "short", "снижение"].includes(raw)) return "МЕДВЕЖИЙ";
      if (["neutral", "watch", "flat", "range"].includes(raw)) return "НЕЙТРАЛЬНЫЙ";
      return String(value || "НЕЙТРАЛЬНЫЙ").toUpperCase();
    }

    function getTimeframeRu(value) {
      const raw = String(value || "").trim();
      if (!raw) return "Интрадей";
      if (raw.toLowerCase() === "intraday") return "Интрадей";
      return raw;
    }

    function translateChartLabel(label) {
      const raw = String(label || "").trim().toLowerCase();

      if (raw === "range") return "Диапазон";
      if (raw === "upper liquidity") return "Верхняя ликвидность";
      if (raw === "lower liquidity") return "Нижняя ликвидность";
      if (raw === "fvg") return "FVG";
      if (raw === "imbalance") return "Имбаланс";
      if (raw === "bullish_ob") return "Бычий ордерблок";
      if (raw === "bearish_ob") return "Медвежий ордерблок";
      if (raw === "demand") return "Зона спроса";
      if (raw === "supply") return "Зона предложения";
      if (raw === "buy_zone") return "Зона покупок";
      if (raw === "sell_zone") return "Зона продаж";

      return String(label || "");
    }

    function normalizeImagePath(idea) {
      let src =
        idea.chart_image ||
        idea.image ||
        idea.chart_url ||
        idea.chartImage ||
        "";

      if (!src) return "";

      src = String(src).trim();

      if (src.startsWith("http://") || src.startsWith("https://")) return src;
      if (src.startsWith("/static/")) return src;
      if (src.startsWith("static/")) return "/" + src;
      if (src.startsWith("/generated_charts/")) return "/static" + src;
      if (src.startsWith("generated_charts/")) return "/static/" + src;

      if (src.includes("generated_charts/")) {
        const idx = src.indexOf("generated_charts/");
        return "/static/" + src.slice(idx);
      }

      return src.startsWith("/") ? src : "/static/" + src;
    }

    function shouldUseImage(src) {
      if (!src) return false;
      return !src.includes("default-chart.png");
    }

    function getText(...values) {
      for (const value of values) {
        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return String(value).trim();
        }
      }
      return "";
    }

    function setSection(sectionEl, textEl, text) {
      const value = getText(text);
      if (!value) {
        sectionEl.classList.add("hidden");
        textEl.textContent = "";
        return;
      }
      sectionEl.classList.remove("hidden");
      textEl.textContent = value;
    }

    function colorByZoneType(type) {
      const raw = String(type || "").toLowerCase();
      if (["demand", "bullish_ob", "buy_zone"].includes(raw)) {
        return { fill: "rgba(34,197,94,0.18)", stroke: "#22c55e" };
      }
      if (["supply", "bearish_ob", "sell_zone"].includes(raw)) {
        return { fill: "rgba(239,68,68,0.18)", stroke: "#ef4444" };
      }
      if (["fvg", "imbalance"].includes(raw)) {
        return { fill: "rgba(139,92,246,0.18)", stroke: "#8b5cf6" };
      }
      return { fill: "rgba(56,189,248,0.16)", stroke: "#38bdf8" };
    }

    function renderSvgChart(idea, height = 560) {
      const chart = idea?.chart || {};
      const zones = Array.isArray(chart.zones) ? chart.zones : [];
      const levels = Array.isArray(chart.levels) ? chart.levels : [];
      const path = Array.isArray(chart.path) ? chart.path : [];

      const width = 1000;
      const h = height;
      const px = (x) => (Number(x || 0) / 100) * width;
      const py = (y) => (Number(y || 0) / 100) * h;

      const gridX = [];
      const gridY = [];
      for (let x = 0; x <= 100; x += 10) {
        gridX.push(`<line x1="${px(x)}" y1="0" x2="${px(x)}" y2="${h}" stroke="#13233c" stroke-width="1" />`);
      }
      for (let y = 0; y <= 100; y += 10) {
        gridY.push(`<line x1="0" y1="${py(y)}" x2="${width}" y2="${py(y)}" stroke="#13233c" stroke-width="1" />`);
      }

      const zoneSvg = zones.map((zone) => {
        const x1 = px(zone.x1 ?? 20);
        const y1 = py(zone.y1 ?? 30);
        const x2 = px(zone.x2 ?? 80);
        const y2 = py(zone.y2 ?? 60);
        const w = Math.max(0, x2 - x1);
        const hRect = Math.max(0, y2 - y1);
        const colors = colorByZoneType(zone.type);
        const label = translateChartLabel(zone.label || zone.type);

        return `
          <rect x="${x1}" y="${y1}" width="${w}" height="${hRect}" fill="${colors.fill}" stroke="${colors.stroke}" stroke-width="2" rx="8" />
          <text x="${x1 + 10}" y="${y1 + 20}" fill="#ffffff" font-size="16" font-weight="700">${escapeHtml(label)}</text>
        `;
      }).join("");

      const levelSvg = levels.map((level) => {
        const x = px(level.x ?? 80);
        const y = py(level.y ?? 50);
        const label = translateChartLabel(level.label);

        return `
          <line x1="${x - 46}" y1="${y}" x2="${x + 46}" y2="${y}" stroke="#ffffff" stroke-width="2" />
          <circle cx="${x}" cy="${y}" r="5" fill="#ffffff" />
          <text x="${x + 12}" y="${y - 10}" fill="#ffffff" font-size="15" font-weight="700">${escapeHtml(label)}</text>
        `;
      }).join("");

      let priceLine = "";
      let markers = "";

      if (path.length) {
        const points = path.map((p) => `${px(p.x)},${py(p.y)}`).join(" ");
        priceLine = `<polyline points="${points}" fill="none" stroke="#facc15" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />`;
        markers = path.map((p) => `<circle cx="${px(p.x)}" cy="${py(p.y)}" r="5" fill="#facc15" />`).join("");
      }

      const title = `${escapeHtml(idea.symbol || idea.instrument || "Идея")} · График AI-идеи`;

      return `
        <svg class="modal-svg" viewBox="0 0 ${width} ${h}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="График">
          <rect x="0" y="0" width="${width}" height="${h}" fill="#08111f" />
          ${gridX.join("")}
          ${gridY.join("")}
          <text x="26" y="30" fill="#ffffff" font-size="18" font-weight="700">${title}</text>
          ${zoneSvg}
          ${levelSvg}
          ${priceLine}
          ${markers}
        </svg>
      `;
    }

    function renderPreview(idea, small = false) {
      const src = normalizeImagePath(idea);

      if (shouldUseImage(src)) {
        const cls = small ? "preview-image" : "modal-image";
        return `<img class="${cls}" src="${escapeHtml(src)}" alt="График ${escapeHtml(idea.symbol || idea.instrument || "")}" />`;
      }

      const svg = renderSvgChart(idea, small ? 180 : 560);
      if (small) {
        return svg.replace('class="modal-svg"', 'class="preview-svg"');
      }
      return svg;
    }

    function openIdeaModal(idea) {
      const symbol = idea.symbol || idea.instrument || "Идея";
      const directionRu = getDirectionRu(idea.direction || idea.bias || "neutral");
      const timeframeRu = getTimeframeRu(idea.timeframe || "Intraday");
      const confidence = idea.confidence ?? "-";

      modalTitle.textContent = `${symbol} — ${directionRu}`;
      modalSub.textContent = `${timeframeRu} · Уверенность ${confidence}%`;

      const imageSrc = normalizeImagePath(idea);
      if (shouldUseImage(imageSrc)) {
        modalSvgWrap.style.display = "none";
        modalSvgWrap.innerHTML = "";
        modalImage.style.display = "block";
        modalImage.src = imageSrc;
        modalImage.alt = `График ${symbol}`;
      } else {
        modalImage.style.display = "none";
        modalImage.removeAttribute("src");
        modalSvgWrap.style.display = "block";
        modalSvgWrap.innerHTML = renderSvgChart(idea, 560);
      }

      setSection(sectionSummary, modalSummary,
        getText(idea.summary_ru, idea.summary, idea.description_ru, idea.description)
      );

      setSection(sectionTechnical, modalTechnical,
        getText(idea.technical_ru, idea.technical, idea.analysis?.fundamental_ru)
      );

      setSection(sectionVolume, modalVolume,
        getText(
          idea.analysis?.volume_ru,
          idea.volume_analysis_ru,
          idea.volumeAnalysisRu,
          idea.volume
        )
      );

      setSection(sectionCDelta, modalCDelta,
        getText(
          idea.analysis?.cumulative_delta_ru,
          idea.analysis?.cum_delta_ru,
          idea.cumulative_delta_ru,
          idea.cum_delta_ru,
          idea.cumulativeDeltaRu
        )
      );

      setSection(sectionPatterns, modalPatterns,
        getText(
          idea.analysis?.pattern_ru,
          idea.analysis?.patterns_ru,
          idea.pattern_analysis_ru,
          idea.patternAnalysisRu
        )
      );

      setSection(sectionSmc, modalSmc,
        getText(idea.analysis?.smc_ict_ru)
      );

      setSection(sectionLiquidity, modalLiquidity,
        getText(
          idea.analysis?.liquidity_ru,
          idea.liquidity_ru
        )
      );

      setSection(sectionOptions, modalOptions,
        getText(idea.options_ru, idea.options, idea.analysis?.options_ru)
      );

      setSection(sectionScenario, modalScenario,
        getText(
          idea.scenario_ru,
          idea.scenario,
          idea.trade_plan?.alternative_scenario_ru
        )
      );

      setSection(sectionTargets, modalTargets,
        getText(
          idea.targets_ru,
          idea.targets,
          [idea.trade_plan?.target_1, idea.trade_plan?.target_2].filter(Boolean).join(" / ")
        )
      );

      setSection(sectionInvalidation, modalInvalidation,
        getText(
          idea.invalidation_ru,
          idea.invalidation,
          idea.trade_plan?.invalidation
        )
      );

      modal.classList.add("open");
    }

    function closeIdeaModal() {
      modal.classList.remove("open");
      modalImage.style.display = "none";
      modalImage.removeAttribute("src");
      modalSvgWrap.style.display = "none";
      modalSvgWrap.innerHTML = "";
    }

    function renderIdeas(ideas) {
      if (!ideas.length) {
        ideasGrid.innerHTML = `<div class="empty">Идеи пока не найдены.</div>`;
        return;
      }

      ideasGrid.innerHTML = ideas.map((idea) => {
        const tags = Array.isArray(idea.tags) ? idea.tags : [];
        const summary = getText(idea.summary_ru, idea.summary, idea.description_ru, idea.description);
        const symbol = idea.symbol || idea.instrument || idea.pair || "";
        const direction = getDirectionRu(idea.direction || idea.bias || "neutral");
        const timeframe = getTimeframeRu(idea.timeframe || "Intraday");
        const confidence = idea.confidence ?? "-";

        return `
          <div class="card" data-idea='${escapeHtml(JSON.stringify(idea))}'>
            <div class="card-head">
              <div>
                <div class="symbol">${escapeHtml(symbol)}</div>
                <div class="meta">
                  ${escapeHtml(direction)} · ${escapeHtml(timeframe)} · ${escapeHtml(String(confidence))}%
                </div>
              </div>
              <button class="watch-btn" type="button">Открыть</button>
            </div>

            <div class="preview-box">
              <button class="preview-button" type="button">
                ${renderPreview(idea, true)}
              </button>
            </div>

            <p class="summary">${escapeHtml(summary)}</p>

            <div class="tags">
              ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("click", () => {
          const idea = JSON.parse(card.dataset.idea);
          openIdeaModal(idea);
        });
      });
    }

    async function loadIdeas() {
      try {
        const response = await fetch("/ideas/market", { cache: "no-store" });
        const data = await response.json();
        const ideas = normalizeIdeas(data);
        renderIdeas(ideas);
      } catch (error) {
        ideasGrid.innerHTML = `<div class="empty">Не удалось загрузить идеи.</div>`;
        console.error(error);
      }
    }

    closeModalBtn.addEventListener("click", closeIdeaModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeIdeaModal();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeIdeaModal();
    });

    loadIdeas();
  </script>
</body>
</html>
