<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-идеи по рынку</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --bg: #06111f;
      --panel: #102746;
      --panel2: #07182d;
      --border: rgba(95,156,230,.42);
      --borderStrong: rgba(124,184,255,.75);
      --text: #f4f8ff;
      --muted: #9bb8d8;
      --green: #31f59d;
      --red: #ff5f7a;
      --yellow: #ffd84d;
      --blue: #45caff;
      --violet: #b9a7ff;
      --orange: #ffb84d;
      --pattern: #ff5fb7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(54,130,255,.28), transparent 34%),
        radial-gradient(circle at 90% 10%, rgba(45,245,157,.12), transparent 30%),
        linear-gradient(145deg, #030814, #071426 45%, #020814);
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 34px 30px 70px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .ideas-page-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 24px;
      align-items: start;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 3.2vw, 46px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .home-link,
    select,
    button {
      background: linear-gradient(180deg, #183a68, #0b1f3d);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 16px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.1);
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 22px 0;
    }

    .ideas-performance-panel {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 20% 0%, rgba(49,245,157,.18), transparent 35%),
        linear-gradient(145deg, rgba(13,42,76,.92), rgba(5,18,34,.96));
      border: 1px solid rgba(95,156,230,.35);
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }

    .ideas-performance-panel__title {
      margin-bottom: 10px;
      color: rgba(219,238,255,.9);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .ideas-performance-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .ideas-performance-item {
      min-height: 54px;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(3,14,28,.72);
      border: 1px solid rgba(95,156,230,.25);
    }

    .ideas-performance-item span {
      display: block;
      margin-bottom: 4px;
      color: rgba(185,214,248,.72);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .ideas-performance-item strong {
      color: #f4f8ff;
      font-size: 20px;
      font-weight: 950;
    }

    .ideas-performance-item--tp strong {
      color: #31f59d;
    }

    .ideas-performance-item--sl strong {
      color: #ff5f7a;
    }

    .ideas-performance-item--expired strong {
      color: #ffd84d;
    }

    .ideas-performance-item--winrate strong {
      color: #45caff;
    }

    .stats,
    .ideas-stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .stat,
    .ideas-stat-card {
      background:
        radial-gradient(circle at 90% 20%, rgba(69,202,255,.12), transparent 34%),
        linear-gradient(145deg, rgba(18,43,78,.92), rgba(6,18,36,.96));
      border: 1px solid rgba(95,156,230,.25);
      border-radius: 14px;
      padding: 10px 12px;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
    }

    .stat-label,
    .ideas-stat-card__label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 900;
      opacity: .7;
      margin-bottom: 4px;
    }

    .stat-value,
    .ideas-stat-card__value {
      margin-top: 0;
      font-size: 20px;
      font-weight: 950;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .ideas-archive {
      margin-top: 28px;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(10,20,40,.9), rgba(5,12,24,.95));
      border: 1px solid rgba(255,255,255,.06);
    }

    .ideas-archive__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .ideas-archive__header h2 {
      margin: 0;
      font-size: 20px;
    }

    .ideas-archive__list {
      display: grid;
      gap: 10px;
      opacity: 0.75;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .idea-card--archived {
      opacity: 0.6;
      filter: grayscale(0.3);
    }

    .card {
      min-height: 430px;
      background:
        radial-gradient(circle at 85% 0%, rgba(69,202,255,.16), transparent 35%),
        linear-gradient(155deg, rgba(20,52,92,.96), rgba(7,22,42,.98) 70%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 17px;
      box-shadow: 0 22px 54px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.11);
      cursor: pointer;
      transition: .18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--borderStrong);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .symbol {
      font-size: 18px;
      font-weight: 950;
      letter-spacing: .08em;
    }

    .signal-line {
      margin-top: 5px;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
    }

    .badge {
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-buy { color: #00150c; background: linear-gradient(180deg, #54ffb5, var(--green)); }
    .badge-sell { color: #fff; background: linear-gradient(180deg, #d93f5b, #8f2034); }
    .badge-wait { color: #efeaff; background: linear-gradient(180deg, #5266bd, #293c78); }
    .badge-closed { color: #fff; background: linear-gradient(180deg, #708198, #36465d); }
    .badge-status-active-live { color: #052416; background: linear-gradient(180deg, #65ffbf, #24d98a); }
    .badge-status-active-missed { color: #fff8ef; background: linear-gradient(180deg, #ffb562, #d97706); }
    .badge-status-tp { color: #022616; background: linear-gradient(180deg, #8dffc9, #10b981); }
    .badge-status-sl { color: #fff2f5; background: linear-gradient(180deg, #ff7f99, #be123c); }
    .badge-status-wait { color: #efeaff; background: linear-gradient(180deg, #7e8bce, #384b92); }

    .buy-text { color: var(--green); }
    .sell-text { color: var(--red); }
    .wait-text { color: var(--violet); }
    .closed-text { color: var(--muted); }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0 14px;
    }

    .chip {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(6,24,46,.88);
      color: #d7ecff;
      border: 1px solid rgba(58,112,176,.55);
      font-weight: 900;
    }

    .box {
      background: rgba(3,14,28,.72);
      border: 1px solid rgba(95,145,203,.34);
      border-radius: 16px;
      padding: 13px;
      margin: 10px 0;
      color: #e8f3ff;
      font-size: 13px;
      line-height: 1.6;
      max-height: 150px;
      overflow: hidden;
    }

    .status-line {
      margin: 10px 0 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-reason {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(95,145,203,.34);
      background: rgba(3,14,28,.72);
      color: #d9e9ff;
      font-size: 12px;
      line-height: 1.55;
    }

    .archive-meta {
      margin-top: 8px;
      font-size: 12px;
      color: #95afca;
      line-height: 1.5;
    }

    .levels,
    .modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 13px;
    }

    .level {
      background: linear-gradient(180deg, rgba(7,27,52,.92), rgba(4,17,33,.94));
      border: 1px solid rgba(71,124,187,.44);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      font-weight: 950;
    }

    .entry { color: var(--yellow); }
    .tp { color: var(--green); }
    .sl { color: var(--red); }
    .rr { color: var(--blue); }

    .footer {
      margin-top: 13px;
      display: flex;
      justify-content: space-between;
      color: #b9d6f8;
      font-size: 12px;
      border-top: 1px solid rgba(80,120,170,.35);
      padding-top: 11px;
    }

    .empty,
    .error {
      background: rgba(16,38,66,.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .error {
      color: #ffd6d6;
      border-color: rgba(255,95,122,.72);
    }

    .modal-backdrop,
    .ideas-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.open,
    .ideas-modal.open {
      display: flex;
    }

    .modal,
    .ideas-modal__content {
      width: min(1400px, 92vw);
      height: 88vh;
      max-height: 88vh;
      overflow: auto;
      border-radius: 26px;
      background:
        radial-gradient(circle at 90% 0%, rgba(69,202,255,.18), transparent 34%),
        linear-gradient(160deg, rgba(24,58,103,.98), rgba(5,17,33,.98) 72%);
      border: 1px solid rgba(124,184,255,.62);
      box-shadow: 0 34px 110px rgba(0,0,0,.68);
      padding: 24px;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    .ideas-modal__content {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .modal-head,
    .ideas-modal__header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 0;
      padding: 0 0 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: clamp(24px, 3vw, 34px);
      margin: 0 0 6px;
    }

    .modal-section-title {
      margin: 20px 0 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: 12px;
      font-weight: 950;
    }

    .modal-text {
      max-height: none;
      overflow: visible;
      font-size: 14px;
    }

    .idea-fundamental-note {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(120,70,255,.18), rgba(0,10,30,.9));
      border: 1px solid rgba(120,70,255,.35);
      color: rgba(235,240,255,.9);
      font-size: 13px;
      line-height: 1.6;
    }

    .ideas-modal__body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .ideas-modal__body > *,
    #modalContent {
      min-height: 0;
    }

    .ideas-modal__body,
    .ideas-modal__content {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #modalContent {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px 4px 8px;
      overflow: auto;
      gap: 0;
    }

    .ideas-modal__top {
      flex: 0 0 auto;
      max-height: 30vh;
      overflow-y: auto;
      min-height: 0;
      padding-right: 4px;
    }

    .ideas-modal__top-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .ideas-toggle-summary-btn {
      border: 1px solid rgba(95,145,203,.4);
      border-radius: 999px;
      background: rgba(7, 23, 44, 0.92);
      color: #dbeeff;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
      transition: all .18s ease;
    }

    .ideas-toggle-summary-btn:hover {
      border-color: rgba(125,180,255,.66);
      box-shadow: 0 0 16px rgba(67, 136, 230, 0.25);
    }

    #modalContent.summary-collapsed .ideas-modal__top {
      display: none;
    }

    #modalContent.summary-collapsed .ideas-modal__chart-zone {
      flex: 1 1 100%;
    }

    .ideas-modal__chart-zone,
    .ideas-modal__bottom {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chart-wrap {
      margin: 12px 0 0;
      border: 1px solid rgba(95,145,203,.42);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(2,10,20,.88);
      flex: 1;
      min-height: 620px;
      max-height: 680px;
      display: flex;
      flex-direction: column;
    }

    .chart-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      border-bottom: 1px solid rgba(95,145,203,.3);
      background: rgba(8,25,48,.9);
    }
    .sentiment-badge {
      margin: 10px 10px 0;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(18, 27, 42, .72);
      color: var(--text);
      font-size: 12px;
    }

    .tf-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
    }

    .legend-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(95,145,203,.3);
      background: rgba(5,18,34,.74);
    }

    .legend-item {
      border: 1px solid rgba(95,145,203,.28);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
      color: #dbeeff;
      background: rgba(3,14,28,.55);
      font-weight: 800;
    }

    .chart {
      height: 620px;
      min-height: 620px;
      width: 100%;
      position: relative;
    }

    .ideas-modal__body .chart {
      flex: 1;
      min-height: 620px;
      height: 620px;
    }

    .ideas-modal__chart {
      flex: 1;
      min-height: 620px;
      width: 100%;
    }

    #ideaChart {
      height: 620px;
      min-height: 620px;
      width: 100%;
    }

    .ideas-modal__chart canvas,
    .ideas-modal__chart svg {
      width: 100% !important;
      height: 100% !important;
    }

    .chart-note {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      border-top: 1px solid rgba(95,145,203,.3);
    }

    .pro-idea-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .zone-ob {
      fill: rgba(255, 99, 132, 0.28);
      stroke: rgba(255, 99, 132, 0.75);
      stroke-width: 1.3;
      filter: drop-shadow(0 0 20px rgba(255, 99, 132, 0.38));
    }

    .zone-breaker {
      fill: rgba(255, 206, 86, 0.28);
      stroke: rgba(255, 206, 86, 0.75);
      stroke-width: 1.3;
      filter: drop-shadow(0 0 20px rgba(255, 206, 86, 0.38));
    }

    .zone-fvg {
      fill: rgba(54, 162, 235, 0.28);
      stroke: rgba(54, 162, 235, 0.75);
      stroke-width: 1.3;
      filter: drop-shadow(0 0 20px rgba(54, 162, 235, 0.38));
    }

    .zone-liquidity {
      stroke: rgba(75, 192, 192, 0.92);
      stroke-width: 2.4;
      stroke-dasharray: 6 4;
      filter: drop-shadow(0 0 16px rgba(75, 192, 192, 0.45));
    }

    .zone-label {
      font-size: 11px;
      font-weight: 900;
      fill: #ffffff;
      paint-order: stroke;
      stroke: rgba(0,0,0,.78);
      stroke-width: 3.8;
      letter-spacing: .03em;
      filter: drop-shadow(0 1px 5px rgba(0,0,0,.55));
    }

    .zone-ob + .zone-label {
      fill: rgba(255, 99, 132, 0.98);
    }

    .zone-breaker + .zone-label {
      fill: rgba(255, 206, 86, 0.98);
      stroke: rgba(26, 18, 0, 0.7);
    }

    .zone-fvg + .zone-label {
      fill: rgba(54, 162, 235, 0.98);
    }

    .zone-liquidity + .zone-label {
      fill: rgba(75, 192, 192, 0.98);
    }

    .chart-grid line {
      stroke: rgba(255,255,255,.06);
    }

    .chart-axis text {
      fill: rgba(220,235,255,.7);
      font-size: 11px;
    }


    @media (max-width: 1120px) {
      .grid, .ideas-archive__list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .legend-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 1180px) {
      .ideas-page-header {
        grid-template-columns: 1fr;
      }

      .ideas-performance-panel {
        margin-top: 10px;
      }
    }

    @media (max-width: 720px) {
      .ideas-performance-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .page { padding: 22px 14px 44px; }
      .hero { flex-direction: column; }
      .grid, .stats, .modal-grid, .legend-grid, .ideas-archive__list { grid-template-columns: 1fr; }
      .chart { height: 390px; }
    }

    @media (max-width: 768px) {
      .ideas-modal__top {
        max-height: 28vh;
      }
    }


/* FINAL FIX: Ideas modal chart visibility */
.modal-backdrop {
  position: fixed !important;
  inset: 0 !important;
  z-index: 9999 !important;
  display: none;
  align-items: center !important;
  justify-content: center !important;
  padding: 14px !important;
  background: rgba(0,0,0,.78) !important;
  backdrop-filter: blur(10px);
}

.modal-backdrop.open {
  display: flex !important;
}

.modal {
  width: min(1500px, 96vw) !important;
  height: 92vh !important;
  max-height: 92vh !important;
  overflow: hidden !important;
  padding: 16px !important;
  border-radius: 24px !important;
  display: flex !important;
  flex-direction: column !important;
}

.modal-head {
  flex: 0 0 auto !important;
  margin-bottom: 10px !important;
}

.modal-title {
  font-size: clamp(24px, 2.6vw, 36px) !important;
  margin-bottom: 4px !important;
}

#modalSubtitle {
  max-height: 44px !important;
  overflow: hidden !important;
  line-height: 1.35 !important;
}

#modalContent {
  min-height: 0 !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  flex: 1 !important;
  display: grid !important;
  grid-template-rows: auto 1fr !important;
  gap: 10px !important;
  scroll-behavior: smooth;
}

.chart-wrap {
  min-height: 500px !important;
  height: 100% !important;
  display: grid !important;
  grid-template-rows: auto auto 1fr auto !important;
  margin-top: 12px !important;
}

.chart-toolbar {
  padding: 8px !important;
}

.legend-grid {
  padding: 8px !important;
  grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
  gap: 6px !important;
}

.legend-item {
  padding: 6px 8px !important;
  font-size: 11px !important;
}

.chart,
#ideaChart {
  width: 100% !important;
  height: 500px !important;
  min-height: 500px !important;
}

.chart-note {
  padding: 6px 10px !important;
  font-size: 11px !important;
}

.chart-fullscreen-overlay {
  position: fixed;
  inset: 0;
  z-index: 12000;
  background: #020817;
  display: flex;
  flex-direction: column;
}

.chart-fullscreen-overlay[hidden] {
  display: none !important;
}

.chart-fullscreen-header {
  height: 52px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(2, 8, 23, .96);
  border-bottom: 1px solid rgba(95,156,230,.32);
}

.chart-fullscreen-header strong {
  color: #f4f8ff;
  font-size: 15px;
}

.chart-fullscreen-header button,

<body>
  <main class="page">
    <header class="ideas-page-header">
      <div class="ideas-page-header__main">
        <div class="hero">
          <div>
            <h1>AI-идеи по рынку</h1>
            <div class="subtitle">
              Entry / SL / TP фиксируются. График строится только по реальным свечам backend. Фейковые свечи отключены.
            </div>
          </div>
          <a class="home-link" href="/">На главную</a>
        </div>

        <section class="controls">
          <select id="pairFilter"><option value="ALL">Все пары</option></select>
          <select id="signalFilter">
            <option value="ALL">Все сигналы</option>
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
            <option value="WAIT">WAIT</option>
            <option value="CLOSED">Архив</option>
          </select>
          <button id="refreshBtn">Обновить</button>
        </section>
      </div>

      <aside class="ideas-performance-panel">
        <div class="ideas-performance-panel__title">Статистика идей</div>
        <div class="ideas-performance-grid">
          <div class="ideas-performance-item ideas-performance-item--tp">
            <span>Плюс</span>
            <strong id="ideasTpCount">0</strong>
          </div>
          <div class="ideas-performance-item ideas-performance-item--sl">
            <span>Минус</span>
            <strong id="ideasSlCount">0</strong>
          </div>
          <div class="ideas-performance-item ideas-performance-item--expired">
            <span>Не отработали</span>
            <strong id="ideasExpiredCount">0</strong>
          </div>
          <div class="ideas-performance-item">
            <span>Закрыто</span>
            <strong id="ideasClosedCount">0</strong>
          </div>
          <div class="ideas-performance-item ideas-performance-item--winrate">
            <span>Winrate</span>
            <strong id="ideasWinrate">0%</strong>
          </div>
        </div>
      </aside>
    </header>

    <section class="stats ideas-stats">
      <div class="stat ideas-stat-card"><div class="stat-label ideas-stat-card__label">BUY</div><div class="stat-value ideas-stat-card__value" id="buyCount">0</div></div>
      <div class="stat ideas-stat-card"><div class="stat-label ideas-stat-card__label">SELL</div><div class="stat-value ideas-stat-card__value" id="sellCount">0</div></div>
      <div class="stat ideas-stat-card"><div class="stat-label ideas-stat-card__label">WAIT</div><div class="stat-value ideas-stat-card__value" id="waitCount">0</div></div>
      <div class="stat ideas-stat-card"><div class="stat-label ideas-stat-card__label">Архив</div><div class="stat-value ideas-stat-card__value" id="closedCount">0</div></div>
      <div class="stat ideas-stat-card"><div class="stat-label ideas-stat-card__label">Всего</div><div class="stat-value ideas-stat-card__value" id="totalCount">0</div></div>
    </section>

    <section id="statusBox" class="empty">Загрузка идей...</section>
    <section id="ideasGrid" class="grid"></section>
    <section class="ideas-archive">
      <div class="ideas-archive__header">
        <h2>Архив идей</h2>
        <span id="archiveCount">0</span>
      </div>

      <div id="archiveList" class="ideas-archive__list"></div>
    </section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop ideas-modal">
    <div class="modal ideas-modal__content" role="dialog" aria-modal="true">
      <div class="modal-head ideas-modal__header">
        <div>
          <h2 id="modalTitle" class="modal-title">Идея</h2>
          <div id="modalSubtitle" class="subtitle"></div>
        </div>
        <button id="closeModalBtn">Закрыть</button>
      </div>
      <div class="ideas-modal__body">
        <div id="modalContent"></div>
      </div>
    </div>
  </div>

  <div class="chart-fullscreen-overlay" id="chartFullscreenOverlay" hidden>
    <div class="chart-fullscreen-header">
      <strong id="chartFullscreenTitle">График идеи</strong>
      <button type="button" id="chartFullscreenClose">Закрыть</button>
    </div>

    <div class="chart-fullscreen-body">
      <div class="chart-fullscreen-toolbar">
        <button id="fullscreenDescriptionToggle" type="button">Развернуть описание</button>
        <button id="chartFullscreenExit" type="button">Выйти из полноэкранного режима</button>
      </div>
      <div id="chartFullscreenDescription" class="chart-fullscreen-description" hidden>
        <button id="fullscreenDescriptionClose" type="button">Свернуть описание</button>
        <div id="chartFullscreenDescriptionText"></div>
      </div>
      <div id="ideaChartFullscreen" class="chart-fullscreen-container"></div>
    </div>
  </div>

  <script>
    console.log("IDEAS_HTML_VERSION_NO_SYNTHETIC_CANDLES_V8");

    const state = {
      ideas: [],
      archive: [],
      selectedPair: "ALL",
      selectedSignal: "ALL",
      activeIdea: null,
      chart: null,
      series: null,
      overlaySyncCleanup: null,
      currentTf: "M15",
      realCandlesCache: {},
      candlesRequestSeq: 0,
      isSummaryCollapsed: false,
      fullscreenChart: null,
      fullscreenOverlayCleanup: null,
    };

    const pairFilter = document.getElementById("pairFilter");
    const signalFilter = document.getElementById("signalFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusBox = document.getElementById("statusBox");
    const ideasGrid = document.getElementById("ideasGrid");
    const archiveList = document.getElementById("archiveList");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalContent = document.getElementById("modalContent");

    function getCurrentIdeaDescriptionText() {
      const idea = state.activeIdea || state.currentIdea || {};
      return (
        idea.summary ||
        idea.main_idea ||
        idea.description ||
        idea.reason ||
        idea.title ||
        "Описание идеи недоступно."
      );
    }

    function fillFullscreenDescription() {
      const el = document.getElementById("chartFullscreenDescriptionText");
      if (el) el.textContent = getCurrentIdeaDescriptionText();
    }

    function updateSummaryToggleButton() {
      const toggleBtn = document.getElementById("toggleSummaryBtn");
      if (!toggleBtn) return;
      toggleBtn.textContent = state.isSummaryCollapsed ? "Развернуть описание" : "Свернуть описание";
      toggleBtn.setAttribute("aria-expanded", String(!state.isSummaryCollapsed));
    }

    function applySummaryState() {
      if (!modalContent) return;
      modalContent.classList.toggle("summary-collapsed", state.isSummaryCollapsed);
      updateSummaryToggleButton();
      setTimeout(resizeIdeaChartSafely, 60);
    }

    function toggleSummarySection() {
      state.isSummaryCollapsed = !state.isSummaryCollapsed;
      applySummaryState();
    }

    pairFilter.addEventListener("change", () => {
      state.selectedPair = pairFilter.value;
      render();
    });

    signalFilter.addEventListener("change", () => {
      state.selectedSignal = signalFilter.value;
      render();
    });

    refreshBtn.addEventListener("click", () => loadIdeas(true));
    closeModalBtn.addEventListener("click", closeModal);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeChartFullscreen();
        closeModal();
      }
    });
    document.getElementById("chartFullscreenClose")?.addEventListener("click", closeChartFullscreen);
    document.getElementById("fullscreenDescriptionToggle")?.addEventListener("click", () => {
      fillFullscreenDescription();
      const panel = document.getElementById("chartFullscreenDescription");
      if (panel) panel.hidden = false;
    });
    document.getElementById("fullscreenDescriptionClose")?.addEventListener("click", () => {
      const panel = document.getElementById("chartFullscreenDescription");
      if (panel) panel.hidden = true;
    });
    document.getElementById("chartFullscreenExit")?.addEventListener("click", () => {
      if (typeof closeChartFullscreen === "function") {
        closeChartFullscreen();
      }
    });
    window.addEventListener("resize", () => {
      resizeIdeaChartSafely();
      resizeFullscreenChartSafely();
    });

    async function loadIdeas(manual = false) {
      if (manual) {
        statusBox.style.display = "block";
        statusBox.className = "empty";
        statusBox.textContent = "Обновление идей...";
      }

      try {
        let response = await fetch("/ideas/market?ts=" + Date.now(), { cache: "no-store" });
        if (!response.ok) response = await fetch("/api/ideas?ts=" + Date.now(), { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);

        const data = await response.json();

        state.ideas = Array.isArray(data) ? data : (data.ideas || data.signals || []);
        state.archive = Array.isArray(data.archive) ? data.archive : [];

        fillPairFilter([...state.ideas, ...state.archive]);
        render();
      } catch (error) {
        statusBox.style.display = "block";
        statusBox.className = "error";
        statusBox.textContent = "Не удалось загрузить идеи: " + error.message;
      }
    }

    function fillPairFilter(ideas) {
      const current = pairFilter.value || "ALL";
      const symbols = Array.from(new Set(ideas.map((i) => normalizeSymbol(i.symbol || i.pair)).filter(Boolean))).sort();

      pairFilter.innerHTML = '<option value="ALL">Все пары</option>';

      for (const symbol of symbols) {
        const option = document.createElement("option");
        option.value = symbol;
        option.textContent = symbol;
        pairFilter.appendChild(option);
      }

      pairFilter.value = symbols.includes(current) ? current : "ALL";
      state.selectedPair = pairFilter.value;
    }

    function render() {
      const { activeIdeas, archivedIdeas } = getFilteredIdeas();
      updateStats();

      ideasGrid.innerHTML = "";
      renderArchive(archivedIdeas);

      if (!activeIdeas.length) {
        statusBox.style.display = "block";
        statusBox.className = "empty";
        statusBox.textContent = "Нет идей под выбранные фильтры.";
      } else {
        statusBox.style.display = "none";
      }

      for (const idea of activeIdeas) {
        ideasGrid.appendChild(renderCard(idea));
      }
    }

    function isIdeaExpired(idea) {
      if (!idea) return false;

      if (idea.status === "closed" || idea.status === "expired") return true;

      if (idea.created_at && idea.ttl_minutes) {
        const created = new Date(idea.created_at).getTime();
        const now = Date.now();
        const ttl = idea.ttl_minutes * 60 * 1000;
        return now - created > ttl;
      }

      return false;
    }

    function getFilteredIdeas() {
      const all = state.selectedSignal === "CLOSED"
        ? state.archive
        : [...state.ideas, ...state.archive];

      const filtered = all.filter((idea) => {
        const symbol = normalizeSymbol(idea.symbol || idea.pair);
        const signal = normalizeSignal(idea.final_signal || idea.signal || idea.direction || idea.bias);
        const status = String(idea.status || "").toLowerCase();
        const isClosed = ["tp_hit", "sl_hit", "archived", "closed", "expired"].some((x) => status.includes(x)) || isIdeaExpired(idea);

        if (state.selectedPair !== "ALL" && symbol !== state.selectedPair) return false;
        if (state.selectedSignal === "ALL") return !isClosed;
        if (state.selectedSignal === "CLOSED") return isClosed;
        return signal === state.selectedSignal && !isClosed;
      });

      const activeIdeas = [];
      const archivedIdeas = [];

      filtered.forEach((idea) => {
        if (isArchivedIdea(idea)) {
          archivedIdeas.push(idea);
        } else {
          activeIdeas.push(idea);
        }
      });

      return { activeIdeas, archivedIdeas };
    }

    function isArchivedIdea(idea) {
      const status = String(idea?.status || "").toLowerCase();
      const isClosedByStatus = ["tp_hit", "sl_hit", "archived", "closed", "expired"].some((x) => status.includes(x));
      const result = String(idea?.result || "").toUpperCase();
      const isClosedByResult = ["TP", "SL", "EXPIRED"].includes(result);
      return Boolean(idea?.is_archived) || isClosedByStatus || isClosedByResult || isIdeaExpired(idea);
    }

    function renderArchive(archivedIdeas) {
      const count = document.getElementById("archiveCount");
      if (!archiveList) return;

      archiveList.innerHTML = "";

      for (const idea of archivedIdeas) {
        const card = renderCard(idea);
        card.classList.add("idea-card--archived");
        archiveList.appendChild(card);
      }

      if (count) count.textContent = archivedIdeas.length;
    }

    function updateStats() {
      const allIdeas = [...state.ideas, ...state.archive];
      const active = allIdeas.filter((idea) => !isArchivedIdea(idea));
      const archive = allIdeas.filter((idea) => isArchivedIdea(idea));

      const buy = active.filter((i) => normalizeSignal(i.final_signal || i.signal || i.direction || i.bias) === "BUY").length;
      const sell = active.filter((i) => normalizeSignal(i.final_signal || i.signal || i.direction || i.bias) === "SELL").length;
      const wait = active.filter((i) => normalizeSignal(i.final_signal || i.signal || i.direction || i.bias) === "WAIT").length;

      document.getElementById("buyCount").textContent = buy;
      document.getElementById("sellCount").textContent = sell;
      document.getElementById("waitCount").textContent = wait;
      document.getElementById("closedCount").textContent = archive.length;
      document.getElementById("totalCount").textContent = active.length + archive.length;
      updateIdeasPerformanceStats(archive);
    }

    function updateIdeasPerformanceStats(archiveItems) {
      const archive = Array.isArray(archiveItems) ? archiveItems : [];

      const tp = archive.filter((item) =>
        String(item.result || item.status || "").toUpperCase().includes("TP") ||
        String(item.close_reason || "").includes("take_profit")
      ).length;

      const sl = archive.filter((item) =>
        String(item.result || item.status || "").toUpperCase().includes("SL") ||
        String(item.close_reason || "").includes("stop_loss")
      ).length;

      const expired = archive.filter((item) =>
        String(item.result || item.status || "").toUpperCase().includes("EXPIRED") ||
        String(item.close_reason || "").includes("expired")
      ).length;

      const closed = tp + sl + expired;
      const winrate = tp + sl > 0 ? Math.round((tp / (tp + sl)) * 100) : 0;

      const setText = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.textContent = String(value);
      };

      setText("ideasTpCount", tp);
      setText("ideasSlCount", sl);
      setText("ideasExpiredCount", expired);
      setText("ideasClosedCount", closed);
      setText("ideasWinrate", `${winrate}%`);
    }

    function renderCard(idea) {
      const card = document.createElement("article");
      const id = idea.id || idea.idea_id || idea.symbol || Math.random().toString(16).slice(2);
      const symbol = normalizeSymbol(idea.symbol || idea.pair || "MARKET");
      const signal = normalizeSignal(idea.final_signal || idea.signal || idea.direction || idea.bias);
      const confidence = numberOrDash(idea.final_confidence ?? idea.confidence);
      const summary = pickText(idea);
      const statusView = resolveIdeaStatusView(idea);
      const statusReason = buildIdeaStatusReason(idea, statusView);
      const closeMeta = buildCloseMeta(idea);
      const entryTouch = resolveEntryTouchView(idea, statusView);

      card.className = "card";
      card.dataset.ideaId = id;

      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="symbol">${escapeHtml(symbol)}</div>
            <div class="signal-line ${signalClass(signal)}">${escapeHtml(signal)} • уверенность ${confidence}%</div>
          </div>
          <span class="badge ${badgeClass(signal)}">${escapeHtml(signal)}</span>
        </div>

        <div class="chip-row">
          <span class="chip">${escapeHtml(idea.timeframe || idea.tf || "MTF")}</span>
          <span class="chip">Entry ${formatValue(idea.entry || idea.entry_price || idea.entry_zone)}</span>
          <span class="chip">SL ${formatValue(idea.stop_loss || idea.stopLoss || idea.sl)}</span>
          <span class="chip">TP ${formatValue(idea.take_profit || idea.takeProfit || idea.tp)}</span>
          <span class="chip">Тест уровня входа: ${escapeHtml(entryTouch.label)}</span>
        </div>

        <div class="box">${escapeHtml(summary)}</div>
        <div class="status-line">
          <span class="badge ${statusView.badgeClass}">${escapeHtml(statusView.icon + " " + statusView.label)}</span>
        </div>
        <div class="status-reason">${escapeHtml(statusReason)}</div>
        ${closeMeta}

        <div class="levels">
          <div class="level entry">ENTRY<br>${formatValue(idea.entry || idea.entry_price || idea.entry_zone)}</div>
          <div class="level sl">SL<br>${formatValue(idea.stop_loss || idea.stopLoss || idea.sl)}</div>
          <div class="level tp">TP<br>${formatValue(idea.take_profit || idea.takeProfit || idea.tp)}</div>
          <div class="level rr">R:R<br>${formatValue(idea.rr || idea.risk_reward || idea.riskReward)}</div>
        </div>

        <div class="footer">
          <span>${escapeHtml(symbol)}</span>
          <span>${escapeHtml(statusView.code)}</span>
        </div>
      `;

      card.addEventListener("click", () => openModal(idea));
      return card;
    }

    function openModal(idea) {
      state.activeIdea = idea;
      state.currentTf = pickDefaultTf(idea);
      state.isSummaryCollapsed = false;

      const signal = normalizeSignal(idea.final_signal || idea.signal || idea.direction || idea.bias);
      const statusView = resolveIdeaStatusView(idea);
      const statusReason = buildIdeaStatusReason(idea, statusView);

      modalTitle.textContent = `${signal} • ${statusView.label}`;
      modalSubtitle.textContent = "";

      modalContent.innerHTML = `
        <div class="ideas-modal__top">
          <div class="ideas-modal__top-actions">
            <button id="toggleSummaryBtn" class="ideas-toggle-summary-btn" type="button" aria-expanded="true">Свернуть описание</button>
            <button type="button" class="chart-fullscreen-btn" id="chartFullscreenBtn">График на весь экран</button>
          </div>
          <div class="modal-grid">
            <div class="level entry">ENTRY<br>${formatValue(idea.entry || idea.entry_price || idea.entry_zone)}</div>
            <div class="level sl">SL<br>${formatValue(idea.stop_loss || idea.stopLoss || idea.sl)}</div>
            <div class="level tp">TP<br>${formatValue(idea.take_profit || idea.takeProfit || idea.tp)}</div>
            <div class="level rr">Confidence<br>${numberOrDash(idea.final_confidence ?? idea.confidence)}%</div>
          </div>

          <div class="modal-section-title">Основная идея</div>
          <div class="box modal-text">${escapeHtml(pickMainIdeaText(idea))}</div>
          ${renderSmartMoneyContext(idea)}
          ${renderFundamentalContext(idea)}
          <div class="status-reason">${escapeHtml(statusReason)}</div>

          <div class="modal-section-title">График и разметка</div>
          <div class="legend-grid">
              <div class="legend-item" style="color:var(--yellow)">ENTRY — точка входа</div>
              <div class="legend-item" style="color:var(--red)">SL — отмена идеи</div>
              <div class="legend-item" style="color:var(--green)">TP — цель идеи</div>
              <div class="legend-item" style="color:var(--violet)">OB — ордерблок</div>
              <div class="legend-item" style="color:#ff4d6d">Breaker — пробитый OB</div>
              <div class="legend-item" style="color:var(--orange)">FVG — имбаланс</div>
              <div class="legend-item" style="color:var(--blue)">Liquidity — ликвидность</div>
              <div class="legend-item" style="color:var(--pattern)">Pattern — графический паттерн</div>
          </div>
        </div>

        <div class="ideas-modal__chart-zone ideas-modal__bottom">
          <div class="chart-wrap">
            ${renderSentimentBadge(idea)}
            <div class="chart-toolbar">
              <button class="tf-btn" data-tf="M15">M15</button>
              <button class="tf-btn" data-tf="H1">H1</button>
              <button class="tf-btn" data-tf="H4">H4</button>
            </div>

            <div id="ideaChart" class="chart ideas-modal__chart"></div>

            <div class="chart-note" id="chartNote">
              Разметка строится только по реальным свечам. Фейковые свечи отключены.
            </div>
          </div>
        </div>
      `;

      modalBackdrop.classList.add("open");

      modalContent.querySelectorAll(".tf-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.currentTf = btn.dataset.tf;
          renderIdeaChart(idea);
          setTimeout(resizeIdeaChartSafely, 150);
        });
      });

      const toggleSummaryBtn = document.getElementById("toggleSummaryBtn");
      if (toggleSummaryBtn) toggleSummaryBtn.addEventListener("click", toggleSummarySection);
      document.getElementById("chartFullscreenBtn")?.addEventListener("click", openChartFullscreen);

      applySummaryState();

      setTimeout(() => renderIdeaChart(idea), 50);
      setTimeout(resizeIdeaChartSafely, 100);
      setTimeout(resizeIdeaChartSafely, 300);
      setTimeout(resizeIdeaChartSafely, 700);
    }

    function openChartFullscreen() {
      const overlay = document.getElementById("chartFullscreenOverlay");
      const container = document.getElementById("ideaChartFullscreen");
      const title = document.getElementById("chartFullscreenTitle");
      const currentIdea = state.activeIdea;
      if (!overlay || !container || !currentIdea) return;

      overlay.hidden = false;
      document.body.style.overflow = "hidden";
      if (title) {
        title.textContent = `${currentIdea.symbol || currentIdea.pair || ""} • ${state.currentTf || "M15"}`;
      }

      renderIdeaChartIntoContainer(currentIdea, state.currentTf, container, "fullscreen");
      setTimeout(resizeFullscreenChartSafely, 100);
      setTimeout(resizeFullscreenChartSafely, 300);
    }

    function closeChartFullscreen() {
      const overlay = document.getElementById("chartFullscreenOverlay");
      if (!overlay || overlay.hidden) return;
      overlay.hidden = true;
      const desc = document.getElementById("chartFullscreenDescription");
      if (desc) desc.hidden = true;
      document.body.style.overflow = "";
      teardownFullscreenChart();
      if (typeof resizeIdeaChartSafely === "function") {
        setTimeout(resizeIdeaChartSafely, 100);
      }
    }

    function resizeFullscreenChartSafely() {
      const container = document.getElementById("ideaChartFullscreen");
      if (!container || !state.fullscreenChart) return;
      try {
        state.fullscreenChart.resize(container.clientWidth, container.clientHeight);
        state.fullscreenChart.timeScale().fitContent();
      } catch (error) {
        console.warn("Fullscreen chart resize skipped:", error);
      }
    }

    function renderFundamentalContext(idea) {
      const context = idea && typeof idea === "object" ? idea.fundamental_context : null;
      if (!context || typeof context !== "object") return "";
      const summary = String(context.summary_ru || "").trim();
      const riskNote = String(context.risk_note_ru || "").trim();
      const eventWarning = String(context.event_warning_ru || "").trim();
      const lines = [summary, riskNote, eventWarning].filter(Boolean);
      if (!lines.length) return "";
      return `
        <div class="idea-fundamental-note">
          ${lines.map((line) => `<div>${escapeHtml(line)}</div>`).join("")}
        </div>
      `;
    }

    function closeModal() {
      closeChartFullscreen();
      modalBackdrop.classList.remove("open");
      state.candlesRequestSeq += 1;
      if (typeof state.overlaySyncCleanup === "function") {
        state.overlaySyncCleanup();
        state.overlaySyncCleanup = null;
      }
      if (state.chart) {
        state.chart.remove();
        state.chart = null;
        state.series = null;
      }
      state.activeIdea = null;
      state.isSummaryCollapsed = false;
    }

    function resizeIdeaChartSafely() {
      const container = document.getElementById("ideaChart");
      if (!container || !state.chart) return;

      const rect = container.getBoundingClientRect();
      const width = Math.max(500, Math.floor(rect.width));
      const height = Math.max(560, Math.floor(rect.height));

      try {
        state.chart.resize(width, height);
        state.chart.timeScale().fitContent();
      } catch (error) {
        console.warn("Idea chart resize skipped:", error);
      }
    }

    async function renderIdeaChart(idea) {
      const container = document.getElementById("ideaChart");
      if (!container) return;
      await renderIdeaChartIntoContainer(idea, state.currentTf, container, "modal");
      setTimeout(resizeIdeaChartSafely, 100);
      setTimeout(resizeIdeaChartSafely, 300);
      setTimeout(resizeIdeaChartSafely, 700);
    }

    async function renderIdeaChartIntoContainer(idea, tf, container, mode = "modal") {
      if (!container || !idea) return;
      const isFullscreen = mode === "fullscreen";
      if (isFullscreen) {
        teardownFullscreenChart();
      } else if (state.chart) {
        if (typeof state.overlaySyncCleanup === "function") {
          state.overlaySyncCleanup();
          state.overlaySyncCleanup = null;
        }
        state.chart.remove();
        state.chart = null;
        state.series = null;
      }
      container.innerHTML = "";

      const getChartSize = () => {
        const rect = container.getBoundingClientRect();
        const width = Math.max(Math.round(rect.width || container.clientWidth || 0), 320);
        const height = Math.max(Math.round(rect.height || container.clientHeight || 0), 320);
        return { width, height };
      };

      const renderSeq = ++state.candlesRequestSeq;
      let candles = getCandlesForIdea(idea, tf);
      if (!candles.length) {
        candles = await fetchRealCandlesForIdea(idea, tf);
        if (renderSeq !== state.candlesRequestSeq) return;
      }

      if (!candles.length) {
        container.innerHTML = `
          <div class="empty" style="margin:16px;">
            Нет реальных свечей от backend.<br>
            Разметка OB / Breaker / FVG / Liquidity / Pattern не строится без реальных OHLC-данных.<br>
            Фейковые свечи отключены.
          </div>
        `;
        const note = isFullscreen ? null : document.getElementById("chartNote");
        if (note) {
          note.textContent = "Нет реальных свечей. Нужно, чтобы backend отдавал candles / chart_data.candles / chartData.candles.";
        }
        return;
      }

      const chartSize = getChartSize();
      const chart = LightweightCharts.createChart(container, {
        width: chartSize.width,
        height: chartSize.height,
        layout: {
          background: { color: isFullscreen ? "#020817" : "#07111f" },
          textColor: "#9bb8d8",
        },
        grid: {
          vertLines: { color: "rgba(95,145,203,.16)" },
          horzLines: { color: "rgba(95,145,203,.16)" },
        },
        rightPriceScale: {
          borderColor: "rgba(95,145,203,.35)",
        },
        timeScale: {
          borderColor: "rgba(95,145,203,.35)",
          timeVisible: true,
          secondsVisible: false,
        },
        crosshair: {
          mode: LightweightCharts.CrosshairMode.Normal,
        },
      });

      const series = chart.addCandlestickSeries({
        upColor: "#31f59d",
        downColor: "#ff5f7a",
        borderUpColor: "#31f59d",
        borderDownColor: "#ff5f7a",
        wickUpColor: "#31f59d",
        wickDownColor: "#ff5f7a",
      });

      series.setData(candles);
      addCleanTradeLevels(series, idea);

      chart.timeScale().fitContent();

      if (isFullscreen) {
        state.fullscreenChart = chart;
      } else {
        state.chart = chart;
        state.series = series;
      }

      const redrawOverlay = () => addIdeaOverlay(container, chart, series, candles, idea);
      const cleanup = bindOverlayToChart(container, chart, redrawOverlay, getChartSize);
      if (isFullscreen) {
        state.fullscreenOverlayCleanup = cleanup;
      } else {
        state.overlaySyncCleanup = cleanup;
      }
      requestAnimationFrame(redrawOverlay);
    }

    function teardownFullscreenChart() {
      if (typeof state.fullscreenOverlayCleanup === "function") {
        state.fullscreenOverlayCleanup();
        state.fullscreenOverlayCleanup = null;
      }
      try {
        if (state.fullscreenChart) {
          state.fullscreenChart.remove();
        }
      } catch (error) {
        console.warn("Fullscreen chart remove failed:", error);
      }
      state.fullscreenChart = null;
      const container = document.getElementById("ideaChartFullscreen");
      if (container) container.innerHTML = "";
    }

    async function fetchRealCandlesForIdea(idea, tf) {
      const symbol = normalizeSymbol(idea?.symbol || idea?.pair);
      const normalizedTf = String(tf || "M15").toUpperCase();
      if (!symbol) return [];

      const cacheKey = `${symbol}:${normalizedTf}`;
      if (Array.isArray(state.realCandlesCache[cacheKey]) && state.realCandlesCache[cacheKey].length) {
        return state.realCandlesCache[cacheKey];
      }

      const urls = [
        `/api/canonical/chart/${encodeURIComponent(symbol)}/${encodeURIComponent(normalizedTf)}?limit=220&ts=${Date.now()}`,
        `/api/chart/${encodeURIComponent(symbol)}?tf=${encodeURIComponent(normalizedTf)}&limit=220&ts=${Date.now()}`,
      ];

      for (const url of urls) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) continue;
          const payload = await response.json();
          const normalized = normalizeCandles(
            payload?.candles ||
            payload?.chart_data?.candles ||
            payload?.chartData?.candles ||
            payload?.chart_data ||
            payload?.chartData
          );
          if (normalized.length) {
            state.realCandlesCache[cacheKey] = normalized;
            return normalized;
          }
        } catch (_error) {
          // no-op: try next backend endpoint
        }
      }

      return [];
    }

    function bindOverlayToChart(container, chart, redrawOverlay, getChartSize) {
      if (!container || !chart || typeof redrawOverlay !== "function") return null;

      let rafId = null;
      const requestRedraw = () => {
        if (rafId !== null) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(() => {
          rafId = null;
          redrawOverlay();
        });
      };

      const handleRangeChange = () => requestRedraw();
      chart.timeScale().subscribeVisibleLogicalRangeChange(handleRangeChange);

      const resizeChartToContainer = () => {
        const nextSize = typeof getChartSize === "function"
          ? getChartSize()
          : { width: Math.max(container.clientWidth, 320), height: Math.max(container.clientHeight, 320) };
        chart.applyOptions({
          width: nextSize.width,
          height: nextSize.height,
        });
        requestRedraw();
      };
      const handleWindowResize = () => resizeChartToContainer();
      window.addEventListener("resize", handleWindowResize);
      document.addEventListener("fullscreenchange", handleWindowResize);

      let resizeObserver = null;
      if (typeof ResizeObserver === "function") {
        resizeObserver = new ResizeObserver(() => resizeChartToContainer());
        resizeObserver.observe(container);
      }

      return () => {
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
        if (resizeObserver) {
          resizeObserver.disconnect();
          resizeObserver = null;
        }
        chart.timeScale().unsubscribeVisibleLogicalRangeChange(handleRangeChange);
        window.removeEventListener("resize", handleWindowResize);
        document.removeEventListener("fullscreenchange", handleWindowResize);
      };
    }

    function addCleanTradeLevels(series, idea) {
      const entry = toNumber(idea.entry || idea.entry_price || idea.entry_zone);
      const sl = toNumber(idea.stop_loss || idea.stopLoss || idea.sl);
      const tp = toNumber(idea.take_profit || idea.takeProfit || idea.tp);

      if (Number.isFinite(entry)) {
        series.createPriceLine({
          price: entry,
          color: "#ffd84d",
          lineWidth: 2,
          lineStyle: LightweightCharts.LineStyle.Solid,
          axisLabelVisible: true,
          title: "ENTRY",
        });
      }

      if (Number.isFinite(sl)) {
        series.createPriceLine({
          price: sl,
          color: "#ff5f7a",
          lineWidth: 2,
          lineStyle: LightweightCharts.LineStyle.Solid,
          axisLabelVisible: true,
          title: "SL",
        });
      }

      if (Number.isFinite(tp)) {
        series.createPriceLine({
          price: tp,
          color: "#31f59d",
          lineWidth: 2,
          lineStyle: LightweightCharts.LineStyle.Solid,
          axisLabelVisible: true,
          title: "TP",
        });
      }
    }

    function addIdeaOverlay(chartEl, chart, series, candles, idea) {
      chartEl.querySelectorAll(".pro-idea-overlay").forEach((el) => el.remove());

      const overlay = document.createElement("div");
      overlay.className = "pro-idea-overlay";
      chartEl.appendChild(overlay);

      const width = chartEl.clientWidth;
      const height = chartEl.clientHeight;

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("width", width);
      svg.setAttribute("height", height);
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.style.position = "absolute";
      svg.style.inset = "0";
      overlay.appendChild(svg);

      const xByIndex = (index) => chart.timeScale().logicalToCoordinate(index) ?? 0;
      const yByPrice = (price) => series.priceToCoordinate(Number(price)) ?? 0;

      const detected = detectMarkup(candles);

      for (const zone of detected.orderBlocks) {
        const isBreaker = zone.type === "breaker";
        drawZone(
          svg,
          xByIndex(zone.start),
          yByPrice(zone.high),
          xByIndex(zone.end),
          yByPrice(zone.low),
          isBreaker ? "#ff4d6d" : "#b77cff",
          isBreaker ? "rgba(255,77,109,0.25)" : "rgba(139,92,246,0.24)",
          isBreaker ? "Breaker Block" : zone.label
        );
      }

      for (const zone of detected.fvg) {
        drawZone(
          svg,
          xByIndex(zone.start),
          yByPrice(zone.high),
          xByIndex(zone.end),
          yByPrice(zone.low),
          "#ff9f1c",
          "rgba(245,158,11,0.20)",
          zone.label
        );
      }

      for (const level of detected.liquidity) {
        drawLiquidity(svg, width, yByPrice(level.price), "#2f8cff", level.label);
      }

      for (const pattern of detected.patterns) {
        drawPattern(
          svg,
          pattern.points.map((p) => ({
            x: xByIndex(p.index),
            y: yByPrice(p.price),
          })),
          pattern.label
        );
      }

      const note = document.getElementById("chartNote");
      if (note) {
        note.textContent =
          `Разметка: OB=${detected.orderBlocks.length}, FVG=${detected.fvg.length}, Liquidity=${detected.liquidity.length}, Pattern=${detected.patterns.length}. Фейковые свечи отключены.`;
      }
    }

    function drawZone(svg, x1, y1, x2, y2, stroke, fill, label) {
      if (![x1, y1, x2, y2].every(Number.isFinite)) return;

      const zoneClass = label.includes("Breaker")
        ? "zone-breaker"
        : label.includes("FVG")
          ? "zone-fvg"
          : "zone-ob";

      const x = Math.min(x1, x2);
      const y = Math.min(y1, y2);
      const w = Math.max(Math.abs(x2 - x1), 46);
      const h = Math.max(Math.abs(y2 - y1), 12);

      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", x);
      rect.setAttribute("y", y);
      rect.setAttribute("width", w);
      rect.setAttribute("height", h);
      rect.setAttribute("fill", fill);
      rect.setAttribute("stroke", stroke);
      rect.setAttribute("stroke-width", "1.4");
      rect.setAttribute("class", zoneClass);
      svg.appendChild(rect);

      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", x + Math.max(10, w - 150));
      text.setAttribute("y", y + h / 2 + 5);
      text.setAttribute("fill", stroke);
      text.setAttribute("font-size", "13");
      text.setAttribute("font-weight", "900");
      text.setAttribute("class", "zone-label");
      text.textContent = label;
      svg.appendChild(text);
    }

    function drawLiquidity(svg, width, y, color, label) {
      if (!Number.isFinite(y)) return;

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", "20");
      line.setAttribute("x2", width - 90);
      line.setAttribute("y1", y);
      line.setAttribute("y2", y);
      line.setAttribute("stroke", color);
      line.setAttribute("stroke-width", "2");
      line.setAttribute("stroke-dasharray", "2 7");
      line.setAttribute("class", "zone-liquidity");
      svg.appendChild(line);

      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", Math.max(30, width * 0.58));
      text.setAttribute("y", y - 9);
      text.setAttribute("fill", color);
      text.setAttribute("font-size", "13");
      text.setAttribute("font-weight", "900");
      text.setAttribute("class", "zone-label");
      text.textContent = label;
      svg.appendChild(text);
    }

    function drawPattern(svg, points, label) {
      if (!points || points.length < 3) return;
      if (!points.every((p) => Number.isFinite(p.x) && Number.isFinite(p.y))) return;

      const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      polygon.setAttribute("points", points.map((p) => `${p.x},${p.y}`).join(" "));
      polygon.setAttribute("fill", "rgba(244,114,182,0.14)");
      polygon.setAttribute("stroke", "#ff5fb7");
      polygon.setAttribute("stroke-width", "2");
      polygon.setAttribute("stroke-dasharray", "5 5");
      svg.appendChild(polygon);

      const last = points[points.length - 1];

      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", last.x - 20);
      text.setAttribute("y", last.y + 34);
      text.setAttribute("fill", "#ff5fb7");
      text.setAttribute("font-size", "13");
      text.setAttribute("font-weight", "900");
      text.textContent = label;
      svg.appendChild(text);
    }

    function detectMarkup(candles) {
      return {
        orderBlocks: detectOrderBlocks(candles).slice(-3),
        fvg: detectFvg(candles).slice(-3),
        liquidity: detectLiquidity(candles).slice(-4),
        patterns: detectPatterns(candles).slice(-2),
      };
    }

    function detectOrderBlocks(candles) {
      const out = [];
      const start = Math.max(3, candles.length - 90);

      for (let i = start; i < candles.length - 3; i++) {
        const c = candles[i];
        const n = candles[i + 1];

        const nextBody = Math.abs(n.close - n.open);
        const avgRange = averageRange(candles.slice(Math.max(0, i - 5), i + 1));

        if (avgRange <= 0) continue;

        const bullishOb =
          c.close < c.open &&
          n.close > n.open &&
          n.close > c.high &&
          nextBody > avgRange * 0.65;

        const bearishOb =
          c.close > c.open &&
          n.close < n.open &&
          n.close < c.low &&
          nextBody > avgRange * 0.65;

        if (!bullishOb && !bearishOb) continue;

        const low = c.low;
        const high = c.high;
        const future = candles.slice(i + 2);
        const brokenUp = future.some((row) => row.close > high);
        const brokenDown = future.some((row) => row.close < low);

        let type = "ob";

        if (bullishOb && brokenDown) type = "breaker";
        if (bearishOb && brokenUp) type = "breaker";

        out.push({
          start: i,
          end: candles.length - 1,
          low,
          high,
          type,
          label: bullishOb ? "OB (Demand)" : "OB (Supply)",
        });
      }

      return out;
    }

    function detectFvg(candles) {
      const out = [];
      const start = Math.max(2, candles.length - 100);

      for (let i = start; i < candles.length; i++) {
        const a = candles[i - 2];
        const c = candles[i];

        if (!a || !c) continue;

        if (a.high < c.low) {
          out.push({
            start: i - 2,
            end: candles.length - 1,
            low: a.high,
            high: c.low,
            label: "FVG (Bullish)",
          });
        }

        if (a.low > c.high) {
          out.push({
            start: i - 2,
            end: candles.length - 1,
            low: c.high,
            high: a.low,
            label: "FVG (Bearish)",
          });
        }
      }

      return out;
    }

    function detectLiquidity(candles) {
      const out = [];
      const visible = candles.slice(-90);
      const offset = candles.length - visible.length;

      if (visible.length < 10) return out;

      const highs = visible.map((c) => c.high);
      const lows = visible.map((c) => c.low);
      const range = Math.max(Math.max(...highs) - Math.min(...lows), 0.00001);
      const tolerance = range * 0.035;

      const swingHighs = [];
      const swingLows = [];

      for (let i = 2; i < visible.length - 2; i++) {
        if (visible[i].high >= visible[i - 1].high && visible[i].high >= visible[i + 1].high) {
          swingHighs.push({ index: offset + i, price: visible[i].high });
        }

        if (visible[i].low <= visible[i - 1].low && visible[i].low <= visible[i + 1].low) {
          swingLows.push({ index: offset + i, price: visible[i].low });
        }
      }

      for (let i = 0; i < swingHighs.length - 1; i++) {
        for (let j = i + 1; j < swingHighs.length; j++) {
          if (Math.abs(swingHighs[i].price - swingHighs[j].price) <= tolerance) {
            out.push({
              price: (swingHighs[i].price + swingHighs[j].price) / 2,
              label: "Liquidity (EQH)",
            });
            break;
          }
        }
      }

      for (let i = 0; i < swingLows.length - 1; i++) {
        for (let j = i + 1; j < swingLows.length; j++) {
          if (Math.abs(swingLows[i].price - swingLows[j].price) <= tolerance) {
            out.push({
              price: (swingLows[i].price + swingLows[j].price) / 2,
              label: "Liquidity (EQL)",
            });
            break;
          }
        }
      }

      return out;
    }

    function detectPatterns(candles) {
      const out = [];
      const visible = candles.slice(-55);
      const offset = candles.length - visible.length;

      if (visible.length < 25) return out;

      const highs = visible.map((c) => c.high);
      const lows = visible.map((c) => c.low);
      const max = Math.max(...highs);
      const min = Math.min(...lows);
      const range = Math.max(max - min, 0.00001);

      const leftHigh = Math.max(...highs.slice(0, 18));
      const rightHigh = Math.max(...highs.slice(-18));
      const leftLow = Math.min(...lows.slice(0, 18));
      const rightLow = Math.min(...lows.slice(-18));

      if (rightHigh < leftHigh && rightLow > leftLow) {
        out.push({
          label: "Pattern (Triangle)",
          points: [
            { index: offset + 6, price: leftHigh },
            { index: candles.length - 4, price: rightHigh },
            { index: candles.length - 4, price: rightLow },
            { index: offset + 6, price: leftLow },
          ],
        });
      }

      const impulse = Math.abs(visible[visible.length - 24].close - visible[visible.length - 1].close);
      const consolidation = Math.max(...highs.slice(-14)) - Math.min(...lows.slice(-14));

      if (impulse > range * 0.28 && consolidation < range * 0.28) {
        out.push({
          label: "Pattern (Flag)",
          points: [
            { index: candles.length - 14, price: Math.max(...highs.slice(-14)) },
            { index: candles.length - 2, price: Math.max(...highs.slice(-14)) },
            { index: candles.length - 2, price: Math.min(...lows.slice(-14)) },
            { index: candles.length - 14, price: Math.min(...lows.slice(-14)) },
          ],
        });
      }

      const top1 = Math.max(...highs.slice(-30, -15));
      const top2 = Math.max(...highs.slice(-15));

      if (Math.abs(top1 - top2) < range * 0.07) {
        out.push({
          label: "Pattern (Double Top)",
          points: [
            { index: candles.length - 30, price: Math.min(...lows.slice(-30)) },
            { index: candles.length - 3, price: Math.min(...lows.slice(-30)) },
            { index: candles.length - 3, price: Math.max(top1, top2) },
            { index: candles.length - 30, price: Math.max(top1, top2) },
          ],
        });
      }

      const bottom1 = Math.min(...lows.slice(-30, -15));
      const bottom2 = Math.min(...lows.slice(-15));

      if (Math.abs(bottom1 - bottom2) < range * 0.07) {
        out.push({
          label: "Pattern (Double Bottom)",
          points: [
            { index: candles.length - 30, price: Math.max(...highs.slice(-30)) },
            { index: candles.length - 3, price: Math.max(...highs.slice(-30)) },
            { index: candles.length - 3, price: Math.min(bottom1, bottom2) },
            { index: candles.length - 30, price: Math.min(bottom1, bottom2) },
          ],
        });
      }

      return out;
    }

    function getCandlesForIdea(idea, tf) {
      const candidates = [];

      if (idea.timeframe_ideas && idea.timeframe_ideas[tf]) {
        candidates.push(idea.timeframe_ideas[tf]);
      }

      candidates.push(idea);

      for (const source of candidates) {
        const raw =
          source.candles ||
          source.chart_candles ||
          source.chartCandles ||
          source.chart_data?.candles ||
          source.chartData?.candles ||
          source.chart_data ||
          source.chartData;

        const normalized = normalizeCandles(raw);

        if (normalized.length) return normalized;
      }

      return [];
    }

    function normalizeCandles(raw) {
      if (!Array.isArray(raw)) return [];

      const out = [];

      for (let i = 0; i < raw.length; i++) {
        const row = raw[i];

        const open = toNumber(row.open ?? row.o);
        const high = toNumber(row.high ?? row.h);
        const low = toNumber(row.low ?? row.l);
        const close = toNumber(row.close ?? row.c ?? row.price);

        if (![open, high, low, close].every(Number.isFinite)) continue;

        let time = row.time ?? row.timestamp ?? row.t;

        if (typeof time === "string") {
          const parsed = Date.parse(time);
          time = Number.isFinite(parsed) ? Math.floor(parsed / 1000) : NaN;
        }

        if (!Number.isFinite(Number(time))) {
          continue;
        }

        out.push({
          time: Number(time),
          open,
          high,
          low,
          close,
        });
      }

      return out.slice(-140);
    }

    function averageRange(rows) {
      if (!rows.length) return 0;
      return rows.reduce((sum, row) => sum + Math.abs(row.high - row.low), 0) / rows.length;
    }

    function pickDefaultTf(idea) {
      if (idea.timeframe && ["M15", "H1", "H4"].includes(String(idea.timeframe).toUpperCase())) {
        return String(idea.timeframe).toUpperCase();
      }
      return "M15";
    }

    function pickText(idea) {
      return (
        idea.idea_thesis ||
        idea.unified_narrative ||
        idea.full_text ||
        idea.fullText ||
        idea.summary_ru ||
        idea.summary ||
        idea.short_text ||
        idea.description_ru ||
        "Описание идеи отсутствует."
      );
    }

    function pickSubtitleText(idea) {
      const shortText = (
        idea.idea_thesis ||
        idea.summary_ru ||
        idea.summary ||
        idea.short_text ||
        idea.description_ru ||
        "Описание идеи отсутствует."
      );
      return trimToLength(shortText, 170);
    }

    function pickMainIdeaText(idea) {
      const detailBrief = idea && typeof idea.detail_brief === "object" ? idea.detail_brief : null;
      return (
        idea.unified_narrative ||
        detailBrief?.summary_narrative ||
        idea.full_text ||
        idea.fullText ||
        idea.summary_ru ||
        idea.summary ||
        idea.short_text ||
        idea.description_ru ||
        "Описание идеи отсутствует."
      );
    }

    function trimToLength(text, maxLength = 170) {
      const normalized = String(text || "").replace(/\s+/g, " ").trim();
      if (!normalized) return "Описание идеи отсутствует.";
      if (normalized.length <= maxLength) return normalized;
      return `${normalized.slice(0, maxLength - 1).trim()}…`;
    }

    function formatSentimentText(sentiment) {
      const longPct = Number(sentiment?.long_pct);
      const shortPct = Number(sentiment?.short_pct);

      if (!sentiment || !Number.isFinite(longPct) || !Number.isFinite(shortPct) || (longPct === 0 && shortPct === 0)) {
        return "Sentiment: нет данных";
      }

      return `Sentiment: Long ${Math.round(longPct)}% / Short ${Math.round(shortPct)}%`;
    }

    function renderSentimentBadge(idea) {
      const sentiment = idea && typeof idea.sentiment === "object" ? idea.sentiment : null;
      if (!sentiment || String(sentiment.data_status || "").toLowerCase() === "unavailable") {
        return `<div class="sentiment-badge">Sentiment: нет данных</div>`;
      }
      return `<div class="sentiment-badge">${escapeHtml(formatSentimentText(sentiment))}</div>`;
    }

    function renderSmartMoneyContext(idea) {
      const context = idea && typeof idea.smart_money_context === "object" ? idea.smart_money_context : null;
      if (!context) return "";
      const lines = [context.summary_ru, context.crowd_risk_ru, context.liquidity_alignment_ru]
        .map((item) => String(item || "").trim())
        .filter(Boolean);
      if (!lines.length) return "";
      return `<div class="box modal-text">${escapeHtml(lines.join(" "))}</div>`;
    }

    function normalizeSymbol(value) {
      return String(value || "").trim().toUpperCase();
    }

    function normalizeSignal(value) {
      const raw = String(value || "").trim().toLowerCase();

      if (["buy", "long", "bullish"].includes(raw)) return "BUY";
      if (["sell", "short", "bearish"].includes(raw)) return "SELL";
      return "WAIT";
    }

    function signalClass(signal) {
      if (signal === "BUY") return "buy-text";
      if (signal === "SELL") return "sell-text";
      return "wait-text";
    }

    function badgeClass(signal) {
      if (signal === "BUY") return "badge-buy";
      if (signal === "SELL") return "badge-sell";
      return "badge-wait";
    }

    function resolveIdeaStatusView(idea) {
      const rawStatus = String(idea.status || "").trim().toLowerCase();
      const result = String(idea.result || "").trim().toUpperCase();
      const entryDeviationPct = toNumber(idea.entry_deviation_pct ?? idea.entryDeviationPct);
      const hasMissedEntry = Number.isFinite(entryDeviationPct) && entryDeviationPct > 0.35;

      if (rawStatus === "closed_tp" || rawStatus === "tp_hit" || result === "TP") {
        return {
          code: "closed_tp",
          label: "Завершена (TP достигнут)",
          icon: "🎯",
          badgeClass: "badge-status-tp",
        };
      }
      if (rawStatus === "closed_sl" || rawStatus === "sl_hit" || result === "SL") {
        return {
          code: "closed_sl",
          label: "Завершена (SL сработал)",
          icon: "🛑",
          badgeClass: "badge-status-sl",
        };
      }
      if (rawStatus === "expired" || result === "EXPIRED") {
        return {
          code: "expired",
          label: "Истекла по времени",
          icon: "⌛",
          badgeClass: "badge-status-wait",
        };
      }
      if (["active", "triggered"].includes(rawStatus) && hasMissedEntry) {
        return {
          code: rawStatus || "active",
          label: "Активная (момент упущен)",
          icon: "⏳",
          badgeClass: "badge-status-active-missed",
        };
      }
      if (["active", "triggered"].includes(rawStatus)) {
        return {
          code: rawStatus,
          label: "Активная (можно входить)",
          icon: "✅",
          badgeClass: "badge-status-active-live",
        };
      }
      return {
        code: rawStatus || "waiting",
        label: "Ожидание подтверждения",
        icon: "👀",
        badgeClass: "badge-status-wait",
      };
    }

    function resolveEntryTouchView(idea, statusView = null) {
      const rawStatus = String(idea.status || "").trim().toLowerCase();
      const result = String(idea.result || "").trim().toUpperCase();
      const updates = Array.isArray(idea.updates) ? idea.updates : [];
      const hasTriggerEvent = updates.some((row) => {
        const event = String((row && row.event) || "").trim().toLowerCase();
        return event === "triggered" || event === "active";
      });

      if (["closed_tp", "closed_sl", "tp_hit", "sl_hit", "active", "triggered"].includes(rawStatus) || ["TP", "SL"].includes(result) || hasTriggerEvent) {
        return { touched: true, label: "был" };
      }

      if (statusView && String(statusView.code || "") === "waiting") {
        return { touched: false, label: "ещё не было" };
      }

      return { touched: false, label: "нет подтверждения" };
    }

    function buildIdeaStatusReason(idea, statusView) {
      const updates = Array.isArray(idea.updates) ? idea.updates : [];
      const history = Array.isArray(idea.history) ? idea.history : [];
      const latestUpdate = updates.length ? updates[updates.length - 1] : null;
      const latestHistory = history.length ? history[history.length - 1] : null;
      const lastUpdateReason = String((latestUpdate && latestUpdate.explanation) || (latestHistory && latestHistory.note) || "").trim();
      if (lastUpdateReason) return lastUpdateReason;

      const closeExplanation = String(idea.close_explanation || "").trim();
      if (closeExplanation) return closeExplanation;

      const fallbackReason = String(idea.meaningful_update_reason || idea.update_summary || "").trim();
      if (fallbackReason) return fallbackReason;

      if (statusView.code === "tp_hit" || statusView.code === "closed_tp") {
        return "Цена достигла целевой зоны ликвидности (TP), поэтому идея закрыта с выполнением сценария.";
      }
      if (statusView.code === "sl_hit" || statusView.code === "closed_sl") {
        return "Рынок нарушил уровень инвалидации (SL), сценарий потерял актуальность и идея закрыта.";
      }
      if (statusView.code === "expired") {
        return "Идея истекла по времени и закрыта без фиксации TP/SL результата.";
      }
      if (statusView.label.includes("момент упущен")) {
        return "Сигнал остаётся направленным, но цена уже заметно ушла от оптимальной точки входа. Лучше ждать новый откат или переразметку.";
      }
      return "Сценарий остаётся в работе: ждём подтверждение структуры и соблюдаем ограничения по риску.";
    }

    function buildCloseMeta(idea) {
      if (!isArchivedIdea(idea)) return "";
      const result = String(idea.result || "").toUpperCase();
      const resultClass = result === "TP" ? "badge-status-tp" : result === "SL" ? "badge-status-sl" : "badge-status-wait";
      const closedPrice = formatValue(idea.closed_price ?? idea.current_price);
      const closedAt = formatDateTime(idea.closed_at);
      const closeReason = String(idea.close_reason_ru || idea.runtime_text || "").trim() || "Причина закрытия не указана.";
      return `
        <div class="archive-meta">
          <div><span class="badge ${resultClass}">${escapeHtml(result || "CLOSED")}</span></div>
          <div>Цена закрытия: ${escapeHtml(closedPrice)}</div>
          <div>Время закрытия: ${escapeHtml(closedAt)}</div>
          <div>Причина: ${escapeHtml(closeReason)}</div>
        </div>
      `;
    }

    function formatDateTime(value) {
      if (!value) return "—";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString("ru-RU", { hour12: false });
    }

    function toNumber(value) {
      if (value && typeof value === "object") {
        value = value.price ?? value.value ?? value.mid ?? value.from ?? value.to;
      }

      const n = Number(value);
      return Number.isFinite(n) ? n : NaN;
    }

    function formatValue(value) {
      const n = toNumber(value);
      if (!Number.isFinite(n)) return "—";
      return n.toFixed(5).replace(/0+$/, "").replace(/\.$/, "");
    }

    function numberOrDash(value) {
      const n = Number(value);
      return Number.isFinite(n) ? Math.round(n) : "—";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadIdeas();
    setInterval(() => loadIdeas(false), 120000);
  </script>
</body>
