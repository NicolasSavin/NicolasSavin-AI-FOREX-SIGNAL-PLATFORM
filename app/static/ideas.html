<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI идеи</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body { margin:0; background:#08111f; color:white; font-family:Arial; }

.card {
  background:#0b1730;
  padding:12px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
}

.modal.open { display:block; }

.chart-wrap {
  width:100%;
  height:600px;
  position:relative;
}

#chart { width:100%; height:100%; }

#overlay {
  position:absolute;
  inset:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="ideas"></div>

<div id="modal" class="modal">
  <button onclick="closeModal()">Закрыть</button>

  <div class="chart-wrap">
    <div id="chart"></div>
    <canvas id="overlay"></canvas>
  </div>
</div>

<script>

async function load() {
  const res = await fetch("/ideas/market");
  const data = await res.json();

  const root = document.getElementById("ideas");

  root.innerHTML = data.ideas.map(i => `
    <div class="card" onclick='openIdea(${JSON.stringify(i)})'>
      ${i.symbol} — ${i.direction}
    </div>
  `).join("");
}

let chart, series;

function openIdea(idea) {
  document.getElementById("modal").classList.add("open");

  document.getElementById("chart").innerHTML = "";

  chart = LightweightCharts.createChart(document.getElementById("chart"), {
    layout:{ background:{color:"#08111f"}, textColor:"#9fb0c7"},
    grid:{ vertLines:{color:"#13233c"}, horzLines:{color:"#13233c"}}
  });

  series = chart.addCandlestickSeries();

  const candles = idea.chart_data.candles.map(c => ({
    time:c.time.slice(0,10),
    open:c.open,
    high:c.high,
    low:c.low,
    close:c.close
  }));

  series.setData(candles);

  drawOverlay(idea, candles);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

function drawOverlay(idea, candles) {
  const canvas = document.getElementById("overlay");
  const ctx = canvas.getContext("2d");

  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  const prices = candles.flatMap(c => [c.high, c.low]);
  const min = Math.min(...prices);
  const max = Math.max(...prices);

  const priceToY = p => canvas.height - ((p-min)/(max-min))*canvas.height;
  const x = i => (i/candles.length)*canvas.width;

  // ЗОНЫ
  idea.chart_data.zones.forEach(z => {

    if (z.type === "bullish_ob") {
      ctx.fillStyle = "rgba(34,197,94,0.25)";
    } else if (z.type === "bearish_ob") {
      ctx.fillStyle = "rgba(239,68,68,0.25)";
    } else {
      ctx.fillStyle = "rgba(139,92,246,0.25)";
    }

    ctx.fillRect(
      x(z.startIndex),
      priceToY(z.from),
      x(z.endIndex) - x(z.startIndex),
      priceToY(z.to) - priceToY(z.from)
    );
  });

  // УРОВНИ
  ctx.strokeStyle = "white";
  ctx.setLineDash([5,5]);

  idea.chart_data.levels.forEach(l => {
    const y = priceToY(l.price);
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  });

  ctx.setLineDash([]);

  // СТРЕЛКА
  const a = idea.chart_data.arrows[0];

  ctx.strokeStyle = "#facc15";
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(x(a.fromIndex), priceToY(a.fromPrice));
  ctx.lineTo(x(a.toIndex), priceToY(a.toPrice));
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x(a.toIndex), priceToY(a.toPrice), 6, 0, Math.PI*2);
  ctx.fillStyle = "#facc15";
  ctx.fill();
}

load();

</script>

</body>
</html>
