<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI идеи</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
  margin:0;
  background:#08111f;
  color:white;
  font-family:Arial;
}

.wrap { padding:20px; }

.card {
  background:#0b1730;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  cursor:pointer;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
}

.modal.open { display:block; }

.chart-wrap {
  width:100%;
  height:600px;
  position:relative;
}

#tv-chart { width:100%; height:100%; }

#overlay {
  position:absolute;
  inset:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="wrap" id="ideas"></div>

<div id="modal" class="modal">
  <div style="padding:20px;">
    <button onclick="closeModal()">Закрыть</button>

    <div class="chart-wrap">
      <div id="tv-chart"></div>
      <canvas id="overlay"></canvas>
    </div>

    <pre id="text"></pre>
  </div>
</div>

<script>

async function load() {
  const res = await fetch("/ideas/market");
  const data = await res.json();

  const list = data.ideas || [];

  const root = document.getElementById("ideas");

  root.innerHTML = list.map(i => `
    <div class="card" onclick='openIdea(${JSON.stringify(i)})'>
      ${i.symbol} — ${i.direction}
    </div>
  `).join("");
}

let chart, candleSeries;

function openIdea(idea) {
  document.getElementById("modal").classList.add("open");

  document.getElementById("text").textContent = JSON.stringify(idea, null, 2);

  createChart(idea);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

function createChart(idea) {
  document.getElementById("tv-chart").innerHTML = "";

  chart = LightweightCharts.createChart(document.getElementById("tv-chart"), {
    layout:{ background:{color:"#08111f"}, textColor:"#9fb0c7"},
    grid:{ vertLines:{color:"#13233c"}, horzLines:{color:"#13233c"}}
  });

  candleSeries = chart.addCandlestickSeries();

  const candles = idea.chart_data.candles.map(c => ({
    time: c.time.slice(0,10),
    open:c.open,
    high:c.high,
    low:c.low,
    close:c.close
  }));

  candleSeries.setData(candles);

  drawOverlay(idea, candles);
}

function drawOverlay(idea, candles) {
  const canvas = document.getElementById("overlay");
  const ctx = canvas.getContext("2d");

  const rect = canvas.parentElement.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = rect.height;

  const w = canvas.width;
  const h = canvas.height;

  const prices = candles.flatMap(c => [c.high, c.low]);

  const min = Math.min(...prices);
  const max = Math.max(...prices);

  const priceToY = p => h - ((p - min) / (max - min)) * h;
  const indexToX = i => (i / candles.length) * w;

  // ===== ЗОНЫ =====
  idea.chart_data.zones.forEach(z => {
    const x1 = indexToX(z.startIndex);
    const x2 = indexToX(z.endIndex);

    const y1 = priceToY(z.from);
    const y2 = priceToY(z.to);

    ctx.fillStyle = z.type === "bullish_ob"
      ? "rgba(34,197,94,0.2)"
      : z.type === "bearish_ob"
      ? "rgba(239,68,68,0.2)"
      : "rgba(139,92,246,0.2)";

    ctx.fillRect(x1, y1, x2-x1, y2-y1);
  });

  // ===== УРОВНИ =====
  ctx.strokeStyle = "white";

  idea.chart_data.levels.forEach(l => {
    const y = priceToY(l.price);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  });

  // ===== СТРЕЛКА =====
  const a = idea.chart_data.arrows[0];

  const x1 = indexToX(a.fromIndex);
  const x2 = indexToX(a.toIndex);

  const y1 = priceToY(a.fromPrice);
  const y2 = priceToY(a.toPrice);

  ctx.strokeStyle = "yellow";
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

load();
</script>

</body>
</html>
