<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI идеи</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body { margin:0; background:#08111f; color:white; font-family:Arial; }

.card {
  background:#0b1730;
  padding:12px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
}

.modal.open { display:block; }

.chart-wrap {
  width:100%;
  height:600px;
  position:relative;
}

#chart { width:100%; height:100%; }

#overlay {
  position:absolute;
  inset:0;
}
</style>
</head>

<body>

<div id="ideas"></div>

<div id="modal" class="modal">
  <button onclick="closeModal()">Закрыть</button>

  <div class="chart-wrap">
    <div id="chart"></div>
    <canvas id="overlay"></canvas>
  </div>
</div>

<script>

async function load() {
  const res = await fetch("/ideas/market");
  const data = await res.json();

  document.getElementById("ideas").innerHTML = data.ideas.map(i => `
    <div class="card" onclick='openIdea(${JSON.stringify(i)})'>
      ${i.symbol} — ${i.direction}
    </div>
  `).join("");
}

let chart, series;

function openIdea(idea) {

  document.getElementById("modal").classList.add("open");

  document.getElementById("chart").innerHTML = "";

  chart = LightweightCharts.createChart(document.getElementById("chart"), {
    layout:{ background:{color:"#08111f"} }
  });

  series = chart.addCandlestickSeries();

  const candles = idea.chart_data.candles.map(c => ({
    time:c.time.slice(0,10),
    open:c.open,
    high:c.high,
    low:c.low,
    close:c.close
  }));

  series.setData(candles);

  drawOverlay(idea, candles);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

function drawOverlay(idea, candles) {

  const canvas = document.getElementById("overlay");
  const ctx = canvas.getContext("2d");

  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  const prices = candles.flatMap(c => [c.high, c.low]);
  const min = Math.min(...prices);
  const max = Math.max(...prices);

  const priceToY = p => canvas.height - ((p-min)/(max-min))*canvas.height;
  const x = i => (i/candles.length)*canvas.width;

  // зоны
  idea.chart_data.zones.forEach(z => {
    ctx.fillStyle = z.type === "bullish_ob"
      ? "rgba(34,197,94,0.3)"
      : "rgba(139,92,246,0.3)";

    ctx.fillRect(
      x(z.startIndex),
      priceToY(z.from),
      x(z.endIndex)-x(z.startIndex),
      priceToY(z.to)-priceToY(z.from)
    );
  });

  // уровни
  ctx.strokeStyle="white";
  idea.chart_data.levels.forEach(l=>{
    const y=priceToY(l.price);
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  });

  // стрелка
  const a=idea.chart_data.arrows[0];
  ctx.strokeStyle="yellow";
  ctx.lineWidth=3;

  ctx.beginPath();
  ctx.moveTo(x(a.fromIndex),priceToY(a.fromPrice));
  ctx.lineTo(x(a.toIndex),priceToY(a.toPrice));
  ctx.stroke();
}

load();

</script>

</body>
</html>
