<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-идеи по рынку</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0d1d34;
      --panel2: #102642;
      --border: #25446e;
      --text: #f4f8ff;
      --muted: #9bb7d8;
      --green: #2df59a;
      --red: #ff5f7a;
      --yellow: #ffd84d;
      --blue: #39c5ff;
      --violet: #b9a7ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #10284a 0%, var(--bg) 48%, #030812 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 28px 60px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .home {
      color: var(--text);
      text-decoration: none;
      background: #132849;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 700;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin: 18px 0;
      flex-wrap: wrap;
    }

    select, button {
      background: #10213d;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
    }

    button { cursor: pointer; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .stat {
      background: rgba(16, 38, 66, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .stat-value {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(20, 47, 82, .98), rgba(9, 22, 40, .98));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,.28);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .symbol {
      font-weight: 900;
      letter-spacing: .04em;
    }

    .signal-line {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 800;
    }

    .badge {
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge-buy {
      color: #00140a;
      background: var(--green);
      border-color: #8cffca;
    }

    .badge-sell {
      color: white;
      background: #7a1d2c;
      border-color: var(--red);
    }

    .badge-wait {
      color: var(--violet);
      background: #273868;
      border-color: #5368b7;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .chip {
      font-size: 11px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #0a223f;
      color: #d7ecff;
      border: 1px solid #173e6c;
      font-weight: 800;
    }

    .chip-live {
      color: #d8fff0;
      border-color: #1abf7a;
    }

    .chip-rest {
      color: #fff3b2;
      border-color: #b48a00;
    }

    .chip-warn {
      color: #ffdcdc;
      border-color: #87414e;
    }

    .box {
      background: rgba(5, 17, 32, .74);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
      color: #e8f3ff;
      font-size: 13px;
      line-height: 1.55;
    }

    .levels {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .level {
      background: #07162a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .entry { color: var(--yellow); }
    .tp { color: var(--green); }
    .sl { color: var(--red); }
    .rr { color: var(--blue); }

    .footer {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid rgba(80, 120, 170, .35);
      padding-top: 10px;
    }

    .empty, .error {
      background: rgba(16, 38, 66, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      color: var(--muted);
    }

    .error {
      color: #ffd6d6;
      border-color: #7e3343;
    }

    .buy-text { color: var(--green); }
    .sell-text { color: var(--red); }
    .wait-text { color: var(--violet); }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .page { padding: 20px 14px 40px; }
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top">
      <div>
        <h1>AI-идеи по рынку</h1>
        <div class="subtitle">
          Live цены через TwelveData WebSocket + REST fallback. Yahoo/Stooq отключены.
        </div>
      </div>
      <a class="home" href="/">На главную</a>
    </header>

    <section class="controls">
      <select id="pairFilter">
        <option value="ALL">Все пары</option>
      </select>

      <select id="signalFilter">
        <option value="ALL">Все сигналы</option>
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
        <option value="WAIT">WAIT</option>
      </select>

      <button id="refreshBtn">Обновить</button>
    </section>

    <section class="stats">
      <div class="stat">
        <div class="stat-label">BUY</div>
        <div class="stat-value" id="buyCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">SELL</div>
        <div class="stat-value" id="sellCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">WAIT</div>
        <div class="stat-value" id="waitCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Источник</div>
        <div class="stat-value" id="sourceCount">—</div>
      </div>
    </section>

    <section id="statusBox" class="empty">Загрузка сигналов...</section>
    <section id="ideasGrid" class="grid"></section>
  </main>

  <script>
    const state = {
      ideas: [],
      selectedPair: "ALL",
      selectedSignal: "ALL",
    };

    const pairFilter = document.getElementById("pairFilter");
    const signalFilter = document.getElementById("signalFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusBox = document.getElementById("statusBox");
    const ideasGrid = document.getElementById("ideasGrid");

    pairFilter.addEventListener("change", () => {
      state.selectedPair = pairFilter.value;
      render();
    });

    signalFilter.addEventListener("change", () => {
      state.selectedSignal = signalFilter.value;
      render();
    });

    refreshBtn.addEventListener("click", () => {
      loadSignals();
    });

    async function loadSignals() {
      statusBox.style.display = "block";
      statusBox.className = "empty";
      statusBox.textContent = "Загрузка сигналов...";
      ideasGrid.innerHTML = "";

      try {
        const response = await fetch("/api/signals", {
          cache: "no-store",
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();
        state.ideas = normalizeIdeas(data);
        fillPairFilter(state.ideas);
        render();
      } catch (error) {
        statusBox.style.display = "block";
        statusBox.className = "error";
        statusBox.textContent = "Не удалось загрузить /api/signals: " + error.message;
      }
    }

    function normalizeIdeas(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.signals)) return data.signals;
      if (Array.isArray(data.ideas)) return data.ideas;
      return [];
    }

    function fillPairFilter(ideas) {
      const current = pairFilter.value || "ALL";
      const symbols = Array.from(
        new Set(
          ideas
            .map(item => normalizeSymbol(item.symbol || item.pair))
            .filter(Boolean)
        )
      ).sort();

      pairFilter.innerHTML = '<option value="ALL">Все пары</option>';

      for (const symbol of symbols) {
        const option = document.createElement("option");
        option.value = symbol;
        option.textContent = symbol;
        pairFilter.appendChild(option);
      }

      if (symbols.includes(current)) {
        pairFilter.value = current;
      } else {
        pairFilter.value = "ALL";
        state.selectedPair = "ALL";
      }
    }

    function render() {
      const ideas = filteredIdeas();

      updateStats(state.ideas);
      ideasGrid.innerHTML = "";

      if (!ideas.length) {
        statusBox.style.display = "block";
        statusBox.className = "empty";
        statusBox.textContent = "Нет сигналов под выбранные фильтры.";
        return;
      }

      statusBox.style.display = "none";

      for (const idea of ideas) {
        ideasGrid.appendChild(renderCard(idea));
      }
    }

    function filteredIdeas() {
      return state.ideas.filter(idea => {
        const symbol = normalizeSymbol(idea.symbol || idea.pair);
        const signal = normalizeSignal(idea.final_signal || idea.signal);

        if (state.selectedPair !== "ALL" && symbol !== state.selectedPair) {
          return false;
        }

        if (state.selectedSignal !== "ALL" && signal !== state.selectedSignal) {
          return false;
        }

        return true;
      });
    }

    function updateStats(ideas) {
      const buy = ideas.filter(i => normalizeSignal(i.final_signal || i.signal) === "BUY").length;
      const sell = ideas.filter(i => normalizeSignal(i.final_signal || i.signal) === "SELL").length;
      const wait = ideas.filter(i => normalizeSignal(i.final_signal || i.signal) === "WAIT").length;
      const ws = ideas.filter(i => i.source === "twelvedata_ws").length;
      const rest = ideas.filter(i => i.source === "twelvedata_rest_quote").length;

      document.getElementById("buyCount").textContent = buy;
      document.getElementById("sellCount").textContent = sell;
      document.getElementById("waitCount").textContent = wait;
      document.getElementById("sourceCount").textContent = `WS ${ws} / REST ${rest}`;
    }

    function renderCard(idea) {
      const symbol = normalizeSymbol(idea.symbol || idea.pair || "MARKET");
      const signal = normalizeSignal(idea.final_signal || idea.signal);
      const confidence = numberOrDash(idea.final_confidence ?? idea.confidence);
      const source = idea.source || "unknown";
      const dataStatus = idea.data_status || "unknown";
      const price = idea.current_price ?? idea.price ?? idea.entry_price ?? idea.entry;
      const dayChange = idea.day_change_percent;
      const summary = idea.summary_ru || idea.summary || idea.short_text || "Описание сигнала отсутствует.";
      const warning = idea.warning_ru || "";
      const badgeClass = signal === "BUY" ? "badge-buy" : signal === "SELL" ? "badge-sell" : "badge-wait";
      const signalClass = signal === "BUY" ? "buy-text" : signal === "SELL" ? "sell-text" : "wait-text";

      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="symbol">${escapeHtml(symbol)}</div>
            <div class="signal-line">
              Итоговый сигнал:
              <span class="${signalClass}">${escapeHtml(signal)}</span>
              · Уверенность: ${escapeHtml(String(confidence))}%
            </div>
          </div>
          <span class="badge ${badgeClass}">${escapeHtml(signal)}</span>
        </div>

        <div class="chip-row">
          <span class="chip ${source === "twelvedata_ws" ? "chip-live" : "chip-rest"}">
            ${source === "twelvedata_ws" ? "LIVE WS" : "REST fallback"}
          </span>
          <span class="chip">${escapeHtml(dataStatus)}</span>
          <span class="chip">LIVE</span>
          ${warning ? '<span class="chip chip-warn">warning</span>' : ""}
        </div>

        <div class="box">${escapeHtml(summary)}</div>

        ${warning ? `<div class="box">${escapeHtml(warning)}</div>` : ""}

        <div class="levels">
          <div class="level entry">Price: ${formatValue(price)}</div>
          <div class="level entry">Entry: ${formatValue(idea.entry ?? idea.entry_price)}</div>
          <div class="level sl">SL: ${formatValue(idea.sl ?? idea.stop_loss)}</div>
          <div class="level tp">TP: ${formatValue(idea.tp ?? idea.take_profit)}</div>
          <div class="level rr">RR: ${formatValue(idea.rr ?? idea.risk_reward)}</div>
          <div class="level">Day %: ${formatPercent(dayChange)}</div>
        </div>

        <div class="footer">
          <span>${escapeHtml(idea.source_symbol || symbol)}</span>
          <span>${formatDate(idea.meaningful_updated_at || idea.updated_at)}</span>
        </div>
      `;

      return card;
    }

    function normalizeSignal(value) {
      const signal = String(value || "WAIT").toUpperCase();

      if (signal.includes("BUY")) return "BUY";
      if (signal.includes("SELL")) return "SELL";
      return "WAIT";
    }

    function normalizeSymbol(value) {
      return String(value || "")
        .toUpperCase()
        .replace("/", "")
        .replace("-", "")
        .replace("_", "")
        .replace(/\s+/g, "")
        .trim();
    }

    function numberOrDash(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";
      return Math.round(number);
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return escapeHtml(String(value));

      if (Math.abs(number) >= 100) return number.toFixed(3);
      if (Math.abs(number) >= 10) return number.toFixed(4);
      return number.toFixed(5);
    }

    function formatPercent(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";
      return number.toFixed(3) + "%";
    }

    function formatDate(value) {
      if (!value) return "—";

      try {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "—";
        return date.toLocaleString("ru-RU");
      } catch {
        return "—";
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadSignals();

    setInterval(() => {
      loadSignals();
    }, 30000);
  </script>
</body>
</html>
