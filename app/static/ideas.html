<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-идеи по рынку</title>
  <link rel="stylesheet" href="/static/ideas.css?v=prop-score-ui-5" />
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/static/ideas.js?v=prop-score-ui-5" defer></script>
  <script src="/static/ideas-status-fix.js?v=status-fix-1" defer></script>
  <script src="/static/ideas-chart-fix.js?v=chart-hotfix-5" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      if (typeof window.collectCandles !== 'function') return;

      const originalNormalizeChartImageUrl = window.normalizeChartImageUrl;
      const originalEscapeHtml = window.escapeHtml;
      const originalGetIdeaSymbol = window.getIdeaSymbol;

      const esc = typeof originalEscapeHtml === 'function' ? originalEscapeHtml : function (v) {
        return String(v ?? '').replace(/[&<>"']/g, function (ch) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
        });
      };
      const num = function (v) { const n = Number(v); return Number.isFinite(n) ? n : null; };
      const arr = function (v) { return Array.isArray(v) ? v : (v && typeof v === 'object' ? [v] : []); };
      const firstNum = function () { for (let i = 0; i < arguments.length; i++) { const n = num(arguments[i]); if (n !== null) return n; } return null; };
      const ideaSymbol = function (idea) { return typeof originalGetIdeaSymbol === 'function' ? originalGetIdeaSymbol(idea) : String(idea?.symbol || idea?.instrument || 'chart'); };

      const patchedRenderChartContainer = function (idea) {
        const candles = window.collectCandles(idea);
        if (Array.isArray(candles) && candles.length >= 2) {
          console.debug('ideas_chart_mode', 'interactive_with_overlays');
          return '<div id="ideaModalChart"></div>';
        }
        const rawUrl = idea && (idea.chartImageUrl || idea.chart_image || idea.chart_url || '');
        const url = typeof originalNormalizeChartImageUrl === 'function' ? originalNormalizeChartImageUrl(rawUrl) : String(rawUrl || '');
        if (url) {
          console.debug('ideas_chart_mode', 'image_fallback');
          return '<img class="chart-image" src="' + esc(url) + '?t=' + Date.now() + '" alt="График ' + esc(ideaSymbol(idea)) + '">';
        }
        return '<div id="ideaModalChart"></div>';
      };
      window.renderChartContainer = patchedRenderChartContainer;
      try { renderChartContainer = patchedRenderChartContainer; } catch (error) { console.debug('ideas_chart_patch_failed', error); }

      function normalizeCandleLocal(c, index) {
        const fallbackTime = Math.floor(Date.now() / 1000) - (200 - index) * 900;
        const rawTime = c?.time || c?.timestamp || c?.t || fallbackTime;
        return {
          time: typeof rawTime === 'number' ? rawTime : Math.floor(new Date(rawTime).getTime() / 1000),
          open: Number(c?.open ?? c?.o ?? c?.close ?? c?.c),
          high: Number(c?.high ?? c?.h ?? c?.close ?? c?.c),
          low: Number(c?.low ?? c?.l ?? c?.close ?? c?.c),
          close: Number(c?.close ?? c?.c),
        };
      }

      function rangeOf(item) {
        if (typeof item === 'number' || typeof item === 'string') {
          const p = num(item); return p === null ? null : { low: p, high: p };
        }
        const low = firstNum(item?.low, item?.bottom, item?.min, item?.price_low, item?.zone_low, item?.from_price, item?.from, item?.y1);
        const high = firstNum(item?.high, item?.top, item?.max, item?.price_high, item?.zone_high, item?.to_price, item?.to, item?.y2);
        const price = firstNum(item?.price, item?.level, item?.value, item?.strike);
        if (low === null && high === null && price !== null) return { low: price, high: price };
        if (low !== null && high === null) return { low: low, high: low };
        if (high !== null && low === null) return { low: high, high: high };
        if (low !== null && high !== null) return { low: Math.min(low, high), high: Math.max(low, high) };
        return null;
      }

      function collectRanges() {
        const out = [];
        for (let i = 0; i < arguments.length; i++) {
          arr(arguments[i]).forEach(function (item) {
            const r = rangeOf(item);
            if (r) out.push(r);
            arr(item?.zones).forEach(function (z) { const zr = rangeOf(z); if (zr) out.push(zr); });
            arr(item?.levels).forEach(function (z) { const zr = rangeOf(z); if (zr) out.push(zr); });
          });
        }
        return out;
      }

      function avgRange(data) {
        const recent = data.slice(-50);
        return recent.length ? recent.reduce(function (s, c) { return s + Math.max(0, c.high - c.low); }, 0) / recent.length : 0;
      }

      function dedupe(ranges, minGap) {
        const out = [];
        ranges.forEach(function (r) {
          const mid = (r.low + r.high) / 2;
          if (out.some(function (x) { return Math.abs(((x.low + x.high) / 2) - mid) <= minGap; })) return;
          out.push(r);
        });
        return out;
      }

      function fallbackFvgs(data) {
        const ar = avgRange(data); const zones = [];
        for (let i = Math.max(2, data.length - 80); i < data.length; i++) {
          const a = data[i - 2]; const c = data[i];
          if (c.low > a.high && c.low - a.high > ar * 0.18) zones.push({ low: a.high, high: c.low });
          if (c.high < a.low && a.low - c.high > ar * 0.18) zones.push({ low: c.high, high: a.low });
        }
        return zones.slice(-6);
      }

      function fallbackObs(data) {
        const ar = avgRange(data); const zones = [];
        for (let i = Math.max(1, data.length - 70); i < data.length - 1; i++) {
          const c = data[i]; const n = data[i + 1];
          if (Math.abs(n.close - n.open) < ar * 1.05) continue;
          if (c.close < c.open && n.close > n.open) zones.push({ low: c.low, high: c.high });
          if (c.close > c.open && n.close < n.open) zones.push({ low: c.low, high: c.high });
        }
        return zones.slice(-5);
      }

      function fallbackLiquidity(data) {
        const levels = [];
        for (let i = Math.max(2, data.length - 90); i < data.length - 2; i++) {
          const c = data[i];
          if (c.high >= data[i-1].high && c.high >= data[i-2].high && c.high >= data[i+1].high && c.high >= data[i+2].high) levels.push({ low: c.high, high: c.high });
          if (c.low <= data[i-1].low && c.low <= data[i-2].low && c.low <= data[i+1].low && c.low <= data[i+2].low) levels.push({ low: c.low, high: c.low });
        }
        return levels.slice(-8);
      }

      function drawOverlayLayer(chart, series, idea, data) {
        const host = document.getElementById('ideaModalChart')?.closest('.chart-area') || document.getElementById('ideaModalChart');
        if (!host) return;
        host.style.position = 'relative';
        host.querySelectorAll('.institutional-overlay-layer,.institutional-toggle-row,.institutional-arrow').forEach(function (el) { el.remove(); });
        const layer = document.createElement('div');
        layer.className = 'institutional-overlay-layer';
        layer.style.cssText = 'position:absolute;inset:0;z-index:11;pointer-events:none;overflow:hidden;';
        host.appendChild(layer);

        const market = idea?.market_context || {};
        const minGap = Math.max(avgRange(data) * 0.2, 0.00001);
        const zones = [];
        dedupe(collectRanges(idea?.order_blocks, idea?.orderBlocks, idea?.ob_zones, idea?.poi_zones, market?.order_blocks, market?.orderBlocks).concat(fallbackObs(data)), minGap).slice(-7).forEach(function (r, i) { zones.push({ ...r, kind: 'ob', label: 'OB ' + (i + 1), color: 'rgba(167,139,250,.30)', border: 'rgba(167,139,250,.95)' }); });
        dedupe(collectRanges(idea?.fvg, idea?.fvgs, idea?.fair_value_gaps, idea?.fairValueGaps, idea?.imbalances, market?.fvg, market?.fvgs, market?.fair_value_gaps, market?.imbalances).concat(fallbackFvgs(data)), minGap).slice(-8).forEach(function (r, i) { zones.push({ ...r, kind: 'fvg', label: 'FVG ' + (i + 1), color: 'rgba(34,211,238,.22)', border: 'rgba(34,211,238,.95)' }); });
        dedupe(collectRanges(idea?.liquidity, idea?.liquidity_levels, idea?.liquidity_zones, market?.liquidity, market?.liquidity_levels, market?.liquidity_zones, market?.equal_highs, market?.equal_lows).concat(fallbackLiquidity(data)), minGap).slice(-10).forEach(function (r, i) { zones.push({ ...r, kind: 'liq', label: 'LIQ ' + (i + 1), color: 'rgba(249,115,22,.16)', border: 'rgba(249,115,22,.92)' }); });

        function repaint() {
          layer.innerHTML = '';
          const firstTime = data[Math.max(0, data.length - 55)]?.time || data[0]?.time;
          const lastTime = data[data.length - 1]?.time;
          const x1 = chart.timeScale().timeToCoordinate(firstTime);
          const x2 = chart.timeScale().timeToCoordinate(lastTime);
          zones.forEach(function (z) {
            const yHigh = series.priceToCoordinate(z.high);
            const yLow = series.priceToCoordinate(z.low);
            if (![x1, x2, yHigh, yLow].every(Number.isFinite)) return;
            const top = Math.min(yHigh, yLow);
            const height = Math.max(3, Math.abs(yLow - yHigh));
            const box = document.createElement('div');
            box.className = 'institutional-zone zone-' + z.kind;
            box.style.cssText = 'position:absolute;left:' + Math.min(x1,x2) + 'px;top:' + top + 'px;width:' + Math.max(8, Math.abs(x2-x1)) + 'px;height:' + height + 'px;background:' + z.color + ';border:1px solid ' + z.border + ';border-radius:6px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.10);';
            box.innerHTML = '<span style="position:absolute;left:6px;top:2px;font-size:10px;font-weight:900;color:#e8f3ff;text-shadow:0 1px 2px #000">' + esc(z.label) + '</span>';
            layer.appendChild(box);
          });
        }
        repaint();
        chart.timeScale().subscribeVisibleTimeRangeChange(repaint);
        window.addEventListener('resize', repaint, { passive: true });

        const action = String(idea?.action || idea?.signal || idea?.direction || 'WAIT').toUpperCase();
        const arrow = document.createElement('div');
        arrow.className = 'institutional-arrow';
        const isBuy = action.includes('BUY') || action.includes('ПОКУП');
        const isSell = action.includes('SELL') || action.includes('ПРОДА');
        arrow.style.cssText = 'position:absolute;left:18px;top:18px;z-index:25;padding:10px 14px;border-radius:16px;font-weight:950;box-shadow:0 12px 32px rgba(0,0,0,.36);pointer-events:none;' + (isBuy ? 'background:linear-gradient(180deg,#7dffc4,#31f59d);color:#00150c;' : isSell ? 'background:linear-gradient(180deg,#ff7f99,#be123c);color:white;' : 'background:rgba(71,85,105,.88);color:white;');
        arrow.innerHTML = (isBuy ? '↗ BUY / Покупка' : isSell ? '↘ SELL / Продажа' : '→ WAIT / Наблюдение');
        host.appendChild(arrow);
      }

      window.renderModalChart = function (idea) {
        const container = document.getElementById('ideaModalChart');
        if (!container || !window.LightweightCharts) return;
        const data = window.collectCandles(idea).map(normalizeCandleLocal).filter(function (c) { return [c.open,c.high,c.low,c.close,c.time].every(Number.isFinite); });
        if (data.length < 2) { container.innerHTML = '<div class="ideas-loading">График недоступен: API не передал свечи.</div>'; return; }
        if (window.modalChart) { try { window.modalChart.remove(); } catch (e) {} }
        container.innerHTML = '';
        const chart = LightweightCharts.createChart(container, {
          layout: { background: { color: '#06111f' }, textColor: '#dbeeff' },
          grid: { vertLines: { color: 'rgba(255,255,255,.055)' }, horzLines: { color: 'rgba(255,255,255,.055)' } },
          rightPriceScale: { borderColor: 'rgba(95,156,230,.24)', scaleMargins: { top: .12, bottom: .12 } },
          timeScale: { borderColor: 'rgba(95,156,230,.24)', rightOffset: 8, barSpacing: 8 },
          crosshair: { mode: 1 },
        });
        window.modalChart = chart;
        const series = chart.addCandlestickSeries({ upColor: '#31f59d', downColor: '#ff5f7a', borderUpColor: '#31f59d', borderDownColor: '#ff5f7a', wickUpColor: '#31f59d', wickDownColor: '#ff5f7a' });
        series.setData(data);
        if (typeof window.addIdeaOverlays === 'function') { try { window.addIdeaOverlays(series, idea || {}, data); } catch (e) {} }
        [[idea?.entry ?? idea?.entry_price, 'ENTRY', '#ffd84d'], [idea?.sl ?? idea?.stop_loss, 'SL', '#ff5f7a'], [idea?.tp ?? idea?.take_profit ?? idea?.target, 'TP', '#31f59d']].forEach(function (row) {
          const p = num(row[0]); if (p === null) return;
          try { series.createPriceLine({ price: p, color: row[2], lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: row[1] }); } catch (e) {}
        });
        chart.timeScale().fitContent();
        drawOverlayLayer(chart, series, idea || {}, data);
        setTimeout(function () { try { chart.applyOptions({ width: container.clientWidth, height: Math.max(390, container.clientHeight) }); chart.timeScale().fitContent(); } catch (e) {} }, 100);
      };
    });
  </script>
  <script src="/static/ideas-archive-fix.js?v=archive-ui-2" defer></script>
</head>
<body>
  <main class="page">
    <header class="hero">
      <nav aria-label="Навигация">
        <a class="home-link" href="/">Главная</a>
        <a class="home-link" href="/analytics">Аналитика</a>
        <a class="home-link" href="/news">Новости</a>
        <a class="home-link" href="/calendar">Календарь</a>
        <a class="home-link" href="/ideas/market">API идей</a>
      </nav>
      <div class="ideas-page-header">
        <div>
          <h1>AI-идеи по рынку</h1>
          <p class="subtitle">Сигналы, фильтры, архив и статистика Prop Decision Engine.</p>
        </div>
      </div>
    </header>

    <section class="controls" aria-label="Фильтры идей"></section>

    <p id="ideasUpdatedAt" class="subtitle" aria-live="polite"></p>

    <section id="ideasContainer" class="grid" aria-live="polite"></section>
  </main>
</body>
</html>
