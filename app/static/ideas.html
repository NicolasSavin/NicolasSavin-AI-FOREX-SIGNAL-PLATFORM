<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-идеи по рынку</title>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --bg-0: #030712;
      --bg-1: #071426;
      --card-1: rgba(20, 52, 92, 0.96);
      --card-2: rgba(8, 22, 42, 0.97);
      --border: rgba(99, 157, 230, 0.34);
      --border-strong: rgba(124, 184, 255, 0.68);
      --text: #f4f8ff;
      --muted: #9db8da;
      --green: #31f59d;
      --red: #ff5f7a;
      --yellow: #ffd84d;
      --blue: #45caff;
      --violet: #b9a7ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 18% 4%, rgba(65,139,255,.28), transparent 32%),
        radial-gradient(circle at 82% 14%, rgba(45,245,157,.12), transparent 28%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 42%, #020814 100%);
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 34px 30px 70px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 3vw, 44px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .home-link, select, button {
      background: linear-gradient(180deg, rgba(22,50,91,.95), rgba(10,27,51,.95));
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 16px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 22px 0;
      flex-wrap: wrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0;
    }

    .stat {
      background: linear-gradient(135deg, rgba(28,64,113,.95), rgba(9,24,45,.96));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 42px rgba(0,0,0,.28);
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 900;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 950;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      min-height: 390px;
      background:
        radial-gradient(circle at 85% 0%, rgba(69,202,255,.16), transparent 34%),
        linear-gradient(155deg, var(--card-1), var(--card-2) 68%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 17px;
      box-shadow: 0 22px 54px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.11);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--border-strong);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .symbol {
      font-size: 17px;
      font-weight: 950;
      letter-spacing: .08em;
    }

    .signal-line {
      margin-top: 5px;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
    }

    .badge {
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-buy { color: #00150c; background: linear-gradient(180deg, #54ffb5, var(--green)); }
    .badge-sell { color: #fff; background: linear-gradient(180deg, #d93f5b, #8f2034); }
    .badge-wait { color: #efeaff; background: linear-gradient(180deg, #5266bd, #293c78); }

    .buy-text { color: var(--green); }
    .sell-text { color: var(--red); }
    .wait-text { color: var(--violet); }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0 14px;
    }

    .chip {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(6,24,46,.88);
      color: #d7ecff;
      border: 1px solid rgba(58,112,176,.55);
      font-weight: 900;
    }

    .chip-live { color: #d8fff0; border-color: rgba(45,245,157,.75); }
    .chip-rest { color: #fff3b2; border-color: rgba(255,216,77,.75); }
    .chip-warn { color: #ffdcdc; border-color: rgba(255,95,122,.7); }

    .box {
      background: rgba(3,14,28,.68);
      border: 1px solid rgba(95,145,203,.34);
      border-radius: 16px;
      padding: 13px;
      margin: 10px 0;
      color: #e8f3ff;
      font-size: 13px;
      line-height: 1.6;
    }

    .levels, .modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 13px;
    }

    .level {
      background: linear-gradient(180deg, rgba(7,27,52,.92), rgba(4,17,33,.94));
      border: 1px solid rgba(71,124,187,.44);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      font-weight: 950;
    }

    .entry { color: var(--yellow); }
    .tp { color: var(--green); }
    .sl { color: var(--red); }
    .rr { color: var(--blue); }

    .footer {
      margin-top: 13px;
      display: flex;
      justify-content: space-between;
      color: #b9d6f8;
      font-size: 12px;
      border-top: 1px solid rgba(80,120,170,.35);
      padding-top: 11px;
    }

    .empty, .error {
      background: rgba(16,38,66,.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .error {
      color: #ffd6d6;
      border-color: rgba(255,95,122,.72);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,.76);
      backdrop-filter: blur(10px);
      z-index: 999;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(1180px, 100%);
      max-height: 94vh;
      overflow: auto;
      background:
        radial-gradient(circle at 90% 0%, rgba(69,202,255,.18), transparent 34%),
        linear-gradient(160deg, rgba(24,58,103,.98), rgba(5,17,33,.98) 72%);
      border: 1px solid rgba(124,184,255,.62);
      border-radius: 26px;
      box-shadow: 0 34px 110px rgba(0,0,0,.68);
      padding: 24px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: clamp(24px, 3vw, 34px);
      margin: 0 0 6px;
    }

    .chart-wrap {
      margin: 16px 0;
      border: 1px solid rgba(95,145,203,.42);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(2,10,20,.88);
    }

    .chart-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      border-bottom: 1px solid rgba(95,145,203,.3);
      background: rgba(8,25,48,.9);
    }

    .tf-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
    }

    .chart {
      height: 470px;
      width: 100%;
    }

    .legend {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      border-top: 1px solid rgba(95,145,203,.3);
    }

    .modal-section-title {
      margin: 20px 0 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: 12px;
      font-weight: 950;
    }

    .diagnostics {
      display: none;
      margin-top: 12px;
    }

    .diagnostics.open { display: block; }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(1,8,18,.9);
      border: 1px solid rgba(95,145,203,.34);
      border-radius: 16px;
      padding: 14px;
      color: #dceeff;
      font-size: 12px;
      max-height: 260px;
      overflow: auto;
    }

    @media (max-width: 1120px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .page { padding: 22px 14px 44px; }
      .hero { flex-direction: column; }
      .grid, .stats, .modal-grid { grid-template-columns: 1fr; }
      .modal-backdrop { padding: 10px; }
      .chart { height: 380px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>AI-идеи по рынку</h1>
        <div class="subtitle">
          Live price + свечной график + разметка OB/FVG/ликвидности. Нажми на карточку.
        </div>
      </div>
      <a class="home-link" href="/">На главную</a>
    </header>

    <section class="controls">
      <select id="pairFilter"><option value="ALL">Все пары</option></select>
      <select id="signalFilter">
        <option value="ALL">Все сигналы</option>
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
        <option value="WAIT">WAIT</option>
      </select>
      <button id="refreshBtn">Обновить</button>
    </section>

    <section class="stats">
      <div class="stat"><div class="stat-label">BUY</div><div class="stat-value" id="buyCount">0</div></div>
      <div class="stat"><div class="stat-label">SELL</div><div class="stat-value" id="sellCount">0</div></div>
      <div class="stat"><div class="stat-label">WAIT</div><div class="stat-value" id="waitCount">0</div></div>
      <div class="stat"><div class="stat-label">Источник</div><div class="stat-value" id="sourceCount">—</div></div>
    </section>

    <section id="statusBox" class="empty">Загрузка сигналов...</section>
    <section id="ideasGrid" class="grid"></section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle" class="modal-title">Сигнал</h2>
          <div id="modalSubtitle" class="subtitle"></div>
        </div>
        <button id="closeModalBtn">Закрыть</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const state = { ideas: [], selectedPair: "ALL", selectedSignal: "ALL", activeIdea: null, chart: null };

    const pairFilter = document.getElementById("pairFilter");
    const signalFilter = document.getElementById("signalFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusBox = document.getElementById("statusBox");
    const ideasGrid = document.getElementById("ideasGrid");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalContent = document.getElementById("modalContent");

    pairFilter.addEventListener("change", () => { state.selectedPair = pairFilter.value; render(); });
    signalFilter.addEventListener("change", () => { state.selectedSignal = signalFilter.value; render(); });
    refreshBtn.addEventListener("click", loadSignals);
    closeModalBtn.addEventListener("click", closeModal);

    modalBackdrop.addEventListener("click", (event) => {
      if (event.target === modalBackdrop) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    async function loadSignals() {
      statusBox.style.display = "block";
      statusBox.className = "empty";
      statusBox.textContent = "Загрузка сигналов...";
      ideasGrid.innerHTML = "";

      try {
        const response = await fetch("/api/signals", { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);

        const data = await response.json();
        state.ideas = normalizeIdeas(data);
        fillPairFilter(state.ideas);
        render();
      } catch (error) {
        statusBox.style.display = "block";
        statusBox.className = "error";
        statusBox.textContent = "Не удалось загрузить /api/signals: " + error.message;
      }
    }

    function normalizeIdeas(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.signals)) return data.signals;
      if (Array.isArray(data.ideas)) return data.ideas;
      return [];
    }

    function fillPairFilter(ideas) {
      const current = pairFilter.value || "ALL";
      const symbols = Array.from(new Set(ideas.map((item) => normalizeSymbol(item.symbol || item.pair)).filter(Boolean))).sort();

      pairFilter.innerHTML = '<option value="ALL">Все пары</option>';
      for (const symbol of symbols) {
        const option = document.createElement("option");
        option.value = symbol;
        option.textContent = symbol;
        pairFilter.appendChild(option);
      }

      if (symbols.includes(current)) pairFilter.value = current;
      else {
        pairFilter.value = "ALL";
        state.selectedPair = "ALL";
      }
    }

    function render() {
      const ideas = filteredIdeas();
      updateStats(state.ideas);
      ideasGrid.innerHTML = "";

      if (!ideas.length) {
        statusBox.style.display = "block";
        statusBox.className = "empty";
        statusBox.textContent = "Нет сигналов под выбранные фильтры.";
        return;
      }

      statusBox.style.display = "none";
      for (const idea of ideas) ideasGrid.appendChild(renderCard(idea));
    }

    function filteredIdeas() {
      return state.ideas.filter((idea) => {
        const symbol = normalizeSymbol(idea.symbol || idea.pair);
        const signal = normalizeSignal(idea.final_signal || idea.signal);
        if (state.selectedPair !== "ALL" && symbol !== state.selectedPair) return false;
        if (state.selectedSignal !== "ALL" && signal !== state.selectedSignal) return false;
        return true;
      });
    }

    function updateStats(ideas) {
      const buy = ideas.filter((i) => normalizeSignal(i.final_signal || i.signal) === "BUY").length;
      const sell = ideas.filter((i) => normalizeSignal(i.final_signal || i.signal) === "SELL").length;
      const wait = ideas.filter((i) => normalizeSignal(i.final_signal || i.signal) === "WAIT").length;
      const ws = ideas.filter((i) => i.source === "twelvedata_ws").length;
      const rest = ideas.filter((i) => i.source === "twelvedata_rest_quote").length;

      document.getElementById("buyCount").textContent = buy;
      document.getElementById("sellCount").textContent = sell;
      document.getElementById("waitCount").textContent = wait;
      document.getElementById("sourceCount").textContent = `WS ${ws} / REST ${rest}`;
    }

    function renderCard(idea) {
      const symbol = normalizeSymbol(idea.symbol || idea.pair || "MARKET");
      const signal = normalizeSignal(idea.final_signal || idea.signal);
      const confidence = numberOrDash(idea.final_confidence ?? idea.confidence);
      const source = idea.source || "unknown";
      const dataStatus = idea.data_status || "unknown";
      const price = idea.current_price ?? idea.price ?? idea.entry_price ?? idea.entry;
      const summary = idea.summary_ru || idea.summary || idea.short_text || "Описание сигнала отсутствует.";
      const warning = idea.warning_ru || "";
      const badgeClass = signal === "BUY" ? "badge-buy" : signal === "SELL" ? "badge-sell" : "badge-wait";
      const signalClass = signal === "BUY" ? "buy-text" : signal === "SELL" ? "sell-text" : "wait-text";

      const card = document.createElement("article");
      card.className = "card";
      card.tabIndex = 0;

      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="symbol">${escapeHtml(symbol)}</div>
            <div class="signal-line">
              Итоговый сигнал:
              <span class="${signalClass}">${escapeHtml(signal)}</span>
              · Уверенность: ${escapeHtml(String(confidence))}%
            </div>
          </div>
          <span class="badge ${badgeClass}">${escapeHtml(signal)}</span>
        </div>

        <div class="chip-row">
          <span class="chip ${source === "twelvedata_ws" ? "chip-live" : "chip-rest"}">${source === "twelvedata_ws" ? "LIVE WS" : "REST fallback"}</span>
          <span class="chip">${escapeHtml(dataStatus)}</span>
          <span class="chip">${escapeHtml(idea.setup_quality || "LIVE")}</span>
          ${warning ? '<span class="chip chip-warn">warning</span>' : ""}
        </div>

        <div class="box">${escapeHtml(summary)}</div>
        ${warning ? `<div class="box">${escapeHtml(warning)}</div>` : ""}

        <div class="levels">
          <div class="level entry">Price: ${formatValue(price)}</div>
          <div class="level entry">Entry: ${formatValue(idea.entry ?? idea.entry_price)}</div>
          <div class="level sl">SL: ${formatValue(idea.sl ?? idea.stop_loss)}</div>
          <div class="level tp">TP: ${formatValue(idea.tp ?? idea.take_profit)}</div>
          <div class="level rr">RR: ${formatValue(idea.rr ?? idea.risk_reward)}</div>
          <div class="level">Day %: ${formatPercent(idea.day_change_percent)}</div>
        </div>

        <div class="footer">
          <span>${escapeHtml(idea.source_symbol || symbol)}</span>
          <span>${formatDate(idea.meaningful_updated_at || idea.updated_at)}</span>
        </div>
      `;

      card.addEventListener("click", () => openModal(idea));
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") openModal(idea);
      });

      return card;
    }

    function openModal(idea) {
      state.activeIdea = idea;

      const symbol = normalizeSymbol(idea.symbol || idea.pair || "MARKET");
      const signal = normalizeSignal(idea.final_signal || idea.signal);
      const source = idea.source || "unknown";
      const dataStatus = idea.data_status || "unknown";
      const confidence = numberOrDash(idea.final_confidence ?? idea.confidence);
      const summary = idea.summary_ru || idea.summary || idea.full_text || "Описание отсутствует.";
      const warning = idea.warning_ru || "";
      const signalClass = signal === "BUY" ? "buy-text" : signal === "SELL" ? "sell-text" : "wait-text";

      modalTitle.innerHTML = `${escapeHtml(symbol)} · <span class="${signalClass}">${escapeHtml(signal)}</span>`;
      modalSubtitle.textContent = `Источник: ${source} · Статус данных: ${dataStatus} · Уверенность: ${confidence}%`;

      modalContent.innerHTML = `
        <div class="chip-row">
          <span class="chip ${source === "twelvedata_ws" ? "chip-live" : "chip-rest"}">${source === "twelvedata_ws" ? "LIVE WS" : "REST fallback"}</span>
          <span class="chip">${escapeHtml(dataStatus)}</span>
          <span class="chip">${escapeHtml(idea.setup_quality || "quality")}</span>
          <span class="chip">${escapeHtml(idea.risk_filter || "risk filter")}</span>
          ${warning ? '<span class="chip chip-warn">warning</span>' : ""}
        </div>

        <div class="modal-section-title">График и разметка</div>
        <div class="chart-wrap">
          <div class="chart-toolbar">
            <button class="tf-btn" onclick="loadChartForActiveIdea('M15')">M15</button>
            <button class="tf-btn" onclick="loadChartForActiveIdea('H1')">H1</button>
            <button class="tf-btn" onclick="loadChartForActiveIdea('H4')">H4</button>
          </div>
          <div id="chartBox" class="chart"></div>
          <div id="chartLegend" class="legend">Загрузка графика...</div>
        </div>

        <div class="modal-section-title">Основная идея</div>
        <div class="box">${escapeHtml(summary)}</div>

        ${warning ? `<div class="modal-section-title">Предупреждение</div><div class="box">${escapeHtml(warning)}</div>` : ""}

        <div class="modal-section-title">Торговые уровни</div>
        <div class="modal-grid">
          <div class="level entry">Price: ${formatValue(idea.current_price ?? idea.price)}</div>
          <div class="level entry">Entry: ${formatValue(idea.entry ?? idea.entry_price)}</div>
          <div class="level sl">SL: ${formatValue(idea.sl ?? idea.stop_loss)}</div>
          <div class="level tp">TP: ${formatValue(idea.tp ?? idea.take_profit)}</div>
          <div class="level rr">RR: ${formatValue(idea.rr ?? idea.risk_reward)}</div>
          <div class="level">Day %: ${formatPercent(idea.day_change_percent)}</div>
        </div>

        <div class="modal-section-title">Данные сигнала</div>
        <div class="modal-grid">
          <div class="level">Signal: ${escapeHtml(signal)}</div>
          <div class="level">Confidence: ${escapeHtml(String(confidence))}%</div>
          <div class="level">Status: ${escapeHtml(idea.status || "—")}</div>
          <div class="level">Symbol: ${escapeHtml(symbol)}</div>
          <div class="level">Source symbol: ${escapeHtml(idea.source_symbol || "—")}</div>
          <div class="level">Updated: ${escapeHtml(formatDate(idea.meaningful_updated_at || idea.updated_at))}</div>
        </div>

        <button id="diagnosticsToggle">Показать диагностику</button>
        <div id="diagnosticsBox" class="diagnostics">
          <pre>${escapeHtml(JSON.stringify(idea.diagnostics || {}, null, 2))}</pre>
        </div>
      `;

      modalBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";

      document.getElementById("diagnosticsToggle").addEventListener("click", () => {
        const box = document.getElementById("diagnosticsBox");
        box.classList.toggle("open");
        document.getElementById("diagnosticsToggle").textContent = box.classList.contains("open")
          ? "Скрыть диагностику"
          : "Показать диагностику";
      });

      setTimeout(() => loadChartForActiveIdea("M15"), 50);
    }

    async function loadChartForActiveIdea(tf) {
      if (!state.activeIdea) return;

      const symbol = normalizeSymbol(state.activeIdea.symbol || state.activeIdea.pair);
      const chartBox = document.getElementById("chartBox");
      const legend = document.getElementById("chartLegend");

      chartBox.innerHTML = "";
      legend.textContent = "Загрузка свечей и разметки...";

      try {
        const response = await fetch(`/api/candles/${symbol}?tf=${encodeURIComponent(tf)}&limit=160`, { cache: "no-store" });

        if (!response.ok) {
          legend.textContent = `График недоступен: endpoint /api/candles вернул HTTP ${response.status}. Нужно вернуть candles endpoint в app/main.py.`;
          return;
        }

        const payload = await response.json();
        const candles = Array.isArray(payload.candles) ? payload.candles : [];

        if (!candles.length) {
          legend.textContent = payload.warning_ru || "Свечи не получены.";
          return;
        }

        drawChart(chartBox, legend, payload, state.activeIdea);
      } catch (error) {
        legend.textContent = "Ошибка загрузки графика: " + error.message;
      }
    }

    function drawChart(container, legend, payload, idea) {
      const chart = LightweightCharts.createChart(container, {
        layout: {
          background: { color: "#050e1c" },
          textColor: "#b9d6f8",
        },
        grid: {
          vertLines: { color: "rgba(120,160,210,0.08)" },
          horzLines: { color: "rgba(120,160,210,0.08)" },
        },
        rightPriceScale: { borderColor: "rgba(120,160,210,0.25)" },
        timeScale: { borderColor: "rgba(120,160,210,0.25)", timeVisible: true },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      });

      state.chart = chart;

      const candleSeries = chart.addCandlestickSeries({
        upColor: "#31f59d",
        downColor: "#ff5f7a",
        borderUpColor: "#31f59d",
        borderDownColor: "#ff5f7a",
        wickUpColor: "#31f59d",
        wickDownColor: "#ff5f7a",
      });

      const candles = payload.candles.map((c) => ({
        time: Number(c.time),
        open: Number(c.open),
        high: Number(c.high),
        low: Number(c.low),
        close: Number(c.close),
      }));

      candleSeries.setData(candles);

      addPriceLine(candleSeries, idea.entry ?? idea.entry_price, "ENTRY", "#ffd84d");
      addPriceLine(candleSeries, idea.sl ?? idea.stop_loss, "SL", "#ff5f7a");
      addPriceLine(candleSeries, idea.tp ?? idea.take_profit, "TP", "#31f59d");
      addAnnotations(chart, payload.annotations || {}, candles);

      chart.timeScale().fitContent();

      const ms = payload.market_structure || {};
      legend.innerHTML = `
        <b>${escapeHtml(payload.symbol || "")} ${escapeHtml(payload.timeframe || "")}</b> ·
        Структура: ${escapeHtml(ms.trend || "neutral")} ·
        Ликвидность рядом: ${escapeHtml(ms.near_liquidity || "none")} ·
        FVG: ${ms.has_bullish_fvg ? "bullish " : ""}${ms.has_bearish_fvg ? "bearish" : ""}
        <br>
        Разметка: линии Entry/SL/TP, уровни Range High/Low/50%, зоны OB/FVG, точки ликвидности.
      `;
    }

    function addPriceLine(series, price, title, color) {
      const value = Number(price);
      if (!Number.isFinite(value)) return;

      series.createPriceLine({
        price: value,
        color,
        lineWidth: 2,
        lineStyle: LightweightCharts.LineStyle.Solid,
        axisLabelVisible: true,
        title,
      });
    }

    function addAnnotations(chart, annotations, candles) {
      const firstTime = candles[0]?.time;
      const lastTime = candles[candles.length - 1]?.time;
      if (!firstTime || !lastTime) return;

      const levels = annotations.levels || [];
      for (const level of levels) {
        const price = Number(level.price);
        if (!Number.isFinite(price)) continue;

        const line = chart.addLineSeries({
          color: level.type === "support" ? "#31f59d" : level.type === "resistance" ? "#ff5f7a" : "#45caff",
          lineWidth: 1,
          lineStyle: LightweightCharts.LineStyle.Dashed,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        line.setData([{ time: firstTime, value: price }, { time: lastTime, value: price }]);
      }

      const liquidity = annotations.liquidity || [];
      for (const zone of liquidity.slice(-8)) {
        const price = Number(zone.price);
        if (!Number.isFinite(price)) continue;

        const line = chart.addLineSeries({
          color: zone.type === "buy_side_liquidity" ? "#ff5f7a" : "#31f59d",
          lineWidth: 1,
          lineStyle: LightweightCharts.LineStyle.Dotted,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        line.setData([{ time: firstTime, value: price }, { time: lastTime, value: price }]);
      }

      addZones(chart, annotations.imbalances || [], firstTime, lastTime, "FVG");
      addZones(chart, annotations.order_blocks || [], firstTime, lastTime, "OB");
    }

    function addZones(chart, zones, firstTime, lastTime, prefix) {
      for (const zone of zones.slice(-6)) {
        const from = Number(zone.from);
        const to = Number(zone.to);
        if (!Number.isFinite(from) || !Number.isFinite(to)) continue;

        const top = Math.max(from, to);
        const bottom = Math.min(from, to);
        const mid = (top + bottom) / 2;
        const isBullish = String(zone.type || "").includes("bullish");

        const line = chart.addLineSeries({
          color: isBullish ? "#31f59d" : "#ff5f7a",
          lineWidth: 2,
          lineStyle: LightweightCharts.LineStyle.LargeDashed,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        line.setData([{ time: firstTime, value: mid }, { time: lastTime, value: mid }]);

        const topLine = chart.addLineSeries({
          color: isBullish ? "rgba(49,245,157,0.45)" : "rgba(255,95,122,0.45)",
          lineWidth: 1,
          lineStyle: LightweightCharts.LineStyle.Dotted,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        const bottomLine = chart.addLineSeries({
          color: isBullish ? "rgba(49,245,157,0.45)" : "rgba(255,95,122,0.45)",
          lineWidth: 1,
          lineStyle: LightweightCharts.LineStyle.Dotted,
          priceLineVisible: false,
          lastValueVisible: false,
        });

        topLine.setData([{ time: firstTime, value: top }, { time: lastTime, value: top }]);
        bottomLine.setData([{ time: firstTime, value: bottom }, { time: lastTime, value: bottom }]);
      }
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
      document.body.style.overflow = "";
      modalContent.innerHTML = "";
      state.chart = null;
    }

    function normalizeSignal(value) {
      const signal = String(value || "WAIT").toUpperCase();
      if (signal.includes("BUY")) return "BUY";
      if (signal.includes("SELL")) return "SELL";
      return "WAIT";
    }

    function normalizeSymbol(value) {
      return String(value || "").toUpperCase().replace("/", "").replace("-", "").replace("_", "").replace(/\s+/g, "").trim();
    }

    function numberOrDash(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";
      return Math.round(number);
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return escapeHtml(String(value));
      if (Math.abs(number) >= 100) return number.toFixed(3);
      if (Math.abs(number) >= 10) return number.toFixed(4);
      return number.toFixed(5);
    }

    function formatPercent(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";
      return number.toFixed(3) + "%";
    }

    function formatDate(value) {
      if (!value) return "—";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleString("ru-RU");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    window.loadChartForActiveIdea = loadChartForActiveIdea;

    loadSignals();
    setInterval(loadSignals, 30000);
  </script>
