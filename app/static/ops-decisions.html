<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OPS Решения</title><link rel="stylesheet" href="/static/styles.css"><style>body{background:#050b14;color:#eaf2ff;font-family:Inter,Arial,sans-serif}.wrap{padding:24px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}.card,.panel{background:#0b1628;border:1px solid #213a5f;border-radius:16px;padding:14px}.filters{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}input,select,button{background:#081220;color:#eaf2ff;border:1px solid #29466e;border-radius:10px;padding:9px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #1d3557;padding:8px;text-align:left;font-size:13px}tr:hover{background:#0f2038}.detail{white-space:pre-wrap;max-height:520px;overflow:auto}</style></head><body><div class="wrap"><h1>OPS · Explainable Decision Engine</h1><div id="cards" class="cards"></div><div class="filters"><input id="q" placeholder="Символ"><select id="action"><option value="">Action</option><option>BUY</option><option>SELL</option><option>STRONG_BUY</option><option>STRONG_SELL</option><option>WAIT</option><option>BLOCKED</option></select><select id="readiness"><option value="">Readiness</option><option>READY</option><option>READY_WITH_WARNINGS</option><option>WATCH</option><option>BLOCKED</option><option>NOT_READY</option></select><input id="min" type="number" placeholder="Min score"><input id="conf" type="number" placeholder="Min confidence"><input id="stab" type="number" placeholder="Min stability"><input id="maxc" type="number" placeholder="Max conflict"><label><input id="act" type="checkbox"> actionable</label><button id="load">Загрузить</button></div><div class="panel"><table><thead><tr><th>Symbol</th><th>Action</th><th>Direction</th><th>Readiness</th><th>Decision</th><th>Confidence</th><th>Stability</th><th>Opportunity</th><th>Confluence</th><th>Conflict</th><th>Data</th><th>Fresh</th><th>Entry</th><th>SL</th><th>TP</th><th>Updated</th></tr></thead><tbody id="rows"></tbody></table></div><h2>Детали</h2><pre id="detail" class="panel detail">Выберите строку.</pre></div><script src="/static/ops-decisions.js"></script></body></html>
