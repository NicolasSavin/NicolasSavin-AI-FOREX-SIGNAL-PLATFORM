<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OPS Стратегии</title><link rel="stylesheet" href="/static/styles.css"><style>body{background:#050b14;color:#eaf2ff;font-family:Inter,Arial,sans-serif}.wrap{padding:24px}.panel{background:#0b1628;border:1px solid #213a5f;border-radius:16px;padding:14px;margin:14px 0}input,select,textarea,button{background:#081220;color:#eaf2ff;border:1px solid #29466e;border-radius:10px;padding:9px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #1d3557;padding:8px;text-align:left;font-size:13px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.ok{color:#43e58f}.bad{color:#ff6b7a}.card{animation:fade .25s ease}@keyframes fade{from{opacity:.3;transform:translateY(6px)}to{opacity:1}}</style></head><body><div class="wrap"><h1>OPS · Strategy Builder & Policy Engine</h1><p>Детерминированные правила без LLM, MT4/MT5 и исполнения сделок.</p><div class="panel"><input id="token" placeholder="OPS token"><button onclick="load()">Загрузить</button><button onclick="rebuild()">Rebuild</button></div><div class="panel"><h2>Стратегии</h2><table><thead><tr><th>Name</th><th>Status</th><th>Mode</th><th>Priority</th><th>Version</th><th>Rules</th><th>Symbols</th><th>Updated</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></div><div class="panel"><h2>Редактор</h2><div class="grid"><input id="name" placeholder="Название"><select id="mode"><option>SIGNAL_ONLY</option><option>PAPER</option><option>EXECUTION_READY</option><option>OBSERVATION</option></select><input id="priority" type="number" value="50"><input id="symbols" placeholder="Symbols CSV"><input id="minscore" type="number" value="0" placeholder="Minimum pass score"></div><textarea id="desc" placeholder="Описание" style="width:100%;margin-top:8px"></textarea><h3>Правило</h3><div class="grid"><select id="field"></select><select id="op"></select><input id="value" placeholder="Значение"><label><input id="required" type="checkbox" checked> required</label><input id="weight" type="number" value="1"></div><button onclick="createStrategy()">Создать стратегию с правилом</button></div><div class="panel"><h2>Оценка</h2><pre id="out">Нет данных.</pre></div></div><script src="/static/ops-strategies.js"></script></body></html>
