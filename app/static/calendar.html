<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Экономический календарь</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      html,
      body {
        height: 100%;
      }

      body[data-page="calendar"] {
        min-height: 100vh;
        overflow: hidden;
        background: #020617;
      }

      .calendar-top-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        background: rgba(2, 8, 23, 0.92);
        border-bottom: 1px solid rgba(95, 156, 230, 0.28);
        backdrop-filter: blur(10px);
        overflow-x: auto;
        white-space: nowrap;
      }

      .calendar-top-nav a {
        color: #dbeeff;
        text-decoration: none;
        font-weight: 800;
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(95, 156, 230, 0.28);
        background: rgba(10, 31, 58, 0.75);
      }

      .calendar-top-nav a:hover,
      .calendar-top-nav a.is-active {
        color: #ffffff;
        border-color: rgba(69, 202, 255, 0.75);
        background: linear-gradient(
          135deg,
          rgba(28, 80, 150, 0.95),
          rgba(10, 31, 58, 0.95)
        );
      }

      body[data-page="calendar"] .page-shell {
        width: 100%;
        max-width: none;
        height: 100vh;
        padding: 0;
        margin: 0;
      }

      .calendar-fullscreen {
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
        background: #020617;
        display: flex;
        flex-direction: column;
        z-index: 1;
      }

      #economicCalendarWidget {
        flex: 1;
        width: 100%;
        min-height: 0;
      }

      .ecw-copyright {
        flex: 0 0 auto;
        text-align: center;
        padding: 6px;
        font-size: 12px;
        background: #020617;
      }
    </style>
  </head>
  <body data-page="calendar">
    <div class="page-shell">
      <nav class="calendar-top-nav">
        <a href="/">Главная</a>
        <a href="/ideas">Идеи</a>
        <a href="/analytics">Аналитика</a>
        <a href="/news">Новости</a>
        <a class="is-active" href="/calendar">Календарь</a>
        <a href="/heatmap/page">Тепловая карта</a>
      </nav>

      <div class="calendar-fullscreen">
        <div id="economicCalendarWidget"></div>

        <div class="ecw-copyright">
          <a
            href="https://www.mql5.com/?utm_source=calendar.widget&utm_medium=link&utm_term=economic.calendar&utm_content=visit.mql5.calendar&utm_campaign=202.calendar.widget"
            rel="noopener nofollow"
            target="_blank"
          >
            MQL5 Algo Trading Community
          </a>
        </div>

        <script
          async
          type="text/javascript"
          data-type="calendar-widget"
          src="https://www.tradays.com/c/js/widgets/calendar/widget.js?v=15"
        >
          {"width":"100%","height":"100%","mode":"2","fw":"html","theme":1}
        </script>
      </div>
    </div>
  </body>
</html>
