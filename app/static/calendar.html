<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Экономический календарь</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      html,
      body {
        height: 100%;
      }

      body[data-page="calendar"] {
        min-height: 100vh;
      }

      body[data-page="calendar"] .page-shell {
        width: 100%;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      body[data-page="calendar"] .site-header {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        border-top: 0;
        margin: 0;
        padding: 16px 20px;
      }

      .calendar-fullscreen {
        flex: 1;
        min-height: calc(100vh - 90px);
        z-index: 1;
        background: #020617;
        display: flex;
        flex-direction: column;
      }

      #economicCalendarWidget {
        flex: 1;
        min-height: 0;
        width: 100%;
        height: 100%;
      }

      #economicCalendarWidget > div,
      #economicCalendarWidget iframe {
        width: 100% !important;
        height: 100% !important;
        min-height: 100% !important;
      }

      .ecw-copyright {
        text-align: center;
        font-size: 12px;
        padding: 6px 0;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body data-page="calendar">
    <div class="page-shell">
      <header class="site-header">
        <nav class="top-nav">
          <a href="/">Главная</a>
          <a href="/ideas">Идеи</a>
          <a href="/news">Новости</a>
          <a href="/calendar">Календарь</a>
          <a href="/heatmap/page">Тепловая карта</a>
        </nav>
      </header>

      <div class="calendar-fullscreen">
        <div id="economicCalendarWidget"></div>

        <div class="ecw-copyright">
          <a
            href="https://www.mql5.com/?utm_source=calendar.widget&utm_medium=link&utm_term=economic.calendar&utm_content=visit.mql5.calendar&utm_campaign=202.calendar.widget"
            rel="noopener nofollow"
            target="_blank"
          >
            MQL5 Algo Trading Community
          </a>
        </div>

        <script
          async
          type="text/javascript"
          data-type="calendar-widget"
          src="https://www.tradays.com/c/js/widgets/calendar/widget.js?v=15"
        >
          {"width":"100%","height":"100%","mode":"2","fw":"html","theme":1}
        </script>
      </div>
    </div>

    <script src="/static/script.js"></script>
    <script src="/static/nav.js"></script>
  </body>
</html>
