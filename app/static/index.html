<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Forex Signal Platform</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #08111f;
      color: #ffffff;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #0f1f38;
      color: #7dd3fc;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.5;
      max-width: 760px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
    }
    .btn-primary {
      background: #22d3ee;
      color: #04111d;
    }
    .btn-secondary {
      background: #13233c;
      color: #ffffff;
      border: 1px solid #223552;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">AI Forex Signal Platform</div>
    <h1>Главная страница платформы</h1>
    <p>Это отдельная главная страница. Идеи должны открываться только на /ideas.</p>

    <div class="actions">
      <a class="btn btn-primary" href="/ideas">Открыть идеи</a>
      <a class="btn btn-secondary" href="/ideas/market">API идей</a>
      <a class="btn btn-secondary" href="/news/market">Новости рынка</a>
      <a class="btn btn-secondary" href="/calendar/events">Календарь</a>
    </div>
  </div>
</body>
</html>
