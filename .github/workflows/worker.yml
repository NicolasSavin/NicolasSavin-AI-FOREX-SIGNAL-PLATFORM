name: forex-worker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run worker
        run: python -m app.worker
      - name: Verify generated snapshots stay runtime-only
        run: |
          git status --short signals_data
          echo "Generated forex snapshots are runtime/cache data and are not committed by this workflow."
