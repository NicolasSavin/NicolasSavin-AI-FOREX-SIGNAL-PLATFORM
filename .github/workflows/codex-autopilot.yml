name: Codex Autopilot

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Что должен сделать автопилот"
        required: true
        default: "Improve project code"
      base_branch:
        description: "Базовая ветка"
        required: true
        default: "main"

permissions:
  contents: write
  pull-requests: write

jobs:
  autopilot:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TASK: ${{ github.event.inputs.task }}
      BASE_BRANCH: ${{ github.event.inputs.base_branch }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Configure git
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"

      - name: Create working branch
        run: |
          BRANCH="codex/${{ github.run_id }}-${{ github.run_attempt }}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"

      - name: Run AI agent
        run: |
          python scripts/codex_agent.py

      - name: Show git diff
        run: |
          git status
          git diff --stat || true

      - name: Run tests if present
        run: |
          set -e

          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt || true
          fi

          if [ -f "package.json" ]; then
            if command -v npm >/dev/null 2>&1; then
              npm install || true
              npm test || true
            fi
          fi

          if [ -d "tests" ] || ls test_*.py >/dev/null 2>&1; then
            python -m pytest || true
          fi

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "NO_CHANGES=true" >> $GITHUB_ENV
            echo "No changes produced."
            exit 0
          fi

          git add .
          git commit -m "Codex autopilot: $TASK"

      - name: Push working branch
        if: env.NO_CHANGES != 'true'
        run: |
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: env.NO_CHANGES != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "Codex autopilot: $TASK" \
            --body "Автоматически создано GitHub Actions по задаче: $TASK"
