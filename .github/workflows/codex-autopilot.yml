name: Codex Autopilot

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Что должен сделать Codex"
        required: true
        default: "Improve project code"

jobs:
  autopilot:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Run Codex task
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          echo "Running Codex task:"
          echo "$TASK"

      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add .
          git commit -m "Codex autopilot update" || echo "No changes"
          git push
