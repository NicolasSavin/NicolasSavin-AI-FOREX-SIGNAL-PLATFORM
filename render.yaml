services:
  - type: web
    name: nicolassavin-ai-forex-signal-platform
    env: python
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
